    <!-- Error Handler -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.color = '#ff0000';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<h3>Game Error</h3><p>' + msg + '</p><p>' + url + ':' + line + ':' + col + '</p>';
            if (error && error.stack) {
                div.innerHTML += '<pre>' + error.stack + '</pre>';
            }
            document.body.appendChild(div);
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '50%';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.color = '#ffaa00';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<h3>Unhandled Promise Rejection</h3><p>' + event.reason + '</p>';
            document.body.appendChild(div);
        });
        // Resource loading error handler
        window.addEventListener('error', function(event) {
            if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK' || event.target.tagName === 'IMG') {
                const div = document.createElement('div');
                div.style.position = 'fixed';
                div.style.bottom = '0';
                div.style.left = '0';
                div.style.width = '100%';
                div.style.background = 'rgba(0,0,0,0.8)';
                div.style.color = '#ffff00';
                div.style.padding = '10px';
                div.style.zIndex = '99999';
                div.style.fontFamily = 'monospace';
                div.innerHTML = '<h3>Resource Load Error</h3><p>Failed to load: ' + (event.target.src || event.target.href) + '</p>';
                document.body.appendChild(div);
            }
        }, true);
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "SimSun", "Songti SC", serif; /* 宋体更有恐怖感 */
        }

        #game-container {
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5); /* 血红色光晕 */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #dialog-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            height: 160px;
            background-color: #e3dac9; /* Old paper color */
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                radial-gradient(circle at 10% 20%, rgba(139, 0, 0, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 0, 0, 0.1) 0%, transparent 20%);
            background-size: 100% 2em, 100% 100%, 100% 100%;
            border: 4px double #5c4033; /* Dark wood/old frame color */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.2);
            padding: 25px;
            color: #2b1d0e; /* Dark ink color */
            font-size: 18px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            border-radius: 2px;
        }

        #dialog-box::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(92, 64, 51, 0.3);
            pointer-events: none;
        }

        #dialog-box.hidden {
            display: none;
        }

        #speaker-name {
            margin: 0 0 10px 0;
            font-weight: bold;
            color: #8b0000; /* Blood red for name */
            font-size: 22px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
            font-family: "SimSun", "Songti SC", serif;
        }

        #dialog-text {
            margin: 0;
            line-height: 1.6;
            flex-grow: 1;
            font-family: "SimSun", "Songti SC", serif;
            font-weight: 500;
        }

        #next-arrow {
            align-self: flex-end;
            color: #8b0000;
            font-size: 20px;
            animation: blink 1s infinite;
        }

        /* 虚拟摇杆和按钮样式 */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            touch-action: none; /* 防止触摸时页面滚动 */
            display: none; /* 默认隐藏，JS检测到触摸设备再显示 */
            transition: opacity 0.5s ease;
            opacity: 1;
            pointer-events: auto; /* 关键：允许点击 */
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(139, 0, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #action-btn {
            position: absolute;
            bottom: 40px;
            right: 60px;
            width: 80px;
            height: 80px;
            background: rgba(139, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-family: "SimSun", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
            display: none;
            transition: opacity 0.5s ease;
            opacity: 1;
            pointer-events: auto; /* 关键：允许点击 */
        }

        .ui-faded {
            opacity: 0 !important; /* 改为完全透明，避免遮挡画面 */
        }

        /* 竖屏提示遮罩 - 移除强制显示 */
        #orientation-overlay {
            display: none !important;
        }

        /* 竖屏时的UI调整 */
        @media screen and (orientation: portrait) {
            #joystick-zone {
                bottom: 80px; /* 抬高摇杆位置，避免被底部手势条遮挡 */
                left: 30px;
            }
            #action-btn {
                bottom: 90px; /* 抬高按钮位置 */
                right: 30px;
            }
            #dialog-box {
                bottom: 10px;
                width: 95%; /* 增加宽度 */
                height: 180px; /* 增加高度以容纳更多文字 */
                font-size: 16px; /* 稍微减小字号 */
            }
        }

        /* 恐怖结局特效 */
        #ending-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .blood-text {
            font-family: "SimSun", serif;
            font-size: 60px;
            font-weight: bold;
            color: #ff0000;
            text-shadow:
                2px 2px 0 #330000,
                0 0 20px rgba(255, 0, 0, 0.8),
                0 0 40px rgba(139, 0, 0, 0.6);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.5s, transform 0.1s;
            position: relative;
            text-align: center;
            line-height: 1.5;
            z-index: 2;
        }

        .blood-text.visible {
            opacity: 1;
            transform: scale(1);
            animation: heartbeat 0.2s infinite alternate;
        }

        .blood-drip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 4px;
            height: 0;
            background: rgba(200, 0, 0, 0.9);
            border-radius: 0 0 4px 4px;
            animation: drip 3s infinite ease-in;
            box-shadow:
                -20px 0 0 rgba(200, 0, 0, 0.9),
                20px 0 0 rgba(200, 0, 0, 0.9),
                -40px -10px 0 rgba(180, 0, 0, 0.9),
                35px -5px 0 rgba(180, 0, 0, 0.9);
        }

        @keyframes heartbeat {
            from { transform: scale(1); text-shadow: 0 0 10px red; }
            to { transform: scale(1.1); text-shadow: 0 0 30px red, 0 0 10px white; }
        }

        @keyframes drip {
            0% { height: 0; opacity: 1; }
            80% { height: 100vh; opacity: 0.8; }
            100% { height: 100vh; opacity: 0; }
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        .shake-screen {
            animation: screen-shake 0.1s infinite;
        }

        .bg-flash {
            animation: bg-flash 0.1s infinite;
        }

        .horror-btn {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 24px;
            font-family: "SimSun", serif;
            color: #ff0000;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #8b0000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s, transform 0.2s;
            pointer-events: auto;
            z-index: 10001;
            display: none;
        }
        .horror-btn:hover {
            background: #330000;
            transform: scale(1.1);
            text-shadow: 0 0 10px red;
        }

        @keyframes bg-flash {
            0% { background-color: #000; }
            50% { background-color: #300; }
            100% { background-color: #000; }
        }


        #action-btn:active {
            background: rgba(255, 0, 0, 0.7);
        }

        #inventory {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(43, 29, 14, 0.8);
            padding: 10px;
            border: 2px solid #5c4033;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #inv-slots {
            display: flex;
            gap: 10px;
        }

        .inv-item {
            width: 50px;
            height: 50px;
            background: #e3dac9;
            border: 1px solid #8b4513;
            color: #2b1d0e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px; /* Larger icons */
            cursor: pointer;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .inv-item:hover {
            transform: scale(1.1);
            border-color: #8b0000;
            box-shadow: 0 0 5px #8b0000;
        }

        /* Document Reader */
        #doc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9); /* Darker overlay */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            pointer-events: auto;
        }

        #doc-paper {
            width: 80%;
            max-width: 600px;
            height: 80%;
            background: #f4e4bc; /* Old paper color */
            color: #2b1d0e;
            padding: 40px;
            box-sizing: border-box;
            font-family: "SimSun", "Songti SC", serif;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            overflow-y: auto;
            position: relative;
            background-image:
                linear-gradient(#d3c6a6 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, transparent 90%, rgba(0,0,0,0.1) 100%);
            background-size: 100% 2em, 100% 100%;
            line-height: 2em;
            border-radius: 2px;
        }

        #doc-close {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #8b0000;
            font-weight: bold;
        }

        #doc-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #550000;
            border-bottom: 2px solid #550000;
            padding-bottom: 10px;
        }

        #doc-content {
            font-size: 18px;
            white-space: pre-wrap;
        }

        /* Tooltip for inventory */
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border: 1px solid #8b0000;
            pointer-events: none;
            display: none;
            z-index: 3000;
            font-size: 14px;
        }

        /* 移动端适配：屏幕宽度小于 1024px 时显示虚拟按键 */
        @media (max-width: 1024px) {
            #joystick-zone, #action-btn {
                display: flex;
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Stamina Bar */
        #stamina-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            border-radius: 5px;
            overflow: hidden;
            display: none; /* Hidden by default, shown in game */
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.1s linear;
        }

        /* Sanity Bar */
        #sanity-container {
            position: absolute;
            top: 40px; /* Below stamina bar */
            left: 20px;
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }
        #sanity-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #00bfff);
            transition: width 0.1s linear;
        }
    </style>
</head>

    }

    static createToyPlane() {
        const planeG = this.scene.make.graphics({x:0, y:0, add:false});
        planeG.fillStyle(0xffffff);
        planeG.beginPath();
        planeG.moveTo(16, 4);
        planeG.lineTo(28, 20);
        planeG.lineTo(16, 32);
        planeG.lineTo(4, 20);
        planeG.closePath();
        planeG.fillPath();

        planeG.lineStyle(1, 0xcccccc);
        planeG.beginPath();
        planeG.moveTo(16, 4); planeG.lineTo(16, 32);
        planeG.strokePath();

        planeG.generateTexture('toy_plane', 32, 32);
    }

    static createPlayerSheet() {
        const frameWidth = 32;
        const frameHeight = 48;
        const playerTexture = this.scene.make.graphics({ x: 0, y: 0, add: false });

        const drawPlayer = (x, y, dir, step) => {
            const hairColor = 0x1a1a1a;
            const skinColor = 0xe0c0a0;
            const clothesColor = 0x2c3e50;
            const pantsColor = 0x111111;

            // Body
            playerTexture.fillStyle(clothesColor);
            playerTexture.fillRect(x + 8, y + 16, 16, 18);

            // Legs
            playerTexture.fillStyle(pantsColor);
            let leftLegY = 0, rightLegY = 0;
            if (step === 1) { leftLegY = -2; rightLegY = 2; }
            if (step === 2) { leftLegY = 2; rightLegY = -2; }

            if (dir === 0 || dir === 3) {
                 playerTexture.fillRect(x + 10, y + 34 + leftLegY, 5, 12);
                 playerTexture.fillRect(x + 17, y + 34 + rightLegY, 5, 12);
            } else if (dir === 1) {
                if (step === 0) {
                    playerTexture.fillRect(x + 12, y + 34, 8, 12);
                } else if (step === 1) {
                    playerTexture.fillRect(x + 8, y + 32, 6, 12);
                    playerTexture.fillRect(x + 16, y + 34, 6, 10);
                } else {
                    playerTexture.fillRect(x + 16, y + 32, 6, 12);
                    playerTexture.fillRect(x + 8, y + 34, 6, 10);
                }
            } else if (dir === 2) {
                if (step === 0) {
                    playerTexture.fillRect(x + 12, y + 34, 8, 12);
                } else if (step === 1) {
                    playerTexture.fillRect(x + 16, y + 32, 6, 12);
                    playerTexture.fillRect(x + 8, y + 34, 6, 10);
                } else {
                    playerTexture.fillRect(x + 8, y + 32, 6, 12);
                    playerTexture.fillRect(x + 16, y + 34, 6, 10);
                }
            }

            // Head
            playerTexture.fillStyle(skinColor);
            playerTexture.fillRect(x + 9, y + 4, 14, 12);

            // Hair
            playerTexture.fillStyle(hairColor);
            if (dir === 3) {
                playerTexture.fillRect(x + 8, y + 2, 16, 14);
            } else {
                playerTexture.fillRect(x + 8, y + 2, 16, 6);
                if (dir === 1) playerTexture.fillRect(x + 20, y + 4, 4, 10);
                if (dir === 2) playerTexture.fillRect(x + 8, y + 4, 4, 10);
                if (dir === 0) {
                    playerTexture.fillRect(x + 8, y + 2, 4, 8);
                    playerTexture.fillRect(x + 20, y + 2, 4, 8);
                }
            }

            // Face
            if (dir !== 3) {
                 playerTexture.fillStyle(0x000000);
                 if (dir === 0) {
                     playerTexture.fillRect(x + 11, y + 10, 2, 2);
                     playerTexture.fillRect(x + 19, y + 10, 2, 2);
                 } else if (dir === 1) {
                     playerTexture.fillRect(x + 10, y + 10, 2, 2);
                 } else if (dir === 2) {
                     playerTexture.fillRect(x + 20, y + 10, 2, 2);
                 }
            }
        };

        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 3; col++) {
                drawPlayer(col * frameWidth, row * frameHeight, row, col);
            }
        }
        playerTexture.generateTexture('player_sheet', frameWidth * 3, frameHeight * 4);
    }

function createDefaultStoryFlags() {
    return {
        clues: { control: 0, illness: 0, death: 0 },
        collectedClues: [],
        memories: { school: false, hospital: false, crash: false },
        endingChoice: null,
        postMemoryDialogShown: {
            school: false,
            hospital: false
        }
    };
}

function createDefaultGameState() {
    return {
        storyStep: 0,
        hasMatches: false,
        hasRice: false,
        hasIncense: false,
        hasSpiritMoney: false,
        hasRedKey: false,
        candlesLit: 0,
        inventory: [],
        viewedPhotos: [],
        clues: [],
        corridorSolved: false,
        viewedIntro: false,
        viewedEntrance: false,
        doorSlammed: false,
        isHidden: false,
        isChasing: false,
        cabinetMoved: false,
        sanity: 100,
        storyFlags: createDefaultStoryFlags()
    };
}

function ensureStoryFlags(gameState) {
    if (!gameState.storyFlags) {
        gameState.storyFlags = createDefaultStoryFlags();
    }

    const flags = gameState.storyFlags;
    if (!flags.clues) flags.clues = { control: 0, illness: 0, death: 0 };
    flags.clues.control = flags.clues.control || 0;
    flags.clues.illness = flags.clues.illness || 0;
    flags.clues.death = flags.clues.death || 0;

    if (!flags.collectedClues) flags.collectedClues = [];
    if (!flags.memories) flags.memories = { school: false, hospital: false, crash: false };
    flags.memories.school = !!flags.memories.school;
    flags.memories.hospital = !!flags.memories.hospital;
    flags.memories.crash = !!flags.memories.crash;

    if (flags.endingChoice === undefined) flags.endingChoice = null;
    if (!flags.postMemoryDialogShown) {
        flags.postMemoryDialogShown = { school: false, hospital: false };
    }
    flags.postMemoryDialogShown.school = !!flags.postMemoryDialogShown.school;
    flags.postMemoryDialogShown.hospital = !!flags.postMemoryDialogShown.hospital;

    if (typeof gameState.sanity !== 'number' || Number.isNaN(gameState.sanity)) {
        gameState.sanity = 100;
    }

    return flags;
}

function normalizeGameState(gameState) {
    if (!gameState.inventory) gameState.inventory = [];
    if (!gameState.viewedPhotos) gameState.viewedPhotos = [];
    if (!gameState.clues) gameState.clues = [];
    if (gameState.candlesLit === undefined) gameState.candlesLit = 0;
    ensureStoryFlags(gameState);
    return gameState;
}

function collectClue(gameState, clueId, clueType) {
    const flags = ensureStoryFlags(gameState);
    if (!clueId || !clueType || flags.collectedClues.includes(clueId)) return false;
    flags.collectedClues.push(clueId);
    flags.clues[clueType] = (flags.clues[clueType] || 0) + 1;
    return true;
}

function getTruthLevel(gameState) {
    const { clues } = ensureStoryFlags(gameState);
    if (clues.control >= 2 && clues.illness >= 2 && clues.death >= 2) return 'complete';
    if (clues.control >= 1 && clues.illness >= 1) return 'family';
    return 'surface';
}

function resolveStartRoute(search = '') {
    const params = new URLSearchParams(search);
    const mapId = params.get('map');

    if (!mapId || !Maps[mapId]) {
        return { scene: 'IntroScene', data: undefined };
    }

    const data = { mapId };
    const x = params.has('x') ? Number(params.get('x')) : NaN;
    const y = params.has('y') ? Number(params.get('y')) : NaN;
    if (Number.isFinite(x)) data.x = x;
    if (Number.isFinite(y)) data.y = y;

    return { scene: 'GameScene', data };
}

class SoundManager {
    constructor(scene) {
        this.scene = scene;
        this.audioCtx = null;
        this.micStream = null;
        this.micAnalyser = null;
        this.micDataArray = null;
        this.init();
    }

    init() {
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }
    }

    async initMic() {
        if (this.micStream) return true; // Already init
        if (!this.audioCtx) this.init();

        try {
            this.micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            this.micSource = this.audioCtx.createMediaStreamSource(this.micStream);
            this.micAnalyser = this.audioCtx.createAnalyser();
            this.micAnalyser.fftSize = 256;
            this.micSource.connect(this.micAnalyser);
            this.micDataArray = new Uint8Array(this.micAnalyser.frequencyBinCount);
            console.log("Microphone initialized for horror immersion.");
            return true;
        } catch (e) {
            console.warn("Microphone access denied or not available", e);
            return false;
        }
    }

    getMicVolume() {
        if (!this.micAnalyser || !this.micDataArray) return 0;
        this.micAnalyser.getByteFrequencyData(this.micDataArray);
        let sum = 0;
        for (let i = 0; i < this.micDataArray.length; i++) {
            sum += this.micDataArray[i];
        }
        // Return normalized 0-100 range roughly
        return (sum / this.micDataArray.length);
    }

    stopMic() {
        if (this.micStream) {
            this.micStream.getTracks().forEach(track => track.stop());
            this.micStream = null;
            this.micAnalyser = null;
        }
    }

    playTone(freq, type, duration) {
        if (!this.audioCtx) return;
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }

    playNoise(duration) {
        if (!this.audioCtx) return;
        const bufferSize = this.audioCtx.sampleRate * duration;
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
        noise.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playFootstep() {
        if (!this.audioCtx) return;
        const t = this.audioCtx.currentTime;

        // Filtered noise for a "thud"
        const bufferSize = this.audioCtx.sampleRate * 0.1; // 100ms
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.5;
        }

        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;

        // Lowpass filter for "thud"
        const filter = this.audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(150, t);

        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playSpatialNoise(duration, x, y) {
        if (!this.audioCtx || !this.scene || !this.scene.player) return;

        const px = this.scene.player.sprite.x;
        const py = this.scene.player.sprite.y;

        // Calculate pan based on relative X position
        // Map width is usually ~800-1000. Let's normalize -1 to 1 over 400px distance
        let pan = (x - px) / 400;
        pan = Phaser.Math.Clamp(pan, -1, 1);

        // Calculate volume based on distance
        const dist = Phaser.Math.Distance.Between(px, py, x, y);
        let vol = 1 - (dist / 600); // 600px max hearing distance
        vol = Phaser.Math.Clamp(vol, 0, 1);

        if (vol <= 0) return;

        const bufferSize = this.audioCtx.sampleRate * duration;
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1);
        }

        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;

        // Stereo Panner
        const panner = this.audioCtx.createStereoPanner();
        panner.pan.setValueAtTime(pan, this.audioCtx.currentTime);

        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(vol * 0.1, this.audioCtx.currentTime); // Base volume 0.1
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);

        noise.connect(panner);
        panner.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playHeartbeat(intensity = 1) {
        if (!this.audioCtx) return;
        const t = this.audioCtx.currentTime;

        // Lub
        const osc1 = this.audioCtx.createOscillator();
        const gain1 = this.audioCtx.createGain();
        osc1.frequency.setValueAtTime(60, t);
        osc1.frequency.exponentialRampToValueAtTime(40, t + 0.1);
        gain1.gain.setValueAtTime(0.5 * intensity, t);
        gain1.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc1.connect(gain1);
        gain1.connect(this.audioCtx.destination);
        osc1.start(t);
        osc1.stop(t + 0.15);

        // Dub
        const osc2 = this.audioCtx.createOscillator();
        const gain2 = this.audioCtx.createGain();
        osc2.frequency.setValueAtTime(60, t + 0.2);
        osc2.frequency.exponentialRampToValueAtTime(40, t + 0.3);
        gain2.gain.setValueAtTime(0.4 * intensity, t + 0.2);
        gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc2.connect(gain2);
        gain2.connect(this.audioCtx.destination);
        osc2.start(t + 0.2);
        osc2.stop(t + 0.35);
    }

    playSpatialTone(freq, type, duration, sourceX, sourceY) {
        if (!this.audioCtx) return;

        // Calculate spatial values
        let pan = 0;
        let volume = 1;

        if (this.scene && this.scene.player && this.scene.player.sprite) {
            const px = this.scene.player.sprite.x;
            const py = this.scene.player.sprite.y;

            const dx = sourceX - px;
            const dy = sourceY - py;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 600; // Hearable distance

            if (dist > maxDist) return; // Too far to hear

            pan = dx / 400; // Full pan at 400px
            if (pan < -1) pan = -1;
            if (pan > 1) pan = 1;

            volume = 1 - (dist / maxDist);
            if (volume < 0) volume = 0;
        }

        const osc = this.audioCtx.createOscillator();
        const panner = this.audioCtx.createStereoPanner();
        const gain = this.audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);

        panner.pan.setValueAtTime(pan, this.audioCtx.currentTime);

        // Attack/Decay
        gain.gain.setValueAtTime(0.1 * volume, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01 * volume, this.audioCtx.currentTime + duration);

        osc.connect(panner);
        panner.connect(gain);
        gain.connect(this.audioCtx.destination);

        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }
}

                duration: 50,
                yoyo: true,
                repeat: 3
            });
            // Flicker Light
            this.scene.tweens.add({
                targets: this.lightSource,
                intensity: { from: 0.5, to: 1.2 },
                duration: 50,
                yoyo: true,
                repeat: 3
            });
        }
        */

        let moveX = 0;
        let moveY = 0;

        // Keyboard Input
        if (cursors.left.isDown || wasd.left.isDown) moveX = -1;
        else if (cursors.right.isDown || wasd.right.isDown) moveX = 1;

        if (cursors.up.isDown || wasd.up.isDown) moveY = -1;
        else if (cursors.down.isDown || wasd.down.isDown) moveY = 1;

        // Joystick Input
        if (joystick.active) {
            if (Math.abs(joystick.x) > 0.1) moveX = joystick.x;
            if (Math.abs(joystick.y) > 0.1) moveY = joystick.y;
        }

        if (moveX !== 0 || moveY !== 0) {
            // Normalize
            if (!joystick.active && moveX !== 0 && moveY !== 0) {
                const len = Math.sqrt(moveX * moveX + moveY * moveY);
                moveX /= len;
                moveY /= len;
            }

            const currentSpeed = this.isRunning ? this.runSpeed : this.speed;
            this.sprite.setVelocityX(moveX * currentSpeed);
            this.sprite.setVelocityY(moveY * currentSpeed);

            // Sound
            const now = this.scene.time.now;
            // Faster steps when running
            const stepInterval = this.isRunning ? 250 : 400;

            if (now - this.lastStepTime > stepInterval && soundManager) {
                if (soundManager.playFootstep) {
                    soundManager.playFootstep();
                } else {
                    soundManager.playNoise(0.08); // Fallback
                }
                this.lastStepTime = now;
            }

            // Anims
            const animSpeed = this.isRunning ? 20 : 10; // Faster anims
            // Update anim speed if already playing?
            // Phaser anims speed is set at creation. We might need to adjust timeScale or just accept it.
            // Simple way: check current anim and set timeScale
            if (this.sprite.anims.currentAnim) {
                this.sprite.anims.msPerFrame = this.isRunning ? 50 : 100;
            }

            if (Math.abs(moveX) > Math.abs(moveY)) {
                if (moveX > 0) this.sprite.anims.play('walk-right', true);
                else this.sprite.anims.play('walk-left', true);
            } else {
                if (moveY > 0) this.sprite.anims.play('walk-down', true);
                else this.sprite.anims.play('walk-up', true);
            }

            // Flashlight Rotation with Inertia (Lerp)
            const targetAngle = Math.atan2(moveY, moveX) - Math.PI / 2;
            // Interpolate current rotation to target rotation
            // 0.15 was old direct speed. Let's make it smoother/laggy.
            // Using Phaser.Math.Angle.RotateTo is good, but let's make it slower for inertia effect
            const lerpFactor = 0.08; // Lower = more lag/weight
            this.flashlight.rotation = Phaser.Math.Angle.RotateTo(this.flashlight.rotation, targetAngle, lerpFactor);

            // Walking Sway Effect (Tween)
            if (!this.swayTween) {
                this.swayTween = this.scene.tweens.add({
                    targets: this.sprite,
                    angle: { from: -5, to: 5 },
                    duration: this.isRunning ? 100 : 200, // Faster sway when running
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            } else if (!this.swayTween.isPlaying()) {
                this.swayTween.restart();
            }
            // Update sway duration if running state changed
            if (this.swayTween.isPlaying()) {
                this.swayTween.updateTo('duration', this.isRunning ? 100 : 200);
            }

        } else {
            this.sprite.anims.stop();

            // Stop Sway
            if (this.swayTween && this.swayTween.isPlaying()) {
                this.swayTween.stop();
                this.sprite.setAngle(0);
            } else {
                // Ensure angle is reset even if tween wasn't running (e.g. just stopped)
                this.sprite.setAngle(0);
            }
        }

        // Sync Light Position
        this.flashlight.x = this.sprite.x;
        this.flashlight.y = this.sprite.y;
        if (this.lightSource) {
            this.lightSource.x = this.sprite.x;
            this.lightSource.y = this.sprite.y;
        }
    }
}

class EventManager {
    constructor(scene) {
        this.scene = scene;
    }

    triggerRandomEvent() {
        const eventType = Phaser.Math.Between(0, 3);
        const scene = this.scene;

        switch(eventType) {
            case 0: // Thunder / Flash
                if (scene.currentMapId === 'room_backyard' || scene.currentMapId === 'room_entrance') {
                    scene.cameras.main.flash(100, 255, 255, 255);
                    scene.time.delayedCall(200, () => {
                         if (scene.soundManager) scene.soundManager.playTone(50, 'sawtooth', 0.5); // Low rumble
                    });
                }
                break;
            case 1: // Camera Bump (Poltergeist)
                scene.cameras.main.shake(100, 0.002);
                if (scene.soundManager) scene.soundManager.playTone(100, 'square', 0.1); // Wood creak sound
                break;
            case 2: // Distant whisper/whistle
                if (scene.soundManager && scene.player && scene.player.sprite) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 150 + Math.random() * 200;
                    const wx = scene.player.sprite.x + Math.cos(angle) * r;
                    const wy = scene.player.sprite.y + Math.sin(angle) * r;
                    scene.soundManager.playSpatialTone(800, 'sine', 0.3, wx, wy);
                }
                break;
            case 3: // Lights flicker
                if (scene.lights.active) {
                    const originalR = scene.lights.ambientColor.r;
                    const originalG = scene.lights.ambientColor.g;
                    const originalB = scene.lights.ambientColor.b;

                    let flickerCount = 0;
                    scene.time.addEvent({
                        delay: 50,
                        repeat: 7,
                        callback: () => {
                            flickerCount++;
                            if (flickerCount % 2 === 0) {
                                scene.lights.setAmbientColor(0x333333); // Not too dark
                            } else {
                                scene.lights.setAmbientColor(0x222222); // Not too dark
                            }

                            if (flickerCount >= 6) {
                                scene.lights.setAmbientColor(0x888888); // Restore to bright ambient
                            }
                        }
                    });
                }
                break;
        }
    }

    triggerPaperDollEvent() {
        const scene = this.scene;
        if (!scene.npc) return;

        if ((scene.gameState.hasRice && !scene.gameState.hasMatches) || (!scene.gameState.hasRice && scene.gameState.hasMatches)) {
            scene.cameras.main.flash(200, 255, 255, 255);
            scene.playSound(50, 'sawtooth', 1.5);
            scene.npc.x = 320;
            scene.npc.y = 400;
            scene.time.delayedCall(1000, () => {
                window.showDialog('主角', '刚才...是不是打雷了？那个纸人好像动了一下...');
            });
        } else if (scene.gameState.hasRice && scene.gameState.hasMatches) {
             scene.cameras.main.flash(200, 255, 255, 255);
             scene.playSound(50, 'sawtooth', 1.5);
             scene.npc.setVisible(false);
             scene.npc.body.enable = false;
             scene.time.delayedCall(1000, () => {
                window.showDialog('主角', '那个纸人不见了！');
             });
        }
    }
}

class MapManager {
    constructor(scene) {
        this.scene = scene;
        this.walls = null;
        this.doors = null;
        this.photos = null;
        this.furniture = null;
        this.floorLayer = [];
    }

    createMap(mapId) {
        const mapDef = Maps[mapId];
        if (!mapDef) {
            console.error('Map not found:', mapId);
            return;
        }

        const mapData = mapDef.data;
        const visual = mapDef.visual || {};

        // Set World Bounds
        const mapWidth = mapDef.width * 32;
        const mapHeight = mapDef.height * 32;
        this.scene.physics.world.setBounds(0, 0, mapWidth, mapHeight);
        this.scene.cameras.main.setBounds(0, 0, mapWidth, mapHeight);

        // Memory Room Special Settings
        // On mobile, use simple lighting for ALL maps to improve performance
        if (mapId === 'room_memory' || this.scene.isMobile) {
            this.scene.lights.enable().setAmbientColor(0xffffff); // Full bright / No dynamic lights
        } else if (visual.ambient !== undefined) {
            this.scene.lights.enable();
            this.scene.lights.setAmbientColor(visual.ambient);
        } else {
            // Standard Horror Settings (PC Only)
            this.scene.lights.enable();
            this.scene.lights.setAmbientColor(0x666666);
        }

        // Initialize groups
        // We use scene-level properties because GameScene/InteractionManager expects them
        if (!this.scene.walls) this.scene.walls = this.scene.physics.add.staticGroup();
        if (!this.scene.doors) this.scene.doors = this.scene.add.group();
        if (!this.scene.photos) this.scene.photos = this.scene.physics.add.staticGroup();

        // Internal reference for convenience
        this.walls = this.scene.walls;
        this.doors = this.scene.doors;
        this.photos = this.scene.photos;

        // New group for furniture to simplify collision
        this.furniture = this.scene.physics.add.staticGroup();
        this.scene.furniture = this.furniture;
        this.scene.interactables = this.scene.physics.add.staticGroup(); // Unified interactables group

        this.floorLayer = [];
        this.scene.floorLayer = this.floorLayer;

        for (let y = 0; y < mapData.length; y++) {
            for (let x = 0; x < mapData[y].length; x++) {
                // Determine textures based on map type
                let floorTex = 'tile_floor';
                let wallTex = 'tile_wall';

                if (mapId === 'room_entrance' || mapId === 'room_backyard' || mapId === 'room_prologue') {
                    floorTex = 'tile_mud';
                    wallTex = 'tile_hedge';
                }

                const tile = this.scene.add.image(x * 32 + 16, y * 32 + 16, floorTex);
                if (visual.floorTint !== undefined) tile.setTint(visual.floorTint);

                // Only apply Light2D pipeline on PC and non-memory maps
                if (mapId !== 'room_memory' && !this.scene.isMobile) {
                    tile.setPipeline('Light2D');
                }

                this.floorLayer.push(tile);

                if (mapData[y][x] === 1) {
                    const wall = this.walls.create(x * 32 + 16, y * 32 + 16, wallTex);
                    if (visual.wallTint !== undefined) wall.setTint(visual.wallTint);
                    if (mapId !== 'room_memory' && !this.scene.isMobile) {
                        wall.setPipeline('Light2D');
                    }
                } else {
                    // Random clutter on floor (5% chance)
                    if (visual.debris !== false && Math.random() < 0.05 && mapId !== 'room_backyard' && mapId !== 'room_entrance' && mapId !== 'room_memory') {
                        const debris = this.scene.add.image(x * 32 + 16 + Phaser.Math.Between(-8, 8), y * 32 + 16 + Phaser.Math.Between(-8, 8), 'trash_paper');
                        debris.setRotation(Phaser.Math.FloatBetween(0, 6.28));
                        debris.setAlpha(0.7);
                        if (visual.paperTint !== undefined) debris.setTint(visual.paperTint);
                        debris.setPipeline('Light2D');
                        this.floorLayer.push(debris);
                    }
                }
            }
        }

        this.createObjects(mapDef.objects, mapId);
    }

    createObjects(objs, mapId) {
        const scene = this.scene;
        const isHorror = mapId !== 'room_memory';

        // Helper to add to interactables
        const addToInteractables = (obj, data) => {
            if (data && (data.dialog || data.id)) {
                this.scene.interactables.add(obj);
                if (data.dialog) obj.dialog = data.dialog;
                if (data.id) obj.objId = data.id;
            }
        };

        // Helper to setup furniture physics (smaller collision box)
        const setupFurniture = (obj, isInteractable = true) => {
            if (obj.body) {
                // Default to bottom 1/3 for collision to allow "walking behind" effect
                const w = obj.width;
                const h = obj.height;
                obj.body.setSize(w * 0.8, h * 0.3);
                obj.body.setOffset(w * 0.1, h * 0.7);
            }
        };

        if (objs.photos) {
            objs.photos.forEach(photoData => {
                const photo = this.photos.create(photoData.x, photoData.y, 'photo_frame');
                if (isHorror) photo.setPipeline('Light2D');
                photo.photoId = photoData.id;
                photo.dialogText = photoData.text;
                // Photos are handled specifically in InteractionManager but we can add them to interactables too
                this.scene.interactables.add(photo);
            });
        }

        if (objs.coffin) {
            scene.coffin = this.furniture.create(objs.coffin.x, objs.coffin.y, 'coffin');
            if (isHorror) scene.coffin.setPipeline('Light2D');
            setupFurniture(scene.coffin);
            // Explicitly set immovable and refresh
            if (scene.coffin.body) {
                scene.coffin.body.immovable = true;
                scene.coffin.refreshBody();

            addToInteractables(scene.coffin, objs.coffin);

        if (objs.altar) {

            addToInteractables(scene.altar, objs.altar);

            scene.leftCandle = scene.add.sprite(objs.altar.x - 30, objs.altar.y - 10, 'candle').setAlpha(0.3);
            scene.rightCandle = scene.add.sprite(objs.altar.x + 30, objs.altar.y - 10, 'candle').setAlpha(0.3);

        if (objs.stove) {

            addToInteractables(scene.spirit_money, objs.spirit_money);
        }

        if (objs.red_key) {
            if (!scene.gameState.hasRedKey) {
                scene.red_key = this.scene.add.image(objs.red_key.x, objs.red_key.y, 'trash_paper');
                if (isHorror) scene.red_key.setPipeline('Light2D');
                scene.red_key.setTint(0xff0000);

        if (objs.toy_plane) {
            scene.toy_plane = this.scene.add.image(objs.toy_plane.x, objs.toy_plane.y, 'toy_plane');
            if (isHorror) scene.toy_plane.setPipeline('Light2D');
            addToInteractables(scene.toy_plane, objs.toy_plane);

        if (objs.toys) {
            scene.toys = scene.physics.add.staticGroup();
            objs.toys.forEach(toyData => {
                const toy = scene.toys.create(toyData.x, toyData.y, toyData.frame);
                if (isHorror) toy.setPipeline('Light2D');
                if (toyData.dialog) {
                    toy.dialog = toyData.dialog;
                    this.scene.interactables.add(toy);
                }
            });
        }

        if (objs.scratches) {
            // Scratches as decals (no physics)
            objs.scratches.forEach(scratchData => {
                const scratch = this.scene.add.image(scratchData.x, scratchData.y, 'scratch');
                if (isHorror) scratch.setPipeline('Light2D');
                if (scratchData.dialog) {
                    scratch.dialog = scratchData.dialog;
                    this.scene.interactables.add(scratch);
                }
            });
        }

        if (objs.notes) {
            // Notes are static group but should not collide?
            // Actually let's use images for notes on floor
            objs.notes.forEach(noteData => {
                const note = this.scene.add.image(noteData.x, noteData.y, 'trash_paper');
                note.setTint(0xffcc00);
                if (isHorror) note.setPipeline('Light2D');
                if (noteData.dialog) {
                    note.dialog = noteData.dialog;
                    this.scene.interactables.add(note);
                }
            });
        }

        if (objs.locked_window) {
            scene.locked_window = scene.add.rectangle(objs.locked_window.x, objs.locked_window.y, 40, 40, 0x0000ff, 0);
            scene.physics.add.existing(scene.locked_window, true);
            scene.locked_window.objId = 'locked_window';
            this.scene.interactables.add(scene.locked_window);
            addToInteractables(scene.locked_window, objs.locked_window);
        }

        if (objs.exit_door) {
            scene.exit_door = scene.add.rectangle(objs.exit_door.x, objs.exit_door.y, 64, 32, 0xff0000, 0);
            scene.physics.add.existing(scene.exit_door, true);
            addToInteractables(scene.exit_door, objs.exit_door);
        }

        if (objs.interactables) {
            objs.interactables.forEach(data => {
                const texture = data.texture || 'trash_paper';
                const item = scene.add.image(data.x, data.y, texture);
                if (data.tint !== undefined) item.setTint(data.tint);
                if (data.alpha !== undefined) item.setAlpha(data.alpha);
                if (data.scale !== undefined) item.setScale(data.scale);
                if (isHorror && !scene.isMobile) item.setPipeline('Light2D');

                scene.physics.add.existing(item, true);
                if (typeof item.refreshBody === 'function') {
                    item.refreshBody();
                } else if (item.body && typeof item.body.updateFromGameObject === 'function') {
                    item.body.updateFromGameObject();
                }

                item.objId = data.id;
                item.dialog = data.dialog;
                item.documentTitle = data.documentTitle;
                item.documentText = data.documentText;
                item.clueId = data.clueId;
                item.clueType = data.clueType;
                item.memoryTrigger = data.memoryTrigger;
                item.memoryReturn = data.memoryReturn;
                item.memoryComplete = data.memoryComplete;
                item.endingChoice = data.endingChoice;
                item.endingWeight = data.endingWeight;
                item.interactLabel = data.interactLabel;
                scene.interactables.add(item);
            });
        }

        if (objs.doors) {
            objs.doors.forEach(doorData => {
                const w = (doorData.w || 1) * 32;
                const h = (doorData.h || 1) * 32;
                const cx = (doorData.x * 32) + (w / 2);
                const cy = (doorData.y * 32) + (h / 2);

                const door = scene.add.rectangle(cx, cy, w + 16, h + 16, 0x00ff00, 0);
                scene.physics.add.existing(door, true);

                // Visual Indicator for Attic Door (since it's just a wall otherwise)
                if (doorData.targetMap === 'room_attic') {
                    const visual = scene.add.rectangle(cx, cy, w, h, 0x000000, 0.8);
                    visual.setDepth(10); // Above wall
                    // Maybe a ladder hint?
                    const ladder = scene.add.graphics();
                    ladder.lineStyle(2, 0x8b4513);
                    ladder.moveTo(cx - 10, cy - 20); ladder.lineTo(cx - 10, cy + 20);
                    ladder.moveTo(cx + 10, cy - 20); ladder.lineTo(cx + 10, cy + 20);
                    for(let i=0; i<5; i++) {
                        ladder.moveTo(cx - 10, cy - 15 + i*8); ladder.lineTo(cx + 10, cy - 15 + i*8);
                    }
                    ladder.strokePath();
                    ladder.setDepth(11);
                }

                door.targetMap = doorData.targetMap;
                door.targetX = doorData.targetX;
                door.targetY = doorData.targetY;
                door.locked = doorData.locked;
                if (door.targetMap === 'room_entrance' && scene.gameState.doorSlammed) {
                    door.locked = true;
                }
                door.key = doorData.key;
                door.isLoop = doorData.isLoop;

                // Handle hidden doors
                if (doorData.hidden) {
                    // Check if it should be revealed based on game state
                    if (door.targetMap === 'room_secret' && scene.gameState.cabinetMoved) {
                        door.visible = true;
                        door.body.enable = true;

                        // Add visual "hole"
                        const hole = scene.add.rectangle(cx, cy, w, h, 0x000000);
                        hole.setDepth(door.depth - 1); // Behind door debug
                    } else {
                        door.visible = false;
                        door.body.enable = false; // Disable physics collision
                        door.isHiddenDoor = true; // Flag for identification
                    }
                }

                this.doors.add(door);
            });
        }

        // Memory Room Objects
        if (objs.table) {
            scene.table = this.furniture.create(objs.table.x, objs.table.y, 'desk');
            addToInteractables(scene.table, { dialog: '一张桌子' });
        }
        if (objs.parents_npc) {
            // Dad (Left)
            scene.dad = this.furniture.create(objs.parents_npc.x - 40, objs.parents_npc.y, 'npc_paper');
            scene.dad.setTint(0xaaaaaa);
            scene.dad.refreshBody();
            // Add interaction
            scene.dad.objId = 'dad_ghost';
            this.scene.interactables.add(scene.dad);

            // Mom (Right)
            scene.mom = this.furniture.create(objs.parents_npc.x + 40, objs.parents_npc.y, 'npc_paper');
            scene.mom.setTint(0xaaaaaa);
            scene.mom.refreshBody();
            // Add interaction
            scene.mom.objId = 'mom_ghost';
            this.scene.interactables.add(scene.mom);
        }

        if (objs.black_cloth) {
             scene.black_cloth = scene.add.rectangle(objs.black_cloth.x, objs.black_cloth.y, 40, 40, 0x000000, 0);
             scene.physics.add.existing(scene.black_cloth, true);
             addToInteractables(scene.black_cloth, objs.black_cloth);
        }
    }
}

        // BEGIN bundled src/systems/InteractionManager.js

class InteractionManager {
    constructor(scene) {
        this.scene = scene;
        this.interactText = scene.interactText;
        this.gameState = scene.gameState;
    }

    update() {
        this.checkInteraction();
    }

    ensureStoryFlags() {
        return ensureStoryFlags(this.gameState);
    }

    collectClue(clueId, clueType) {
        return collectClue(this.gameState, clueId, clueType);
    }

    getTruthLevel() {
        return getTruthLevel(this.gameState);
    }

    // Helper to get distance to object bounds
    getDistanceToObj(px, py, obj) {
        if (!obj || !obj.active) return Infinity;

        // Debug: Log interaction attempt for ghosts/safe
        // const isTarget = obj.objId === 'kitchen_ghost' || obj.objId === 'safe';

        let distBody = Infinity;

        // If object has a physics body, use it for accurate bounds
        if (obj.body) {
            // obj.body.x/y is top-left in world space
            const left = obj.body.x;
            const right = obj.body.x + obj.body.width;
            const top = obj.body.y;
            const bottom = obj.body.y + obj.body.height;

            const closestX = Phaser.Math.Clamp(px, left, right);
            const closestY = Phaser.Math.Clamp(py, top, bottom);

            distBody = Phaser.Math.Distance.Between(px, py, closestX, closestY);
        }

        // Fallback to center distance (robustness for desynced bodies)
        const distCenter = Phaser.Math.Distance.Between(px, py, obj.x, obj.y);

        // Return the smaller of the two to ensure interaction works if player is "visually" close
        // Special case: If distance is very small (colliding), return 0 to guarantee interaction
        if (distBody < 5) return 0;

        return Math.min(distBody, distCenter);
    }

    // Debug: Visualize interaction range
    debugInteraction(px, py, closestObj, closestDist, threshold) {
        if (!this.scene.debugGraphics) {
            this.scene.debugGraphics = this.scene.add.graphics().setDepth(1000);
        }
        const g = this.scene.debugGraphics;
        g.clear();

        // Player position
        g.lineStyle(1, 0x00ff00);
        g.strokeCircle(px, py, 10);

        if (closestObj) {
            // Line to closest object
            g.lineStyle(1, closestDist < threshold ? 0x00ff00 : 0xff0000);
            g.lineBetween(px, py, closestObj.x, closestObj.y);

            // Object bounds
            if (closestObj.body) {
                g.strokeRect(closestObj.body.x, closestObj.body.y, closestObj.body.width, closestObj.body.height);
            }
        }
    }

    checkInteraction() {
        // Prevent accidental re-trigger
        if (Date.now() - (window.lastDialogCloseTime || 0) < 500) return;

        let target = null;
        const px = this.scene.player.sprite.x;
        const py = this.scene.player.sprite.y;
        const scene = this.scene;

        // Interaction distance threshold
        const INTERACT_DIST = 80;

        // --- 1. Priority Interactions (Logic Heavy / Conditional) ---
        // These are objects that might NOT be in the generic loop or need special conditions

        if (scene.npc && scene.npc.visible) {
            if (this.getDistanceToObj(px, py, scene.npc) < 100) target = { type: 'npc', obj: scene.npc };
        }

        // --- 2. Generic Interactions (Everything in interactables group) ---
        // MapManager adds almost everything to scene.interactables
        if (!target && scene.interactables) {
            let closestDist = Infinity;
            let closestObj = null;

            scene.interactables.getChildren().forEach(obj => {
                // If object is hidden/disabled, skip
                if (!obj.active || (obj.visible === false)) return;

                const dist = this.getDistanceToObj(px, py, obj);

                // Adjust threshold based on object type if needed
                let threshold = INTERACT_DIST;
                if (obj.texture && obj.texture.key === 'car') threshold = 120; // Bigger reach for cars
                if (obj.objId === 'parents_cabinet') threshold = 100; // Easier access for secret room
                if (obj.texture && obj.texture.key === 'toy_plane') threshold = 40; // Harder to accidentally click
                if (obj.texture && obj.texture.key === 'well') threshold = 100; // Easier access for well
                if (obj.objId === 'dad_ghost' || obj.objId === 'mom_ghost' || obj.objId === 'kitchen_ghost') threshold = 120; // Increased reach
                if (obj === scene.safe || obj.objId === 'safe' || (obj.texture && obj.texture.key === 'safe')) threshold = 120; // Increased reach for safe
                if (obj === scene.family_rules) threshold = 80; // Reset to normal range now that it has body


                if (dist < threshold) {
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestObj = obj;
                        // this.debugInteraction(px, py, closestObj, closestDist, threshold);
                    }
                }
            });

            // DEBUG: Force interaction debug if safe or ghost is nearby
            // scene.interactables.getChildren().forEach(obj => {
            //     if (obj.objId === 'safe' || obj.objId === 'kitchen_ghost') {
            //         const d = this.getDistanceToObj(px, py, obj);
            //         if (d < 200) console.log(`Obj: ${obj.objId}, Dist: ${d}, Active: ${obj.active}, Body: ${!!obj.body}`);
            //     }
            // });

            if (closestObj) {
                const obj = closestObj;
                // Determine type for logic dispatch
                let type = 'generic';

                // Identify specific objects by reference OR texture/properties
                // Priority: Specific IDs/Refs -> Generic Textures

                if (obj.memoryTrigger || obj.memoryReturn || obj.clueType || obj.documentText || obj.endingChoice) type = 'story_object';
                else if (obj === scene.safe || obj.objId === 'safe' || (obj.texture && obj.texture.key === 'safe')) type = 'safe';
                else if (obj.objId === 'dad_ghost') type = 'dad_ghost';
                else if (obj.objId === 'mom_ghost') type = 'mom_ghost';
                else if (obj.objId === 'kitchen_ghost') type = 'kitchen_ghost';
                else if (obj === scene.chest) type = 'chest';
                else if (obj === scene.bed || (obj.texture && obj.texture.key === 'bed')) type = 'bed';
                else if (obj === scene.cabinet || (obj.texture && obj.texture.key === 'cabinet')) type = 'cabinet';
                else if (obj === scene.table && scene.currentMapId === 'room_memory') type = 'memory_table';
                else if (obj === scene.desk || (obj.texture && obj.texture.key === 'desk')) type = 'desk';
                else if (obj === scene.black_cloth) type = 'black_cloth';
                else if (obj === scene.toy_plane || (obj.texture && obj.texture.key === 'toy_plane')) type = 'toy_plane';
                else if (obj === scene.locked_window) type = 'locked_window';
                else if (obj === scene.diary || (obj.texture && obj.texture.key === 'diary')) type = 'diary';
                else if (obj === scene.medical_record) type = 'medical_record';
                else if (obj === scene.wet_paper) type = 'wet_paper';
                else if (obj === scene.family_rules) type = 'family_rules';
                else if (obj === scene.sink || (obj.texture && obj.texture.key === 'kitchen_sink')) type = 'sink';
                else if (obj === scene.toilet || (obj.texture && obj.texture.key === 'toilet')) type = 'toilet';
                else if (obj === scene.mirror) type = 'mirror';
                else if (obj === scene.well || (obj.texture && obj.texture.key === 'well')) type = 'well';
                else if (obj === scene.exit_door) type = 'exit_door';
                else if (obj === scene.car || (obj.texture && obj.texture.key === 'car')) type = 'car';
                else if (obj === scene.crashed_car) type = 'crashed_car';

                // Identify groups or special properties
                else if (obj.photoId !== undefined) type = 'photo';
                else if (obj.objId === 'kitchen_cabinet' || obj.objId === 'parents_cabinet') type = 'cabinet'; // Fallback if ref check fails

                // Priority Items (Ensure we pick them up correctly even if generic loop finds them)
                if (obj === scene.dirtPile) {
                        if (!this.gameState.hasRice) type = 'dirt';
                        else type = 'generic'; // Show description if already have rice
                }
                else if (obj === scene.stove) {
                        if (!this.gameState.hasMatches) type = 'stove';
                        else type = 'generic';
                }
                else if (obj === scene.incense) {
                        if (!this.gameState.hasIncense) type = 'incense';
                        else return; // Don't interact if already picked up (usually destroyed)
                }
                else if (obj === scene.spirit_money) {
                        if (!this.gameState.hasSpiritMoney) type = 'spirit_money';
                        else return;
                }
                else if (obj === scene.red_key) {
                        if (!this.gameState.hasRedKey) type = 'red_key';
                        else return;
                }
                else if (obj === scene.altar) type = 'altar';
                else if (obj === scene.coffin) type = 'coffin';

                target = { type: type, obj: obj };
            }
        }

        if (target) {
            scene.interactText.setPosition(px, py - 40).setVisible(true);
            scene.currentTarget = target;

            if (Phaser.Input.Keyboard.JustDown(scene.keyE) || Phaser.Input.Keyboard.JustDown(scene.keySpace)) {
                this.handleInteraction();
            }
        } else {
            scene.interactText.setVisible(false);
            scene.currentTarget = null;
        }
    }

    handleInteraction() {
        const scene = this.scene;
        if (!scene.currentTarget) return;
        const { type, obj } = scene.currentTarget;

        // Safety check: if object is already destroyed/inactive, ignore
        if (obj && !obj.active) {
            scene.currentTarget = null;
            return;
        }

        // --- Helper: Show Dialog Sequence ---
        const showDialogSequence = (dialogData, callback) => {
            if (Array.isArray(dialogData)) {
                const showSequence = (index) => {
                    if (index >= dialogData.length) {
                        if (callback) callback();
                        return;
                    }
                    const item = dialogData[index];
                    const speaker = item.speaker || '主角';
                    const text = item.text || item;
                    window.showDialog(speaker, text, () => showSequence(index + 1));
                };
                showSequence(0);
            } else {
                window.showDialog('主角', dialogData, callback);
            }
        };

        // --- Logic Execution Phase ---
        // This runs EITHER after the dialog is closed, OR immediately if there is no dialog.
        const executeLogic = () => {

            if (type === 'story_object') {
                const afterClue = () => {
                    if (obj.memoryComplete) {
                        const flags = this.ensureStoryFlags();
                        flags.memories[obj.memoryComplete] = true;
                    }

                    if (obj.memoryTrigger) {
                        scene.switchScene(obj.memoryTrigger.mapId, obj.memoryTrigger.x, obj.memoryTrigger.y);
                        return;
                    }

                    if (obj.memoryReturn) {
                        scene.switchScene(obj.memoryReturn.mapId, obj.memoryReturn.x, obj.memoryReturn.y);
                        return;
                    }

                    if (obj.endingChoice) {
                        this.handleEndingChoice(obj.endingChoice);
                    }
                };

                const collected = obj.clueId && obj.clueType ? this.collectClue(obj.clueId, obj.clueType) : false;
                if (collected && scene.playSound) scene.playSound(400, 'triangle', 0.4);

                if (obj.documentText) {
                    window.showDocument(obj.documentTitle || '线索', obj.documentText);
                    afterClue();
                } else {
                    afterClue();
                }
                return;
            }

            // 1. Memory Room
            if (type === 'memory_table' || (scene.currentMapId === 'room_memory' && (type === 'dad_ghost' || type === 'mom_ghost'))) {
                 // Hardcoded sequence for ending
                window.showDialog('父亲的幻影', '（跪在地上，对着空气痛哭）明儿...我的明儿...是爸对不起你...那天我不该骂你...如果不把你锁起来...你就不会偷偷跑出去...就不会出车祸...', () => {
                    scene.time.delayedCall(1000, () => {
                        window.showDialog('母亲', '（温柔地出现）明儿，饭菜都凉了。快来吃吧，我们一家人，终于团聚了。', () => {
                            scene.cameras.main.shake(1000, 0.005);
                            window.showDialog('主角', '爸，妈...其实我一直都知道。那场车祸...十年前就已经发生了。我早就该走了。', () => {
                                window.showDialog('父亲', '（紧紧抓住主角的手）不！明儿，别走！我们已经错过了十年...剩下的时间，我们要永远在一起！', () => {
                                    window.showDialog('主角', '（含泪微笑）好...我不走。我们永远不分开。', () => {
                                        scene.cameras.main.fadeOut(4000, 255, 255, 255);
                                        scene.time.delayedCall(4000, () => {
                                             window.showEndingScreen('结局：永远在一起', '在那个没有痛苦、没有分离的世界里，你们永远在一起。', () => {
                                                 window.location.reload();
                                             });
                                        });
                                    });
                                });
                            });
                        });
                    });
                });
                return;
            }

            // 2. Functional Items
            if (type === 'cabinet') {
                // Safety check for parents cabinet if ID is missing but it matches the object
                if (!obj.objId && scene.currentMapId === 'room_bedroom_parents' && obj === scene.cabinet) {
                    obj.objId = 'parents_cabinet';
                }

                if (obj.objId === 'kitchen_cabinet') {
                    if (!this.gameState.hasRice) {
                        this.gameState.hasRice = true;
                        window.updateInventory('倒头饭');
                        scene.playSound(400, 'triangle', 0.5);
                        window.showDialog('主角', '柜子里有一碗发馊的饭...这是给死人的供品。你获得了【倒头饭】。', () => {
                            if (scene.eventManager) scene.eventManager.triggerPaperDollEvent();
                        });
                    } else {
                        window.showDialog('主角', '柜子已经空了。');
                    }
                    return;
                } else if (obj.objId === 'parents_cabinet') {
                    if (!this.gameState.cabinetMoved) {
                        window.showDialog('主角', '这个柜子后面...有风？好像可以推开。', () => {
                            scene.tweens.add({
                                targets: obj,
                                x: obj.x - 32,
                                duration: 1000,
                                ease: 'Power2',
                                onComplete: () => {
                                    this.gameState.cabinetMoved = true;
                                    if (scene.soundManager) scene.soundManager.playNoise(1.0);

                                    if (scene.doors) {
                                        scene.doors.getChildren().forEach(door => {
                                            if (door.targetMap === 'room_secret') {
                                                door.body.enable = true;
                                                door.visible = true;
                                                console.log("Secret door unlocked!");
                                            }
                                        });
                                    }
                                    window.showDialog('主角', '果然...这里有个暗门。');
                                }
                            });

                    } else {
                        window.showDialog('主角', '暗门已经打开了。');

                    return;

            if (type === 'desk' && scene.currentMapId === 'room_secret') {
                if (!this.gameState.hasMatches) {
                     window.showDialog('主角', '工作台上有一盒火柴。', () => {

                          window.updateInventory('火柴');

                     scene.toggleHide();

                     scene.toggleHide();
                }

            }

            if (type === 'diary') {

可是...那场车祸带走了他，也带走了我的魂。

明儿，是你回来了吗？
如果是你，带妈妈走吧。
`;
                scene.triggerFlashback('diary');
                if (!this.gameState.clues.includes('diary')) this.gameState.clues.push('diary');
                window.showDocument('残破的日记', diaryContent);

            if (type === 'medical_record') {
                 this.collectClue('medical_record', 'illness');

            if (type === 'well') {

                                                    window.showDialog('主角', '你拼命挣扎，在混乱中抓住了井边铁钩上的一把【血红钥匙】，并将尸体踹回了井里。', () => {
                                                        window.showDialog('主角', '这把钥匙...是血红色的。奶奶说钥匙在"他"肚子里，难道是指...');

                                                        this.gameState.isChasing = true;
                                                        scene.spawnChaser();
                                                        scene.chaseTimer = scene.time.addEvent({
                                                            delay: 2000,
                                                            callback: () => {
                                                                scene.cameras.main.shake(200, 0.01);
                                                                if (scene.soundManager && scene.chaser && scene.chaser.active) {
                                                                    scene.soundManager.playSpatialNoise(0.5, scene.chaser.x, scene.chaser.y);
                                                                }
                                                            },
                                                            loop: true
                                                        });
                                                        window.showDialog('恐怖的声音', '是他...那个把门窗都钉死的人！他不想让你打开棺材看到真相！快跑！！！');
                                                    });
                                                });
                                            });
                                        });
                                    });
                                });
                            });
                        });
                    });
                }
                return;
            }
        };

        // --- Execution Strategy ---
        // If obj has dialog, show it first. Then execute logic.
        // Unless it's a type where logic overrides dialog flow (like Memory Table which handles its own dialogs).

        if (type === 'memory_table') {
            executeLogic(); // Handles its own dialogs
        } else if (obj.dialog) {
            showDialogSequence(obj.dialog, executeLogic);
        } else {
            executeLogic();
        }
    }

    handleEndingChoice(choice) {
        const scene = this.scene;
        const flags = this.ensureStoryFlags();
        flags.endingChoice = choice;

        if (choice === 'leave') {
            window.showDialog('主角', '我不再回头了。雨声还在，可那座宅子终于离我越来越远。', () => {
                scene.cameras.main.fadeOut(2500, 255, 255, 255);
                scene.time.delayedCall(2500, () => {

                        scene.scene.start('TitleScene');
                        window.globalGameState = null;
                    });
                });
            });
            return;
        }

        if (choice === 'return') {
            window.showDialog('主角', '如果这就是我最后一次回家，那至少让我亲手推开那扇门。', () => {
                scene.switchScene('room_memory', 320, 400);
            });
        }
    }

class BootScene extends Phaser.Scene {
    constructor() {
        super('BootScene');
    }

    preload() {
        // Generate all procedural textures
        TextureGenerator.generate(this);
    }

    create() {
        // Manually slice player sheet
        if (this.textures.exists('player_sheet')) {
            const texture = this.textures.get('player_sheet');
            const frameWidth = 32;
            const frameHeight = 48;
            if (texture.frameTotal === 1) {
                let frameIndex = 0;
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 3; col++) {
                        texture.add(frameIndex, 0, col * frameWidth, row * frameHeight, frameWidth, frameHeight);
                        frameIndex++;
                    }
                }
            }
        }
        this.scene.start('TitleScene');
    }
}

class TitleScene extends Phaser.Scene {
    constructor() {
        super('TitleScene');
    }

    create() {
        this.cameras.main.setBackgroundColor('#000000');

        // Reset Global Game State COMPLETELY
        window.globalGameState = createDefaultGameState();

        // Clear Inventory UI
        const invSlots = document.getElementById('inv-slots');
        if (invSlots) invSlots.innerHTML = '';

        // Cleanup UI from previous game
        const dialogBox = document.getElementById('dialog-box');
        if (dialogBox) dialogBox.classList.add('hidden');
        document.getElementById('inventory').style.display = 'none';
        document.getElementById('joystick-zone').style.display = 'none';
        document.getElementById('action-btn').style.display = 'none';
        window.dialogActive = false;

        // Init Sound
        this.input.keyboard.once('keydown', () => {
            if (!this.game.soundManager) {
                this.game.soundManager = new SoundManager(this);
            }
        });

        const titleText = this.add.text(400, 200, '回 煞', {
            fontFamily: '"SimSun", serif',
            fontSize: '80px',
            color: '#8b0000',
            fontStyle: 'bold'
        }).setOrigin(0.5);

        const authorText = this.add.text(400, 280, '作者WeChat：baidai_baidai', {
            fontFamily: '"SimSun", serif',
            fontSize: '24px',
            color: '#aaaaaa'
        }).setOrigin(0.5);

        this.tweens.add({
            targets: titleText,
            alpha: 0.5,
            duration: 2000,
            yoyo: true,
            repeat: -1
        });

        const startText = this.add.text(400, 410, '开始游戏  [空格]', {
            fontFamily: '"SimSun", serif',
            fontSize: '24px',
            color: '#aaaaaa'
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        startText.setAlpha(0);

        // Fade in start text after delay to prevent accidental clicks
        this.tweens.add({
            targets: startText,
            alpha: 1,
            duration: 1000,
            delay: 200 // Reduced delay for better UX
        });

        const startGame = () => {
            if (startText.alpha < 0.1) return; // Lower threshold

            // Remove listeners to prevent multiple calls
            this.input.keyboard.off('keydown-SPACE', startGame);
            this.input.keyboard.off('keydown-ENTER', startGame);
            startText.off('pointerdown', startGame);

            if (!this.game.soundManager) {
                this.game.soundManager = new SoundManager(this);
            }
            this.game.soundManager.playTone(100, 'sawtooth', 2);
            this.cameras.main.fadeOut(1000, 0, 0, 0);
            this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
                const route = resolveStartRoute(window.location.search);
                this.scene.start(route.scene, route.data);
            });
        };

        this.input.keyboard.on('keydown-SPACE', startGame);
        this.input.keyboard.on('keydown-ENTER', startGame);
        startText.on('pointerdown', startGame);
    }
}
