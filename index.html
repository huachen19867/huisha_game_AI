class InteractionManager {
    constructor(scene) {
        this.scene = scene;
        this.interactText = scene.interactText;
        this.gameState = scene.gameState;
    }

    update() {
        this.checkInteraction();
    }

    ensureStoryFlags() {
        return ensureStoryFlags(this.gameState);
    }

    collectClue(clueId, clueType) {
        const collected = collectClue(this.gameState, clueId, clueType);
        if (collected) this.scene.queueNarrativeBeat?.();
        return collected;
    }

    getTruthLevel() {
        return getTruthLevel(this.gameState);
    }

    openConfiguredPuzzle(obj) {
        const flags = this.ensureStoryFlags();
        const puzzle = Puzzles[obj?.puzzleId];
        if (!puzzle) {
            window.showDialog('系统', '这件机关的配置缺失了。你可以先离开，不会丢失进度。');
            return;
        }

        const evidenceIds = [...flags.collectedClues, ...flags.caseConclusions];
        if (!canStartPuzzle(puzzle, evidenceIds)) {
            const missingCount = puzzle.prerequisites.filter(id => !evidenceIds.includes(id)).length;
            window.showDialog('主角', `还缺 ${missingCount} 条能支撑判断的现场证据。`);
            return;
        }

        const progress = flags.puzzleProgress[puzzle.id] || createPuzzleProgress(puzzle);
        if (progress.solved) {
            window.showDialog('主角', puzzle.successText);
            return;
        }
        window.showPuzzle({ ...puzzle, availableEvidence: evidenceIds }, progress, {
            onChange: nextProgress => {
                flags.puzzleProgress[puzzle.id] = nextProgress;
            },
            onMistake: result => {
                this.scene.hauntingDirector?.onPuzzleMistake?.(puzzle.id, flags.puzzleProgress[puzzle.id]?.attempts || 0, result);
            },
            onSuccess: () => {
                const collected = obj.clueId && obj.clueType ? this.collectClue(obj.clueId, obj.clueType) : false;
                if (collected && this.scene.playSound) this.scene.playSound(400, 'triangle', 0.4);
                const outcome = applyPuzzleOutcome(this.gameState, puzzle);
                this.scene.queueNarrativeBeat?.();
                if (outcome.newlyCompleted && outcome.rewardItem) window.updateInventory(outcome.rewardItem);
                if (puzzle.id === 'kitchen_table') this.scene.eventManager?.triggerPaperDollEvent();
                if (puzzle.id === 'well_knots' && this.scene.incense) {
                    this.scene.incense.destroy();
                    this.scene.incense = null;
                }
                if (puzzle.id === 'attic_debt' && this.scene.spirit_money) {
                    this.scene.spirit_money.destroy();
                    this.scene.spirit_money = null;
                }
                if (puzzle.ritual) {
                    this.scene.leftCandle?.setAlpha(1);
                    this.scene.rightCandle?.setAlpha(1);
                    this.scene.playSound(600, 'sine', 1);
                    this.scene.doors?.getChildren().forEach(door => {
                        if (door.targetMap === 'room_entrance') door.locked = false;
                    });
                }
                this.scene.refreshObjective();
                window.showDialog('主角', puzzle.successText, () => {
                    if (obj.memoryReturn) this.scene.switchScene(obj.memoryReturn.mapId, obj.memoryReturn.x, obj.memoryReturn.y);
                });
            },
            onClose: () => this.scene.refreshObjective()
        });
    }

    // Helper to get distance to object bounds
    getDistanceToObj(px, py, obj) {
        if (!obj || !obj.active) return Infinity;

        // Debug: Log interaction attempt for ghosts/safe
        // const isTarget = obj.objId === 'kitchen_ghost' || obj.objId === 'safe';

        let distBody = Infinity;

        // If object has a physics body, use it for accurate bounds
        if (obj.body) {
            // obj.body.x/y is top-left in world space
            const left = obj.body.x;
            const right = obj.body.x + obj.body.width;
            const top = obj.body.y;
            const bottom = obj.body.y + obj.body.height;

            const closestX = Phaser.Math.Clamp(px, left, right);
            const closestY = Phaser.Math.Clamp(py, top, bottom);

            distBody = Phaser.Math.Distance.Between(px, py, closestX, closestY);
        }

        // Fallback to center distance (robustness for desynced bodies)
        const distCenter = Phaser.Math.Distance.Between(px, py, obj.x, obj.y);

        // Return the smaller of the two to ensure interaction works if player is "visually" close
        // Special case: If distance is very small (colliding), return 0 to guarantee interaction
        if (distBody < 5) return 0;

        return Math.min(distBody, distCenter);
    }

    // Debug: Visualize interaction range
    debugInteraction(px, py, closestObj, closestDist, threshold) {
        if (!this.scene.debugGraphics) {
            this.scene.debugGraphics = this.scene.add.graphics().setDepth(1000);
        }
        const g = this.scene.debugGraphics;
        g.clear();

        // Player position
        g.lineStyle(1, 0x00ff00);
        g.strokeCircle(px, py, 10);

        if (closestObj) {
            // Line to closest object
            g.lineStyle(1, closestDist < threshold ? 0x00ff00 : 0xff0000);
            g.lineBetween(px, py, closestObj.x, closestObj.y);

            // Object bounds
            if (closestObj.body) {
                g.strokeRect(closestObj.body.x, closestObj.body.y, closestObj.body.width, closestObj.body.height);
            }
        }
    }

    checkInteraction() {
        // Prevent accidental re-trigger
        if (Date.now() - (window.lastDialogCloseTime || 0) < 500) return;

        let target = null;
        const px = this.scene.player.sprite.x;
        const py = this.scene.player.sprite.y;
        const scene = this.scene;

        // Interaction distance threshold
        const INTERACT_DIST = 80;

        // Generic interactions are selected by story priority, facing and then distance.
        // MapManager adds almost everything to scene.interactables
        if (!target && scene.interactables) {
            const candidates = [];

            scene.interactables.getChildren().forEach(obj => {
                // If object is hidden/disabled, skip
                if (!obj.active || (obj.visible === false)) return;

                const dist = this.getDistanceToObj(px, py, obj);

                obj.interaction ||= normalizeInteractionMeta({
                    id: obj.objId,
                    dialog: obj.dialog,
                    documentTitle: obj.documentTitle,
                    documentText: obj.documentText,
                    clueId: obj.clueId,
                    itemGrant: obj.itemGrant,
                    puzzleId: obj.puzzleId,
                    memoryTrigger: obj.memoryTrigger,
                    endingChoice: obj.endingChoice
                }, { textureKey: obj.texture?.key });
                const threshold = obj.interaction.radius || INTERACT_DIST;
                if (dist < threshold) {
                    const dx = obj.x - px;
                    const dy = obj.y - py;
                    const length = Math.hypot(dx, dy) || 1;
                    const facingDot = (dx / length) * (scene.player.facingX || 0) + (dy / length) * (scene.player.facingY || 1);
                    candidates.push({ obj, distance: dist, priority: obj.interaction.priority, facingDot });
                }
            });

            const closestObj = selectInteractionCandidate(candidates)?.obj || null;

            // DEBUG: Force interaction debug if safe or ghost is nearby
            // scene.interactables.getChildren().forEach(obj => {
            //     if (obj.objId === 'safe' || obj.objId === 'kitchen_ghost') {
            //         const d = this.getDistanceToObj(px, py, obj);
            //         if (d < 200) console.log(`Obj: ${obj.objId}, Dist: ${d}, Active: ${obj.active}, Body: ${!!obj.body}`);
            //     }
            // });

            if (closestObj) {
                const obj = closestObj;
                // Determine type for logic dispatch
                let type = 'generic';

                // Identify specific objects by reference OR texture/properties
                // Priority: Specific IDs/Refs -> Generic Textures

                if (obj.puzzleId || obj.itemGrant || obj.memoryTrigger || obj.memoryReturn || obj.clueType || obj.documentText || obj.endingChoice) type = 'story_object';
                else if (obj === scene.safe || obj.objId === 'safe' || (obj.texture && obj.texture.key === 'safe')) type = 'safe';
                else if (obj.objId === 'dad_ghost') type = 'dad_ghost';
                else if (obj.objId === 'mom_ghost') type = 'mom_ghost';
                else if (obj.objId === 'kitchen_ghost') type = 'kitchen_ghost';
                else if (obj === scene.chest) type = 'chest';
                else if (obj === scene.bed || (obj.texture && obj.texture.key === 'bed')) type = 'bed';
                else if (obj === scene.cabinet || (obj.texture && obj.texture.key === 'cabinet')) type = 'cabinet';
                else if (obj === scene.table && scene.currentMapId === 'room_memory') type = 'memory_table';
                else if (obj === scene.desk || (obj.texture && obj.texture.key === 'desk')) type = 'desk';
                else if (obj === scene.black_cloth) type = 'black_cloth';
                else if (obj === scene.toy_plane || (obj.texture && obj.texture.key === 'toy_plane')) type = 'toy_plane';
                else if (obj === scene.locked_window) type = 'locked_window';
                else if (obj === scene.diary || (obj.texture && obj.texture.key === 'diary')) type = 'diary';
                else if (obj === scene.medical_record) type = 'medical_record';
                else if (obj === scene.wet_paper) type = 'wet_paper';
                else if (obj === scene.family_rules) type = 'family_rules';
                else if (obj === scene.sink || (obj.texture && obj.texture.key === 'kitchen_sink')) type = 'sink';
                else if (obj === scene.toilet || (obj.texture && obj.texture.key === 'toilet')) type = 'toilet';
                else if (obj === scene.mirror) type = 'mirror';
                else if (obj === scene.well || (obj.texture && obj.texture.key === 'well')) type = 'well';
                else if (obj === scene.exit_door) type = 'exit_door';
                else if (obj === scene.car || (obj.texture && obj.texture.key === 'car')) type = 'car';
                else if (obj === scene.crashed_car) type = 'crashed_car';

                // Identify groups or special properties
                else if (obj.photoId !== undefined) type = 'photo';
                else if (obj.objId === 'kitchen_cabinet' || obj.objId === 'parents_cabinet') type = 'cabinet'; // Fallback if ref check fails

                // Priority Items (Ensure we pick them up correctly even if generic loop finds them)
                if (obj === scene.dirtPile) {
                        if (!this.gameState.hasRice) type = 'dirt';
                        else type = 'generic'; // Show description if already have rice
                }
                else if (obj === scene.stove) {
                        if (!this.gameState.hasMatches) type = 'stove';
                        else type = 'generic';
                }
                else if (obj === scene.incense) {
                        if (!this.gameState.hasIncense) type = 'incense';
                        else return; // Don't interact if already picked up (usually destroyed)
                }
                else if (obj === scene.spirit_money) {
                        if (!this.gameState.hasSpiritMoney) type = 'spirit_money';
                        else return;
                }
                else if (obj === scene.red_key) {
                        if (!this.gameState.hasRedKey) type = 'red_key';
                        else return;
                }
                else if (obj === scene.altar) type = 'altar';
                else if (obj === scene.coffin) type = 'coffin';

                target = { type: type, obj: obj };
            }
        }

        if (target) {
            scene.interactText.setText(formatInteractionPrompt(target.obj.interaction || normalizeInteractionMeta({ id: target.obj.objId }, { textureKey: target.obj.texture?.key })));
            scene.interactText.setPosition(px, py - 40).setVisible(true);
            scene.currentTarget = target;

            if (Phaser.Input.Keyboard.JustDown(scene.keyE) || Phaser.Input.Keyboard.JustDown(scene.keySpace)) {
                this.handleInteraction();
            }
        } else {
            scene.interactText.setVisible(false);
            scene.currentTarget = null;
        }
    }

    handleInteraction() {
        const scene = this.scene;
        if (!scene.currentTarget) return;
        const { type, obj } = scene.currentTarget;

        // Safety check: if object is already destroyed/inactive, ignore
        if (obj && !obj.active) {
            scene.currentTarget = null;
            return;
        }

        // --- Helper: Show Dialog Sequence ---
        const showDialogSequence = (dialogData, callback) => {
            if (Array.isArray(dialogData)) {
                const showSequence = (index) => {
                    if (index >= dialogData.length) {
                        if (callback) callback();
                        return;
                    }
                    const item = dialogData[index];
                    const speaker = item.speaker || '主角';
                    const text = item.text || item;
                    window.showDialog(speaker, text, () => showSequence(index + 1));
                };
                showSequence(0);
            } else {
                window.showDialog('主角', dialogData, callback);
            }
        };

        // --- Logic Execution Phase ---
        // This runs EITHER after the dialog is closed, OR immediately if there is no dialog.
        const executeLogic = () => {

            if (type === 'story_object') {
                if (obj.itemGrant === 'family_photo_corner') {
                    const flags = this.ensureStoryFlags();
                    if (!flags.familyPhotoCornerFound) {
                        flags.familyPhotoCornerFound = true;
                        window.updateInventory('全家福缺角');
                        if (reconcileFamilyPhoto(this.gameState)) window.replaceInventoryItem('残缺全家福', '完整全家福');
                        scene.refreshObjective();
                    }
                    return;
                }

                if (obj.puzzleId) {
                    this.openConfiguredPuzzle(obj);
                    return;
                }

                const afterClue = () => {
                    if (obj.memoryComplete) {
                        const flags = this.ensureStoryFlags();
                        flags.memories[obj.memoryComplete] = true;
                    }

                    if (obj.memoryTrigger) {
                        scene.switchScene(obj.memoryTrigger.mapId, obj.memoryTrigger.x, obj.memoryTrigger.y);
                        return;
                    }

                    if (obj.memoryReturn) {
                        scene.switchScene(obj.memoryReturn.mapId, obj.memoryReturn.x, obj.memoryReturn.y);
                        return;
                    }

                    if (obj.endingChoice) {
                        if (!canChooseCrashEnding(this.gameState)) {
                            window.showDialog('主角', '车门和护栏之间还缺一段记忆。');
                            return;
                        }
                        this.handleEndingChoice(obj.endingChoice);
                    }
                };

                const collected = obj.clueId && obj.clueType ? this.collectClue(obj.clueId, obj.clueType) : false;
                if (collected && scene.playSound) scene.playSound(400, 'triangle', 0.4);
                if (obj.objId === 'crash_car_memory') this.ensureStoryFlags().crashEvidence.car = true;
                if (obj.objId === 'crash_guardrail') this.ensureStoryFlags().crashEvidence.guardrail = true;
                const evidence = this.ensureStoryFlags().crashEvidence;
                if (evidence.car && evidence.guardrail) this.ensureStoryFlags().memories.crash = true;

                if (obj.documentText) {
                    window.showDocument(obj.documentTitle || '线索', obj.documentText);
                    afterClue();
                } else {
                    afterClue();
                }
                return;
            }

            // 1. Memory Room
            if (type === 'memory_table' || (scene.currentMapId === 'room_memory' && (type === 'dad_ghost' || type === 'mom_ghost'))) {
                 // Hardcoded sequence for ending
                window.showDialog('父亲', '我锁过你的门，也藏过你妈的药。这些错不能拿一句“为你好”抵掉。', () => {
                    scene.time.delayedCall(1000, () => {
                        window.showDialog('母亲', '明儿，饭凉了。坐下吧，这次谁也不用走。', () => {
                            scene.cameras.main.shake(1000, 0.005);
                            window.showDialog('主角', '我知道这顿饭永远吃不完。但如果离开就要再失去你们一次……我不走了。', () => {
                                window.showDialog('母亲', '母亲又说了一遍：“饭凉了。”碗里的热气回到最初的形状。', () => {
                                    window.showDialog('父亲', '父亲起身，重新锁上了门。墙上的钟倒回七月十四零点。', () => {
                                        scene.cameras.main.fadeOut(4000, 255, 255, 255);
                                        scene.time.delayedCall(4000, () => {
                                             window.showEndingScreen('结局：永远在一起', '你主动留在了最温暖的那一刻。从此每顿饭都会凉，每扇门都会再次锁上。', () => {
                                                 window.location.reload();
                                             });
                                        });
                                    });
                                });
                            });
                        });
                    });
                });
                return;
            }

            // 2. Functional Items
            if (type === 'cabinet') {
                // Safety check for parents cabinet if ID is missing but it matches the object
                if (!obj.objId && scene.currentMapId === 'room_bedroom_parents' && obj === scene.cabinet) {
                    obj.objId = 'parents_cabinet';
                }

                if (obj.objId === 'kitchen_cabinet') {
                    if (!this.gameState.hasRice) {
                        this.openConfiguredPuzzle({ ...obj, puzzleId: 'kitchen_table' });
                    } else {
                        window.showDialog('主角', getObjectReflection(this.gameState, 'rice'));
                    }
                    return;
                } else if (obj.objId === 'parents_cabinet') {
                    if (!this.gameState.cabinetMoved) {
                        window.showDialog('主角', '这个柜子后面...有风？好像可以推开。', () => {
                            scene.tweens.add({
                                targets: obj,
                                x: obj.x - 32,
                                duration: 1000,
                                ease: 'Power2',
                                onComplete: () => {
                                    syncStaticBody(obj);
                                    this.gameState.cabinetMoved = true;
                                    if (scene.soundManager) scene.soundManager.playNoise(1.0);

                                    if (scene.doors) {
                                        scene.doors.getChildren().forEach(door => {
                                            if (door.targetMap === 'room_secret') {
                                                door.body.enable = true;
                                                door.visible = true;
                                                console.log("Secret door unlocked!");
                                            }
                                        });
                                    }
                                    window.showDialog('主角', '果然...这里有个暗门。');
                                }
                            });
                        });
                    } else {
                        window.showDialog('主角', '暗门已经打开了。');
                    }
                    return;
                } else {
                     scene.toggleHide();
                }
                return;
            }

            if (type === 'desk' && scene.currentMapId === 'room_secret') {
                if (!this.gameState.hasMatches) {
                     window.showDialog('主角', '工作台上有一盒火柴。', () => {
                          this.gameState.hasMatches = true;
                          window.updateInventory('火柴');
                          scene.playSound(400, 'triangle', 0.5);
                          window.showDialog('主角', '找到了一盒【火柴】。');
                     });
                } else {
                     window.showDialog('主角', '这里有些关于木偶制作的笔记："心中的鬼，要用木偶封印..."');
                }
                return;
            }

            if (type === 'bed') {
                // If it's my bed, maybe hide?
                if (scene.currentMapId === 'room_bedroom_me') {
                     scene.toggleHide();
                } else {
                     scene.toggleHide();
                }
                return;
            }

            if (type === 'diary') {
                this.collectClue('diary_mother', 'illness');
                const diaryContent = `七月十四。今天是明儿的忌日。
我还是盛了三碗饭。老李把第三只碗摔了，夜里却又捡回来洗净。
明儿，饭在锅里。你若回来，别再替妈妈受苦。`;
                scene.triggerFlashback('diary');
                if (!this.gameState.clues.includes('diary')) this.gameState.clues.push('diary');
                window.showDocument('残破的日记', diaryContent);
                return;
            }

            if (type === 'medical_record') {
                 this.collectClue('medical_record', 'illness');
                 if (!this.gameState.clues.includes('meds')) this.gameState.clues.push('meds');
                 window.showDocument('诊断书', '姓名：王秀兰。\n诊断：重度抑郁，伴精神分裂样症状。\n建议：规律服药，避免刺激，必要时住院观察。\n背面写着一行潦草的字：他把药藏起来了。');
                 return;
            }

            if (type === 'family_rules') {
                this.collectClue('family_rules', 'control');
                window.showDialog('主角', '这好像是一张家规...', () => {
                    window.showDialog('家规', '一、吃饭不许说话。\n二、晚上十点前必须回家。\n三、不许顶撞长辈。\n四、即使我们不在了，也要听话...', () => {
                        window.showDialog('主角', '（翻过相框）相框背面写着一串数字：1988。');
                    });
                });
                return;
            }

            if (type === 'sink') {
                this.collectClue('kitchen_sink_bowls', 'control');
                window.showDocument('水槽里的三只旧碗', '缺口大碗还带酒味，白瓷碗底结着药渍，蓝边小碗刻着一架纸飞机。它们属于不同的人。');
                return;
            }

            if (type === 'safe') {
                if (this.gameState.inventory.includes('地下室钥匙')) {
                    window.showDialog('主角', '保险箱已经打开了，里面空空如也。');
                    return;
                }

                window.showSafeUI(() => {
                    scene.playSound(1000, 'sine', 1);
                    window.showDialog('主角', '密码正确！保险箱打开了。', () => {
                        window.showDialog('主角', '里面只有一把冰冷的【地下室钥匙】。', () => {
                            window.updateInventory('地下室钥匙');
                            this.gameState.inventory.push('地下室钥匙');
                        });
                    });
                });
                return;
            }

            if (type === 'wet_paper') {
                this.collectClue(obj.clueId, obj.clueType);
                window.showDocument(obj.documentTitle || '湿纸条', obj.documentText || '1988 年，那是噩梦开始的一年。');
                scene.refreshObjective();
                return;
            }

            if (type === 'red_key') {
                scene.red_key.destroy();
                scene.red_key = null;
                this.gameState.hasRedKey = true;
                this.collectClue('red_key', 'death');
                window.updateInventory('血红钥匙');
                scene.playSound(600, 'triangle', 0.5);
                window.showDialog('主角', '你捡起了那把【血红钥匙】...上面还沾着未干的血迹。', () => {
                    if (!this.gameState.isChasing) {
                        this.ensureStoryFlags().chasePhase = 'active';
                        window.showDialog('主角', '（周围的温度突然降低了...有什么东西来了！）', () => scene.chaseManager.start());
                    }
                });
                return;
            }

            if (type === 'toy_plane') {
                const collected = this.collectClue('toy_plane', 'death');
                if (!this.gameState.clues.includes('plane')) this.gameState.clues.push('plane');
                if (!collected) window.showDialog('主角', getObjectReflection(this.gameState, 'toy_plane'));
                return;
            }

            if (type === 'locked_window') {
                this.collectClue('locked_window', 'control');
                if (!this.gameState.clues.includes('window')) this.gameState.clues.push('window');
                window.showDialog('主角', getObjectReflection(this.gameState, 'locked_window'));
                return;
            }

            if (type === 'exit_door') {
                 const route = getExitRoute(this.gameState);
                 if (route === 'memory_crash') {
                     window.showDialog('主角', '我已经想起来了。真正的出口不在这扇门外，而在那条雨夜公路上。', () => {
                         scene.switchScene('memory_crash', 120, 200);
                     });
                 } else if (route === 'ending_huisha') {
                     window.showDialog('主角', '父亲伤害了我们，母亲也被困在这里。至于棺材里是谁，我不想知道。', () => {
                         scene.cameras.main.fadeOut(3000, 120, 0, 0);
                         scene.time.delayedCall(3000, () => {
                             window.showEndingScreen('结局：回煞', '你关上棺盖。墙边的黑影学会了我的站姿。下一场雨里，它会替父亲守门。', () => {
                                scene.scene.start('TitleScene');
                                window.globalGameState = null;
                             });
                         });
                     });
                 } else {
                     window.showDialog('主角', '我受够这个家了。只要不回头，我就还是活着的。', () => {
                        scene.cameras.main.fadeOut(3000, 255, 255, 255);
                        scene.time.delayedCall(3000, () => {
                             window.showEndingScreen('结局：破茧', '路边收音机正在重播十年前同一路段的少年死亡事故。身后很远的地方，仍有人喊你回家吃饭。', () => {
                                scene.scene.start('TitleScene');
                                window.globalGameState = null;
                             });
                        });
                    });
                 }
                 return;
            }

            if (type === 'npc') {
                if (this.gameState.storyStep === 0) {
                    this.gameState.storyStep = 1;
                }
                return;
            }

            if (type === 'incense') {
                 if (this.gameState.hasIncense) return;
                 this.openConfiguredPuzzle({ ...obj, puzzleId: 'well_knots' });
                 return;
            }

            if (type === 'spirit_money') {
                 if (this.gameState.hasSpiritMoney) return;
                 this.openConfiguredPuzzle({ ...obj, puzzleId: 'attic_debt' });
                 return;
            }

            if (type === 'altar') {
                const flags = this.ensureStoryFlags();
                if (flags.chasePhase === 'active' && flags.familyPhotoAssembled) {
                    scene.chaseManager.escape('photo');
                    return;
                }
                if (this.gameState.hasRice && this.gameState.hasMatches && this.gameState.hasIncense && this.gameState.hasSpiritMoney) {
                    this.openConfiguredPuzzle({ ...obj, puzzleId: 'altar_ritual' });
                } else {
                    let missing = [];
                    if (!this.gameState.hasRice) missing.push('倒头饭');
                    if (!this.gameState.hasMatches) missing.push('火柴');
                    if (!this.gameState.hasIncense) missing.push('香');
                    if (!this.gameState.hasSpiritMoney) missing.push('纸钱');

                    window.showDialog('主角', `${getObjectReflection(this.gameState, 'altar')} 还缺：${missing.join('、')}。`);
                }
                return;
            }

            if (type === 'coffin') {
                if (this.gameState.hasRedKey) {
                    if (this.gameState.candlesLit) {
                        const flags = this.ensureStoryFlags();
                        flags.coffinOpened = true;
                        this.collectClue('coffin_truth', 'death');
                        window.showDialog('主角', '钥匙插进去了。锁孔上的划痕和我的玩具箱一模一样。', () => {
                            scene.playSound(100, 'sawtooth', 2);
                            scene.refreshObjective();
                            window.showDialog('主角', '里面没有父亲，只有纸飞机、校服纽扣和一只凉透的饭碗。棺材里等的人是我。', () => {
                                if (getTruthLevel(this.gameState) === 'complete') {
                                    scene.switchScene('memory_crash', 120, 200);
                                } else {
                                    window.showDialog('主角', '我终于承认自己死在雨夜，但车祸前后的记忆还缺了一段。大门已经能打开了。');
                                }
                            });
                        });
                    } else {
                        window.showDialog('主角', '我有钥匙，但棺材周围的怨气太重了...上面的符咒还在闪烁。也许我应该先去供桌那边做点什么，平息亡魂的怨气。');
                    }
                } else if (scene.leftCandle && scene.leftCandle.alpha === 1) {
                     window.showDialog('棺材里的声音', '（咚！咚！咚！）放我出去...那个逆子...那个疯婆娘...把门打开！放我出去！', () => {
                         window.showDialog('主角', '（惊恐）是父亲的声音！他...他没死？可是棺材盖上钉着七颗长钉，还缠着红线...这是在镇压什么？');
                     });
                } else {
                    window.showDialog('主角', getObjectReflection(this.gameState, 'coffin'));
                }
                return;
            }

            if (type === 'photo') {
                const photo = scene.currentTarget.obj;
                if (!this.gameState.viewedPhotos.includes(photo.photoId)) {
                    this.gameState.viewedPhotos.push(photo.photoId);
                    scene.playSound(400, 'triangle', 0.5);

                    // Show dialog with photo content
                    if (photo.dialogText) {
                         window.showDialog('旧照片', photo.dialogText);
                    }

                    scene.cameras.main.shake(100, 0.005);

                    if (this.gameState.viewedPhotos.length >= 4 && !this.gameState.corridorSolved) {
                        this.gameState.corridorSolved = true;
                        const flags = this.ensureStoryFlags();
                        flags.photoSetCollected = true;
                        scene.queueNarrativeBeat();
                        window.updateInventory('残缺全家福');
                        if (reconcileFamilyPhoto(this.gameState)) window.replaceInventoryItem('残缺全家福', '完整全家福');
                        scene.playSound(100, 'sawtooth', 2);
                        scene.cameras.main.flash(500, 255, 0, 0);
                        scene.time.delayedCall(500, () => {
                            window.showDialog('主角', '四张照片拼在一起，年份只到十年前。缺掉的那一角，正好是我的脸。');
                        });
                    }
                } else {
                     // Already viewed, just show text again
                     if (photo.dialogText) {
                         window.showDialog('旧照片', photo.dialogText);
                    }
                }
                return;
            }

            if (type === 'car') {
                 scene.triggerFlashback('car_crash');
                 window.showDialog('主角', '（靠近车辆时，眼前突然一片血红...耳边传来刺耳的刹车声和巨大的撞击声...）');
                 return;
            }

            if (type === 'black_cloth') {
                 if (!this.gameState.doorSlammed) {
                     window.showDialog('主角', '（突然，身后传来“砰”的一声巨响！大门关上了。）', () => {
                         scene.playSound(50, 'sawtooth', 4);
                         scene.cameras.main.shake(500, 0.02);
                         this.gameState.doorSlammed = true;

                         // Lock the door!
                         const doorToEntrance = scene.doors.getChildren().find(d => d.targetMap === 'room_entrance');
                         if (doorToEntrance) {
                             doorToEntrance.locked = true;
                         }
                     });
                 }
                 return;
            }

            /*
            // Merged into Memory Room Logic above
            if (type === 'dad_ghost') {
                window.showDialog('父亲的虚影', '...不听话...打死你...不听话...', () => {
                     window.showDialog('主角', '（颤抖）这是...爸爸？可是他的脸...为什么是一张白纸？');
                });
                return;
            }

            if (type === 'mom_ghost') {
                 window.showDialog('母亲的虚影', '...我的孩子...乖...吃药...吃了药就不痛了...', () => {
                     window.showDialog('主角', '（恐惧）那是妈妈的声音...她在给谁吃药？');
                });
                return;
            }
            */

            if (type === 'kitchen_ghost') {
                this.collectClue('kitchen_ghost_gesture', 'death');
                window.showDialog('奇怪的纸人', '它先指向灶边，又指向侧门，最后把手停在饭桌南侧的空位。', () => {
                    if (this.scene.gameState.hasRice) {
                        window.showDialog('主角', '这就是你要的饭吗？（似乎需要把饭放在某个地方）');
                    } else {
                        window.showDialog('主角', '这个纸人...它的嘴是用红笔画的，好像在流血。');
                    }
                });
                return;
            }

            if (type === 'chest') {
                 if (!this.gameState.hasRice || !this.gameState.hasMatches || !this.gameState.hasIncense || !this.gameState.hasSpiritMoney || !this.gameState.hasRedKey) {
                     window.showDialog('主角', '你发现了【开发者宝箱】！获得了：倒头饭、火柴、香、纸钱、血红钥匙。', () => {
                         this.gameState.hasRice = true;
                         this.gameState.hasMatches = true;
                         this.gameState.hasIncense = true;
                         this.gameState.hasSpiritMoney = true;
                         this.gameState.hasRedKey = true;
                         window.updateInventory('倒头饭');
                         window.updateInventory('火柴');
                         window.updateInventory('香');
                         window.updateInventory('纸钱');
                         window.updateInventory('血红钥匙');
                         scene.playSound(400, 'triangle', 0.5);
                     });
                 }
                 return;
            }

            if (type === 'well') {
                if (this.gameState.hasRedKey) {
                    window.showDialog('主角', '井底的水正在上涨...那具尸体...它好像在笑。不能再靠近了。');
                } else {
                    // Trigger Ghost Event
                    scene.time.delayedCall(500, () => {
                        scene.playSound(100, 'sawtooth', 3);
                        scene.cameras.main.shake(1000, 0.02);
                        window.showDialog('井底的声音', '乖孙子...下来陪奶奶...下面很凉快...', () => {
                            window.showDialog('主角', '奶奶？可是奶奶刚才不是...在屋里吗？', () => {
                                window.showDialog('井底的声音', '不...那不是奶奶...那是纸糊的假货...我是真的...我是妈妈啊...', () => {
                                    scene.playSound(50, 'sawtooth', 4);
                                    scene.cameras.main.flash(200, 255, 0, 0);
                                    window.showDialog('主角', '（惊恐）一只惨白的手抓住了井沿！那是...那是一具泡得发肿的女尸！', () => {
                                        window.showDialog('尸体', '你看着我割开手腕……后来我走到井边时，你也没能来……', () => {
                                            window.showDialog('主角', '不！不是这样的！我被关起来了！我出不去！', () => {
                                                window.showDialog('尸体', '撒谎...把钥匙给我...（猛地扑上来）', () => {
                                                    scene.playSound(600, 'sine', 1);
                                                    this.gameState.hasRedKey = true;
                                                    this.collectClue('well_red_key', 'death');
                                                    window.updateInventory('血红钥匙');
                                                    window.showDialog('主角', '你拼命挣扎，在混乱中抓住了井边铁钩上的一把【血红钥匙】，并将尸体踹回了井里。', () => {
                                                        window.showDialog('主角', '这把钥匙...是血红色的。奶奶说钥匙在"他"肚子里，难道是指...');

                                                        scene.playSound(50, 'square', 4);
                                                        scene.cameras.main.flash(500, 255, 0, 0);
                                                        this.ensureStoryFlags().chasePhase = 'active';
                                                        window.showDialog('门外的男人', '明儿，别跑，外面下雨！', () => scene.chaseManager.start());
                                                    });
                                                });
                                            });
                                        });
                                    });
                                });
                            });
                        });
                    });
                }
                return;
            }
        };

        // --- Execution Strategy ---
        // If obj has dialog, show it first. Then execute logic.
        // Unless it's a type where logic overrides dialog flow (like Memory Table which handles its own dialogs).

        if (type === 'memory_table') {
            executeLogic(); // Handles its own dialogs
        } else if (obj.dialog) {
            showDialogSequence(obj.dialog, executeLogic);
        } else {
            executeLogic();
        }
    }

    handleEndingChoice(choice) {
        const scene = this.scene;
        const flags = this.ensureStoryFlags();
        flags.endingChoice = choice;

        if (choice === 'leave') {
            window.showDialog('主角', '爸做错的事不会因为他后悔就消失，妈的痛也不该由我继续背。妈，饭别再热了。', () => {
                scene.cameras.main.fadeOut(2500, 255, 255, 255);
                scene.time.delayedCall(2500, () => {
                    window.showEndingScreen('结局：归路', '你把全家福分成三份，允许每个人带着自己的错离开。十年来，雨第一次停了。', () => {
                        scene.scene.start('TitleScene');
                        window.globalGameState = null;
                    });
                });
            });
            return;
        }

        if (choice === 'return') {
            window.showDialog('主角', '如果这就是我最后一次回家，那至少让我亲手推开那扇门。', () => {
                scene.switchScene('room_memory', 320, 400);
            });
        }
    }

class IntroScene extends Phaser.Scene {
    constructor() {
        super('IntroScene');
    }

    create() {
        this.cameras.main.setBackgroundColor('#000000');
        this.crashed = false;

        // --- Visual Setup ---

        // 1. Road (Perspective)
        this.roadGraphics = this.add.graphics();

        // 2. Rain Particles
        // Create rain texture if missing
        if (!this.textures.exists('rain_drop')) {
            const g = this.make.graphics({x:0, y:0, add:false});
            g.fillStyle(0xaaaaaa);
            g.fillRect(0,0, 2, 10);
            g.generateTexture('rain_drop', 2, 10);
        }

        this.rainEmitter = this.add.particles(0, 0, 'rain_drop', {
            x: { min: 0, max: 800 },
            y: -50,
            speedY: { min: 800, max: 1200 },
            speedX: { min: -200, max: 200 }, // Wind effect
            lifespan: 1000,
            quantity: 5,
            frequency: 20,
            alpha: { start: 0.8, end: 0 },
            scale: { start: 1, end: 0.5 },
            blendMode: 'ADD'
        });

        // 3. Car Dashboard (Interior Mask)
        this.dashboard = this.add.graphics();
        this.dashboard.fillStyle(0x111111);
        // Dashboard base
        this.dashboard.fillRect(0, 450, 800, 150);
        // Pillars
        this.dashboard.fillRect(0, 0, 50, 600);
        this.dashboard.fillRect(750, 0, 50, 600);
        // Top shade
        this.dashboard.fillTriangle(0, 0, 800, 0, 400, 80);

        // Steering wheel
        this.dashboard.fillStyle(0x000000);
        this.dashboard.fillCircle(200, 550, 80);
        this.dashboard.lineStyle(10, 0x333333);
        this.dashboard.strokeCircle(200, 550, 80);

        // 4. Wipers
        // Left Wiper
        this.leftWiper = this.add.rectangle(200, 550, 350, 8, 0x222222).setOrigin(0, 0.5);
        // Right Wiper
        this.rightWiper = this.add.rectangle(500, 550, 350, 8, 0x222222).setOrigin(0, 0.5);

        // Wiper Animation
        this.tweens.add({
            targets: [this.leftWiper, this.rightWiper],
            angle: { from: 0, to: -100 },
            duration: 600,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut'
        });

        // 5. Headlights effect (Cones)
        this.lightsGraphics = this.add.graphics();

        // --- Audio Setup ---
        // Simple engine loop using noise
        this.engineTimer = this.time.addEvent({
            delay: 150,
            callback: () => {
                if (this.game.soundManager && !this.crashed) {
                    // Low rumbling
                    this.game.soundManager.playTone(60 + Math.random()*5, 'sawtooth', 0.2);
                }
            },
            loop: true
        });

        // --- Sequence Logic ---

        // Initial Dialog
        this.time.delayedCall(1500, () => {
            window.showDialog('主角', '七月十四...雨下得好大...看来今晚赶不回去了。');
        });

        this.time.delayedCall(5000, () => {
            window.showDialog('主角', '前面的路...怎么感觉有点熟悉？那封信上说的老宅...就在这附近吗？');
        });

        this.time.delayedCall(9000, () => {
            window.showDialog('主角', '那是...什么东西？！');
        });

        // The Crash Event
        this.time.delayedCall(10000, () => {
            this.triggerCrash();
        });
    }

    update(time, delta) {
        if (this.crashed) return;

        this.roadGraphics.clear();
        this.lightsGraphics.clear();

        // 1. Draw Ground (Dark)
        this.roadGraphics.fillStyle(0x050505);
        this.roadGraphics.fillRect(0, 300, 800, 300); // Horizon at 300

        // 2. Draw Road (Trapezoid)
        // Vanishing point: (400, 300)
        // Bottom width: 600px (100 to 700)
        this.roadGraphics.fillStyle(0x222222);
        this.roadGraphics.beginPath();
        this.roadGraphics.moveTo(380, 300); // Top Left
        this.roadGraphics.lineTo(420, 300); // Top Right
        this.roadGraphics.lineTo(750, 600); // Bottom Right
        this.roadGraphics.lineTo(50, 600);  // Bottom Left
        this.roadGraphics.closePath();
        this.roadGraphics.fillPath();

        // 3. Moving Dashed Lines
        const speed = 0.002;
        const offset = (time * speed) % 1; // 0 to 1 loop

        this.roadGraphics.fillStyle(0xffffff);

        // Draw multiple segments to simulate infinity
        // We use an exponential scale for Y to simulate perspective distance
        for(let i=0; i<6; i++) {
            // Calculate progress (0 is far, 1 is near)
            // Offset shifts them "towards" camera (increasing Y)
            let progress = (offset + i/6) % 1;

            // Apply perspective power (cubic feels right for road)
            let perspective = Math.pow(progress, 3);

            let y = 300 + perspective * 300; // Map 0-1 to 300-600
            let w = 2 + perspective * 20;    // Width grows
            let h = 2 + perspective * 40;    // Height grows (dash length)

            if (y > 300 && y < 600) {
                this.roadGraphics.fillRect(400 - w/2, y, w, h);
            }
        }

        // 4. Headlights Flicker
        const flicker = 0.1 + Math.random() * 0.05;
        this.lightsGraphics.fillStyle(0xffffcc, flicker);
        // Left Beam
        this.lightsGraphics.beginPath();
        this.lightsGraphics.moveTo(150, 600);
        this.lightsGraphics.lineTo(350, 300);
        this.lightsGraphics.lineTo(450, 300);
        this.lightsGraphics.lineTo(650, 600);
        this.lightsGraphics.fillPath();
    }

    triggerCrash() {
        this.crashed = true;

        if (this.engineTimer) this.engineTimer.remove();

        // 1. Ghost Flash (Jumpscare)
        // Use 'npc_paper' or create a scary shape
        let ghost;
        if (this.textures.exists('npc_paper')) {
            ghost = this.add.image(400, 350, 'npc_paper');
            ghost.setTint(0xff0000);
        } else {
            // Fallback shape
            ghost = this.add.rectangle(400, 350, 50, 100, 0xff0000);
        }

        ghost.setOrigin(0.5);
        ghost.setScale(0.1);
        ghost.setDepth(100); // Above dashboard? No, behind windshield (dashboard is graphics, depth 0 default)
        // Dashboard needs depth
        this.dashboard.setDepth(200);
        this.leftWiper.setDepth(201);
        this.rightWiper.setDepth(201);
        ghost.setDepth(100);

        // Zoom ghost towards screen
        this.tweens.add({
            targets: ghost,
            scale: 8,
            alpha: { from: 0.5, to: 1 },
            duration: 300,
            ease: 'Expo.in',
            onComplete: () => {
                // 2. Impact
                this.cameras.main.shake(1000, 0.05);
                this.cameras.main.flash(500, 255, 255, 255);

                // Sounds
                if (this.game.soundManager) {
                    this.game.soundManager.playTone(50, 'sawtooth', 1.0); // Boom
                    this.game.soundManager.playTone(100, 'square', 0.5);  // Crunch
                    this.game.soundManager.playTone(800, 'sawtooth', 0.3); // Screech
                }

                // Stop rain visuals
                this.rainEmitter.stop();

                // 3. Fade Out
                this.time.delayedCall(1000, () => {
                    this.cameras.main.fadeOut(2000, 0, 0, 0);

                    // Blackout Text
                    this.time.delayedCall(2500, () => {
                        const txt = this.add.text(400, 300, '头...好痛...\n\n我这是...在哪？', {
                            fontFamily: '"SimSun", serif',
                            fontSize: '24px',
                            color: '#ffffff',
                            align: 'center'
                        }).setOrigin(0.5).setDepth(1000);
                        txt.setAlpha(0);

                        this.tweens.add({
                            targets: txt,
                            alpha: 1,
                            duration: 1500,
                            yoyo: true,
                            hold: 2000,
                            onComplete: () => {
                                // 4. Start Game
                                // Pass mapId to start in prologue
                                this.scene.start('GameScene', { mapId: 'room_prologue' });
                            }
                        });
                    });
                });
            }
        });
    }
}

class GameScene extends Phaser.Scene {
    constructor() {
        super('GameScene');
    }

    init(data = {}) {
        this.sliceMode = data.sliceMode === true;
        this.currentMapId = data.mapId || (this.sliceMode ? 'room_main' : 'room_prologue');
        this.playerStartX = data.x ?? null;
        this.playerStartY = data.y ?? null;
        this.previousMapId = data.previousMapId || null;

        // If restarting from Title (no data provided), ensure we start fresh
        if (!data.mapId) {
             this.currentMapId = this.sliceMode ? 'room_main' : 'room_prologue';
             // Force reset if not already handled (though TitleScene handles it now)
        }
    }

    create() {
        // Force cleanup UI from previous scenes (e.g. IntroScene text)
        const dialogBox = document.getElementById('dialog-box');
        if (dialogBox) dialogBox.classList.add('hidden');

        this.red_key = null; // New Item Object
        this.toy_plane = null; // Reset plane ref
        this.npc = null; // Reset npc ref

        this.soundManager = this.game.soundManager;

        // Lazy initialize sound manager if missing (e.g. direct load)
        if (!this.soundManager) {
            this.game.soundManager = new SoundManager(this);
            this.soundManager = this.game.soundManager;
        }
        this.soundManager.setScene(this);

        const ua = navigator.userAgent || '';
        this.isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

        // Global Game State
        if (!window.globalGameState) {
            window.globalGameState = createDefaultGameState();
        }
        this.gameState = normalizeGameState(window.globalGameState);
        this.sliceState = this.sliceMode ? ensureSliceState(this.gameState) : null;
        this.objectiveManager = new ObjectiveManager(this.gameState, document.getElementById('objective-panel'));
        this.refreshObjective();

            left: Phaser.Input.Keyboard.KeyCodes.A,
            right: Phaser.Input.Keyboard.KeyCodes.D
        });
        this.keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

        // Joystick Logic
        this.joystick = { x: 0, y: 0, active: false };
        this.initJoystick();
        this.registerShutdownCleanup();

        // Initialize Map Manager
        this.mapManager = this.sliceMode ? new SliceMapManager(this) : new MapManager(this);
        this.sliceMapManager = this.sliceMode ? this.mapManager : null;
        this.mapManager.createMap(this.currentMapId);

        // Create Player
        const mapData = this.sliceMode ? SliceMaps[this.currentMapId] : Maps[this.currentMapId];
        const startX = resolveSpawnCoordinate(this.playerStartX, mapData.objects.playerStart.x);
        const startY = resolveSpawnCoordinate(this.playerStartY, mapData.objects.playerStart.y);
        this.player = new Player(this, startX, startY);
        this.chaseManager = new ChaseManager(this);

        this.physics.add.collider(this.player.sprite, this.furniture);
        if (this.trees) this.physics.add.collider(this.player.sprite, this.trees);

        // Show Room Name Notification
        if (mapData.name) {
            this.showRoomTitle(mapData.name);
        }

        // Spawn Chaser if active (Persist chase across scenes)
        if (!this.sliceMode && (this.gameState.isChasing || this.gameState.storyFlags.chasePhase === 'active')) {
            this.chaseManager.start();
        }

        // Camera
        this.cameras.main.startFollow(this.player.sprite, true, 0.09, 0.09);
        this.cameras.main.setZoom(1.2);

            x: { min: 0, max: 800 },

        this.fog.fillRect(0, 0, 800, 600);

        this.dangerOverlay.setScrollFactor(0);
        this.dangerOverlay.setDepth(260);
        this.dangerOverlay.setAlpha(0);
        this.dangerOverlay.setBlendMode(Phaser.BlendModes.MULTIPLY);

        // Flashback Overlay
        this.flashbackOverlay = this.add.rectangle(400, 300, 800, 600, 0x704214).setScrollFactor(0).setDepth(900).setAlpha(0);
        this.flashbackOverlay.setBlendMode(Phaser.BlendModes.OVERLAY);

        // Mic Indicator

        this.micIndicator = this.add.text(400, 120, '🤫 保持安静...', {
            fontSize: '24px',
            color: '#ff0000',
            backgroundColor: '#000',
            padding: { x: 10, y: 5 }
        }).setOrigin(0.5).setScrollFactor(0).setDepth(1000).setVisible(false);

        // Memory Room Special Settings (Override standard horror settings)
        if (this.currentMapId === 'room_memory') {
            if (!this.isMobile) this.lights.setAmbientColor(0xffffff);
            this.rainParticles.stop();
            this.rainParticles.setVisible(false);
            this.vignette.setVisible(false);
            this.fog.setVisible(false);

        this.time.addEvent({

                 if (this.isMobile) return;
                 if (Math.random() < 0.2 && this.soundManager) this.soundManager.playNoise(0.05);

        });

                    this.eventManager.triggerRandomEvent();

    initializeInteractionSystems() {
        this.kitchenTableController = this.sliceMode && this.currentMapId === 'room_kitchen'
            ? new KitchenTableController(this)
            : null;
        this.houseRuleDirector = this.sliceMode && this.currentMapId === 'room_kitchen'
            ? new HouseRuleDirector(this)
            : null;
        this.interactionManager = this.sliceMode
            ? new SliceInteractionManager(this)
            : new InteractionManager(this);

    update(time, delta) {
        this.hauntingDirector?.update(time, delta);
        this.houseRuleDirector?.update(time, delta);
        if (window.dialogActive) {
            this.player.sprite.setVelocity(0);
            return;
        }

        // Update Chaser AI per frame for smoother movement
        this.chaseManager.update();

        // Hiding Logic
        if (this.gameState.isHidden) {
            // Prevent exiting hide mode immediately after closing a dialog
            if (window.dialogActive) return;

            // Mic Check Logic
            if (this.soundManager && this.soundManager.micStream) {
                const vol = this.soundManager.getMicVolume();
                // Threshold logic:
                // Quiet room is usually ~10-20. Speaking is ~50+.
                // Let's set threshold to 40.
                if (vol > 40) {
                    this.micIndicator.setText('⚠️ 声音太大了！');
                    this.micIndicator.setColor('#ff0000');

                    if (!this.micTooLoudTimer) {
                         this.micTooLoudTimer = this.time.delayedCall(1000, () => {
                             // If still loud after 1s (or just cumulative trigger)
                             // Actually let's just trigger immediately if it spikes high
                             this.triggerFoundByMic();
                         });
                    }
                } else {
                    this.micIndicator.setText('🤫 保持安静...');
                    this.micIndicator.setColor('#ffffff');
                    if (this.micTooLoudTimer) {
                        this.micTooLoudTimer.remove();
                        this.micTooLoudTimer = null;
                    }
                }
            }

            if (Phaser.Input.Keyboard.JustDown(this.keySpace) || Phaser.Input.Keyboard.JustDown(this.keyE)) {
                this.toggleHide();
            }
            return;
        }

        // Wait for sound manager to be ready
        if (this.soundManager) {
            this.player.update(this.cursors, this.wasd, this.joystick, this.soundManager, delta);
        }

        this.kitchenTableController?.update();
        if (this.interactionManager) this.interactionManager.update();

        this.physics.overlap(this.player.sprite, this.doors, (player, door) => {
            if (door.locked) {
                this.handleLockedDoor(door);
                return;
            }
            if (this.houseRuleDirector?.blocksDoorTransition?.(door)) return;

            if (door.isLoop && !this.gameState.corridorSolved) {
                // Loop back to start of corridor
                this.switchScene(door.targetMap, door.targetX, door.targetY, door.doorId || door.objId);
                // Play a loop sound or effect?
                this.cameras.main.flash(200, 0, 0, 0);
            } else if (door.isLoop && this.gameState.corridorSolved) {
                // Break the loop -> go to backyard
                this.switchScene('room_backyard', 320, 100, door.doorId || door.objId);
            } else {
                this.switchScene(door.targetMap, door.targetX, door.targetY, door.doorId || door.objId);
            }
        });

        // Hint System for Room Corridor (if user is stuck)
        if (this.currentMapId === 'room_corridor') {
            const y = this.player.sprite.y;
            // ...
        }

        // Sanity System Logic
        this.updateSanity(delta);
        this.refreshObjective();
    }

    handleLockedDoor(door) {
        if (this.sliceMode) {
            const now = this.time.now;
            if (
                this.lastSliceLockedDoorFeedbackAt !== undefined &&
                now - this.lastSliceLockedDoorFeedbackAt < 900
            ) {
                return false;
            }

            this.lastSliceLockedDoorFeedbackAt = now;
            const restingX = door.x;
            this.playSound(115, 'square', 0.08);
            this.tweens.add({
                targets: door,
                x: restingX + 3,
                duration: 60,
                yoyo: true,
                ease: 'Sine.easeInOut',
                onUpdate: () => door.body?.updateFromGameObject?.(),
                onComplete: () => {
                    door.x = restingX;
                    door.body?.updateFromGameObject?.();
                }
            });
            return false;
        }

        const hasKey = door.key === 'silver_key' && this.gameState.inventory.includes('地下室钥匙');
        if (hasKey) {
            door.locked = false;
            this.switchScene(door.targetMap, door.targetX, door.targetY, door.doorId || door.objId);
            this.playSound(400, 'sine', 1);
            return true;
        }

        if (!this.gameState.lastLockedMsg || this.time.now - this.gameState.lastLockedMsg > 2000) {
            this.gameState.lastLockedMsg = this.time.now;
            window.showDialog('主角', '门锁住了。需要一把银色的钥匙。');
        }
        return false;
    }

    refreshObjective() {
        this.objectiveManager?.refresh(this.currentMapId);

    queueNarrativeBeat() {
        if (this.narrativeBeatPlaying || this.narrativeBeatTimer) return;
        this.narrativeBeatTimer = this.time.delayedCall(250, () => this.flushNarrativeBeat());
    }

    flushNarrativeBeat() {
        this.narrativeBeatTimer = null;
        if (window.dialogActive || this.isSwitching) {
            this.queueNarrativeBeat();
            return;
        }
        const beat = getPendingNarrativeBeat(this.gameState);
        if (!beat) return;
        this.narrativeBeatPlaying = true;
        const showLine = index => {
            if (index >= beat.lines.length) {
                markNarrativeBeatSeen(this.gameState, beat.id);
                this.narrativeBeatPlaying = false;
                this.refreshObjective();
                return;
            }
            const line = beat.lines[index];
            window.showDialog(line.speaker, line.text, () => showLine(index + 1));
        };
        showLine(0);
    }

    updateSanity(delta) {
        let ratePerSecond = 0;
        if (['room_basement', 'room_attic', 'room_secret'].includes(this.currentMapId)) ratePerSecond -= 3;
        if (this.chaser?.active && this.gameState.isChasing) {
            const dist = Phaser.Math.Distance.Between(this.player.sprite.x, this.player.sprite.y, this.chaser.x, this.chaser.y);
            if (dist < 300) ratePerSecond -= 12;
        }
        if (['room_bedroom_me', 'room_memory'].includes(this.currentMapId)) ratePerSecond = 6;
        this.gameState.sanity = updateBoundedResource(this.gameState.sanity, ratePerSecond, delta, 0, 100);
        window.updateSanityUI?.(this.gameState.sanity, 100);

        // Sanity Effects
        if (this.gameState.sanity < 30) {
            // Audio Hallucinations
            if (Math.random() < 0.01 && this.soundManager) {
                this.soundManager.playSpatialNoise(0.5, this.player.sprite.x + Phaser.Math.Between(-100, 100), this.player.sprite.y + Phaser.Math.Between(-100, 100));
            }
        }
    }

        }

        this.cameras.main.fadeOut(500, 0, 0, 0);
        this.cameras.main.once(Phaser.Cameras.Scene2D.Events.FADE_OUT_COMPLETE, () => {
            // Stop chasing if switching scene
            if (this.gameState.isChasing) {
                // Keep chasing state
            }

            this.scene.restart({
                mapId,
                x: targetX,
                y: targetY,
                previousMapId: this.currentMapId,
                sliceMode: this.sliceMode
            });
            this.isSwitching = false;
        });
    }

    toggleHide() {
        // Debounce to prevent accidental double-toggle
        const now = this.time.now;
        if (this.lastHideToggleTime && now - this.lastHideToggleTime < 500) return;
        this.lastHideToggleTime = now;

        if (this.gameState.isHidden) {
            // Exit hiding
            this.gameState.isHidden = false;
            this.chaseManager?.cancelHideEscape();
            this.player.sprite.setVisible(true);
            this.player.sprite.body.enable = true;
            this.interactText.setText('按 [空格] / [A] 调查');
            this.cameras.main.zoomTo(1.2, 500);

            // Re-enable Flashlight
            if (this.player.flashlight) this.player.flashlight.setAlpha(0.6);
            if (this.player.lightSource) this.player.lightSource.setIntensity(1.2);

            // Re-enable UI
            document.getElementById('inventory').style.display = '';
            document.getElementById('joystick-zone').style.display = '';
            document.getElementById('action-btn').style.display = '';

            // Hide Mic Indicator
            this.micIndicator.setVisible(false);

            // Remove global touch listener if exists
            if (this.exitHideListener) {
                document.removeEventListener('touchstart', this.exitHideListener);
                this.exitHideListener = null;
            }

        } else {
            // Enter hiding
            this.gameState.isHidden = true;
            this.chaseManager?.startHideEscape();
            this.player.sprite.setVisible(false);
            this.player.sprite.body.enable = false; // Disable physics immediately
            this.interactText.setVisible(true).setText('按 [空格] / [A] 离开');
            this.interactText.setPosition(this.player.sprite.x, this.player.sprite.y - 60);
            this.cameras.main.zoomTo(1.5, 500);

            // Disable Flashlight
            if (this.player.flashlight) this.player.flashlight.setAlpha(0);
            if (this.player.lightSource) this.player.lightSource.setIntensity(0);

            // Hide UI
            document.getElementById('inventory').style.display = 'none';
            document.getElementById('joystick-zone').style.display = 'none';
            // On mobile, we MUST keep action button visible to allow exiting hide mode
            // Or we could rely on tapping screen? But button is safer.
            if (!this.isMobile) {
                document.getElementById('action-btn').style.display = 'none';
            }

            window.showDialog('主角', '（你屏住了呼吸...）', () => {
                if (this.isMobile) {
                    window.showDialog('系统', '（点击任意位置离开躲藏）', () => {
                        // Dialog closed. Now attach the listener.
                        if (this.gameState.isHidden && !this.exitHideListener) {
                             this.exitHideListener = (e) => {
                                 // Check dialogActive just in case
                                 if (!window.dialogActive) {
                                     this.toggleHide();
                                 }
                             };
                             // Use standard listener (not once: true) so it persists until we toggleHide
                             document.addEventListener('touchstart', this.exitHideListener);
                        }
                    });
                } else if (this.soundManager) {
                    this.soundManager.initMic().then(success => {
                        if (success) {
                            this.micIndicator.setVisible(true);
                        }
                    });
                }
            });
        }
    }

    initJoystick() {
        this.destroyJoystick();
        this.domListeners = new DomListenerRegistry();

        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');

        let startX, startY;
        const maxDist = 35;

        const showUI = () => {
            zone.classList.remove('ui-faded');
            actionBtn.classList.remove('ui-faded');
            if (this.mobileUiTimer) clearTimeout(this.mobileUiTimer);
            this.mobileUiTimer = null;
        };

        const scheduleHideUI = () => {
            if (this.mobileUiTimer) clearTimeout(this.mobileUiTimer);
            this.mobileUiTimer = setTimeout(() => {
                zone.classList.add('ui-faded');
                actionBtn.classList.add('ui-faded');
            }, 2000);
        };

        scheduleHideUI();

        function onTouchStart(e) {
            showUI();
            e.preventDefault();
            const touch = e.touches[0];
            const rect = zone.getBoundingClientRect();
            startX = rect.left + rect.width / 2;
            startY = rect.top + rect.height / 2;
            this.joystick.active = true;
            this.updateJoystick(touch.clientX, touch.clientY, startX, startY, knob, maxDist);
        }

        function onTouchMove(e) {
            showUI();
            e.preventDefault();
            if (!this.joystick.active) return;
            const touch = e.touches[0];
            this.updateJoystick(touch.clientX, touch.clientY, startX, startY, knob, maxDist);
        }

        function onTouchEnd() {
            scheduleHideUI();
            this.joystick.active = false;
            this.joystick.x = 0;
            this.joystick.y = 0;
            knob.style.transform = `translate(-50%, -50%)`;
        }

        const handleAction = (e) => {
            showUI();
            scheduleHideUI();
            e.preventDefault();
            if (window.dialogActive) {
                if (window.currentDialogNextHandler) window.currentDialogNextHandler();
                return;
            }
            if (this.gameState.isHidden) {
                this.toggleHide();
                return;
            }
            if (this.interactText.visible && this.interactionManager) this.interactionManager.handleInteraction();
        };

        function onActionTouchStart(e) {
            handleAction(e);
        }

        function onActionMouseDown(e) {
            handleAction(e);
        }

        const passiveFalse = { passive: false };
        this.domListeners.add(zone, 'touchstart', onTouchStart.bind(this), passiveFalse);
        this.domListeners.add(zone, 'touchmove', onTouchMove.bind(this), passiveFalse);
        this.domListeners.add(zone, 'touchend', onTouchEnd.bind(this));
        this.domListeners.add(zone, 'touchcancel', onTouchEnd.bind(this));
        this.domListeners.add(actionBtn, 'touchstart', onActionTouchStart, passiveFalse);
        this.domListeners.add(actionBtn, 'mousedown', onActionMouseDown);
    }

    destroyJoystick() {
        this.domListeners?.clear();
        this.domListeners = null;
        if (this.mobileUiTimer) clearTimeout(this.mobileUiTimer);
        this.mobileUiTimer = null;
        if (this.exitHideListener) document.removeEventListener('touchstart', this.exitHideListener);
        this.exitHideListener = null;
    }

    registerShutdownCleanup() {
        this.events.once(Phaser.Scenes.Events.SHUTDOWN, () => {
            this.destroyJoystick();
            this.interactionManager?.destroy?.();
            this.kitchenTableController?.destroy?.();
            this.houseRuleDirector?.destroy?.();
            this.sliceMapManager?.destroy();
            this.chaseManager?.destroy();
            this.hauntingDirector?.destroy();
            window.closePuzzle?.();
            this.narrativeBeatTimer?.remove();
            this.narrativeBeatTimer = null;
        });
    }

    updateJoystick(clientX, clientY, centerX, centerY, knob, maxDist) {
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
            const ratio = maxDist / dist;
            dx *= ratio;
            dy *= ratio;
        }
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        this.joystick.x = dx / maxDist;
        this.joystick.y = dy / maxDist;
    }
