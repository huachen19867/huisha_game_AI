            const render = () => {
                const assignedCount = Object.keys(progress.assignments).length;
                puzzleOrder.textContent = `已建立 ${assignedCount}/${config.slots.length} 条对应关系`;
                puzzleClues.innerHTML = '';
                config.clues.forEach(clue => {
                    const row = document.createElement('div');
                    row.textContent = `· ${clue.label}`;
                    puzzleClues.appendChild(row);
                });

                puzzleSlots.innerHTML = '';
                config.slots.forEach(slot => {
                    const button = document.createElement('button');
                    const token = config.tokens.find(item => item.id === progress.assignments[slot.id]);
                    button.textContent = `${slot.label}：${token?.label || '尚未放入证据'}`;
                    button.onclick = () => {
                        progress = assignPuzzleToken(progress, slot.id, selectedToken);
                        selectedToken = null;
                        callbacks.onChange?.(progress);
                        render();
                    };
                    puzzleSlots.appendChild(button);
                });

                puzzleTokens.innerHTML = '';
                config.tokens.forEach(token => {
                    const button = document.createElement('button');
                    const assignedSlot = Object.keys(progress.assignments).find(slotId => progress.assignments[slotId] === token.id);
                    button.textContent = assignedSlot ? `${token.label}（已放置）` : token.label;
                    button.classList.toggle('selected', selectedToken === token.id);
                    button.onclick = () => {
                        selectedToken = selectedToken === token.id ? null : token.id;
                        render();
                    };
                    puzzleTokens.appendChild(button);
                });
            };

            puzzleTitle.textContent = config.title;
            puzzleStatus.textContent = '';
            puzzleOverlay.style.display = 'flex';
            window.dialogActive = true;
            render();
            document.getElementById('puzzle-reset').onclick = () => {
                progress = createPuzzleProgress(config);
                selectedToken = null;
                puzzleStatus.textContent = '';
                callbacks.onChange?.(progress);
                render();
            };
            document.getElementById('puzzle-submit').onclick = () => {
                const result = evaluatePuzzle(config, progress.assignments, config.availableEvidence || []);
                if (result.status === 'correct') {
                    close(false);
                    callbacks.onSuccess?.(result);
                    return;
                }
                if (result.status === 'blocked') puzzleStatus.textContent = `还缺 ${result.missing.length} 条现场证据。`;
                else if (result.status === 'incomplete') puzzleStatus.textContent = `还有 ${result.emptySlots.length} 个结论槽没有证据。`;
                else {
                    progress = { ...progress, attempts: progress.attempts + 1 };
                    callbacks.onChange?.(progress);
                    const attempts = progress.attempts;
                    let message = config.messages?.[result.conflictKey] || '这组证据互相冲突。';
                    if (attempts >= config.strongHintAfter) message += ` 提示：${config.hints?.[1] || ''}`;
                    else if (attempts >= config.hintAfter) message += ` 提示：${config.hints?.[0] || ''}`;
                    puzzleStatus.textContent = message;
                    callbacks.onMistake?.(result);
                }
            };
            document.getElementById('puzzle-close').onclick = () => close(true);
        };

        // Ending Logic
        window.triggerHorrorEnding = function(onComplete) {
            const layer = document.getElementById('ending-layer');
            const text = document.getElementById('ending-text');
            const btn = document.getElementById('restart-btn');

            // Reset state
            text.classList.remove('visible');
            text.style.opacity = '';
            text.style.transition = '';
            btn.style.opacity = '0';
            btn.style.display = 'none';
            layer.style.pointerEvents = 'auto'; // Enable interaction for button

            layer.style.display = 'flex';

            // Phase 1: Build up
            setTimeout(() => {
                layer.classList.add('bg-flash');
            }, 100);

            // Phase 2: Show text with horror effect
            setTimeout(() => {
                text.classList.add('visible');
                document.body.classList.add('shake-screen');
            }, 500);

            // Phase 3: Stop shaking, fade out text, show button
            setTimeout(() => {
                document.body.classList.remove('shake-screen');
                layer.classList.remove('bg-flash');

                // Fade out text to make room for pure black/button
                text.style.opacity = '0';
                text.style.transition = 'opacity 2s';

                // Show button after text fades
                setTimeout(() => {
                    btn.textContent = '醒来'; // Change text to hint at story continuation
                    btn.style.display = 'block';
                    // Force reflow
                    void btn.offsetWidth;
                    btn.style.opacity = '1';
                }, 2000);

                // Button click handler
                btn.onclick = () => {
                    layer.style.display = 'none';
                    if (onComplete) onComplete();
                };
            }, 5000);
        };

        // Ending Screen (Good/True Ending)
        window.showEndingScreen = function(title, message, callback) {
            const layer = document.getElementById('ending-layer');
            const text = document.getElementById('ending-text');
            const btn = document.getElementById('restart-btn');

            // Reset state
            text.classList.remove('visible');
            text.style.opacity = '0';
            text.style.transition = '';
            btn.style.opacity = '0';
            btn.style.display = 'none';
            layer.style.pointerEvents = 'auto';
            layer.style.display = 'flex';

            // Set text
            text.innerHTML = `<span style="color: #fff; font-size: 40px;">${title}</span><br><br><span style="color: #aaa; font-size: 24px;">${message}</span>`;

            // Remove blood drip for good ending
            const drip = text.querySelector('.blood-drip');
            if(drip) drip.style.display = 'none';

            // Fade in
            setTimeout(() => {
                text.style.transition = 'opacity 2s';
                text.style.opacity = '1';
                text.style.transform = 'scale(1)';
            }, 500);

            // Show button
            setTimeout(() => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);

                newBtn.textContent = '重新开始'; // Reset text
                newBtn.style.display = 'block';
                // Force reflow
                void newBtn.offsetWidth;
                newBtn.style.opacity = '1';
                newBtn.onclick = () => {
                    layer.style.display = 'none';
                    if (callback) callback();
                    // Reset blood drip style for next time
                    if(drip) drip.style.display = '';
                };
            }, 3000);
        };

        window.showDialog = function(name, text, callback) {
            // Check if text is too long (basic estimation for mobile screen)
            // Mobile width ~300-400px. Font size 16px. ~20 chars per line.
            // 4 lines = ~80 chars. Let's be safe with 60 chars or check for explicit split.
            const MAX_LEN = 60;

            if (text.length > MAX_LEN) {
                 // Split into chunks, respecting punctuation if possible
                 const chunks = [];
                 let remaining = text;
                 while (remaining.length > MAX_LEN) {
                     let cutIdx = MAX_LEN;
                     // Try to find a punctuation mark to cut at
                     const punc = remaining.substring(0, MAX_LEN).match(/[。！？…，]/g);
                     if (punc) {
                         const lastPunc = remaining.substring(0, MAX_LEN).lastIndexOf(punc[punc.length-1]);
                         if (lastPunc > MAX_LEN / 2) cutIdx = lastPunc + 1;
                     }
                     chunks.push(remaining.substring(0, cutIdx));
                     remaining = remaining.substring(cutIdx);
                 }
                 if (remaining.length > 0) chunks.push(remaining);

                 // Recursive helper
                 const showNextChunk = (index) => {
                     if (index >= chunks.length) {
                         if (callback) callback();
                         return;
                     }
                     // Call the "real" showDialog logic (below) by bypassing this check?
                     // No, we can just copy the logic or make a private function.
                     // Easier: create a private function `_showDialogInternal`
                     _showDialogInternal(name, chunks[index], () => showNextChunk(index + 1));
                 };
                 showNextChunk(0);
                 return;
            }

            _showDialogInternal(name, text, callback);
        };

        function _showDialogInternal(name, text, callback) {
            // Clear any existing typing timer to prevent garbled text
            if (window.currentDialogTimer) {
                clearInterval(window.currentDialogTimer);
                window.currentDialogTimer = null;
            }

            window.dialogActive = true;
            dialogBox.classList.remove('hidden');
            speakerName.textContent = name;

            // Typewriter effect
            let i = 0;
            dialogText.textContent = '';
            window.currentDialogNextHandler = null; // Reset handler
            window.skipDialog = false; // Reset skip flag

            window.currentDialogTimer = setInterval(() => {
                if (window.skipDialog) {
                    clearInterval(window.currentDialogTimer);
                    window.currentDialogTimer = null;
                    dialogText.textContent = text;
                    i = text.length;

                    // Trigger completion logic immediately (wait for click)
                    const nextHandler = () => {
                        // Prevent multiple clicks firing multiple times
                        if (!window.dialogActive) return;

                        dialogBox.removeEventListener('click', nextHandler);
                        window.currentDialogNextHandler = null;

                        // Only hide if it's the last chunk?
                        // Actually, hiding and showing again causes flicker.
                        // Ideally we keep it open. But current structure hides it.
                        // Let's accept the flicker for now or check if we are in a sequence.
                        // For simplicity: hide it.
                        dialogBox.classList.add('hidden');
                        window.dialogActive = false;
                        window.lastDialogCloseTime = Date.now();
                        if (callback) callback();
                    };

                    window.currentDialogNextHandler = nextHandler;
                    // Re-bind click listener for closing
                    dialogBox.addEventListener('click', nextHandler, { once: true });
                    return;
                }

                dialogText.textContent += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(window.currentDialogTimer);
                    window.currentDialogTimer = null;

                    // Wait for click or key to continue
                    const nextHandler = () => {
                        if (!window.dialogActive) return;
                        dialogBox.removeEventListener('click', nextHandler);
                        window.currentDialogNextHandler = null;

                        dialogBox.classList.add('hidden');
                        window.dialogActive = false;
                        window.lastDialogCloseTime = Date.now();
                        if (callback) callback();
                    };

                    window.currentDialogNextHandler = nextHandler;
                    // Simple click on dialog box to proceed
                    dialogBox.addEventListener('click', nextHandler, { once: true });
                }
            }, 50);
        }

        // Global Input Handler for Dialog
        document.addEventListener('keydown', (e) => {
            // Document Reader Close on Space/Esc
            const docOverlay = document.getElementById('doc-overlay');
            if (docOverlay.style.display === 'flex') {
                if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                    docOverlay.style.display = 'none';
                    window.dialogActive = false;
                    window.lastDialogCloseTime = Date.now(); // Update time to prevent immediate re-trigger
                    return;
                }
            }

            if (!window.dialogActive) return;

            if (e.code === 'Space' || e.code === 'Enter') {
                // If text is still typing, skip to end
                const dialogText = document.getElementById('dialog-text');
                if (window.currentDialogNextHandler === null && dialogText.textContent.length > 0) {
                    window.skipDialog = true;
                    return;
                }

                // If we have a pending next handler (dialog finished typing)
                if (window.currentDialogNextHandler) {
                    window.currentDialogNextHandler();
                }
            }
        });

        window.updateInventory = function(item) {
            const slot = document.createElement('div');
            slot.className = 'inv-item';
            slot.dataset.item = item;

            // Icon mapping
            let icon = item;
            if (item.includes('钥匙')) icon = '🗝️';
            else if (item.includes('饭')) icon = '🍚';
            else if (item.includes('火柴')) icon = '🔥';
            else if (item.includes('照片')) icon = '🖼️';
            else if (item.includes('信')) icon = '✉️';

            slot.textContent = icon;

            // Tooltip events
            slot.addEventListener('mouseenter', (e) => {
                tooltip.textContent = item;
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
            });
            slot.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
            slot.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
            });

            // Click to read if it's a letter/photo
            if (item.includes('信') || item.includes('照片')) {
                slot.addEventListener('click', () => {
                    // This would need a callback or global lookup for content
                    // For now just show item name
                    // window.showDocument(item, "...");
                });
            }

            invSlots.appendChild(slot);
        };

        window.replaceInventoryItem = function(oldItem, newItem) {
            const slot = Array.from(invSlots.children).find(node => node.dataset.item === oldItem);
            if (slot) slot.remove();
            window.updateInventory(newItem);
        };

        // Game Config
        const config = {
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 800,
                height: 600
            },
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false // Enable debug to see hitboxes
                }
            },
            scene: [BootScene, TitleScene, IntroScene, GameScene],
            pixelArt: true
        };

        // Start Game
        try {
            const game = new Phaser.Game(config);
            window.__huishaGame = game;
            console.log("Game started successfully");
        } catch (e) {
            console.error("Phaser Init Error", e);
            throw e;
        }
    </script>
