class SoundManager {
    constructor(scene) {
        this.scene = scene;
        this.audioCtx = null;
        this.micStream = null;
        this.micAnalyser = null;
        this.micDataArray = null;
        this.init();
    }

    setScene(scene) {
        this.scene = scene;
        return this;
    }

    init() {
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }
    }

    async initMic() {
        if (this.micStream) return true; // Already init
        if (!this.audioCtx) this.init();

        try {
            this.micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            this.micSource = this.audioCtx.createMediaStreamSource(this.micStream);
            this.micAnalyser = this.audioCtx.createAnalyser();
            this.micAnalyser.fftSize = 256;
            this.micSource.connect(this.micAnalyser);
            this.micDataArray = new Uint8Array(this.micAnalyser.frequencyBinCount);
            console.log("Microphone initialized for horror immersion.");
            return true;
        } catch (e) {
            console.warn("Microphone access denied or not available", e);
            return false;
        }
    }

    getMicVolume() {
        if (!this.micAnalyser || !this.micDataArray) return 0;
        this.micAnalyser.getByteFrequencyData(this.micDataArray);
        let sum = 0;
        for (let i = 0; i < this.micDataArray.length; i++) {
            sum += this.micDataArray[i];
        }
        // Return normalized 0-100 range roughly
        return (sum / this.micDataArray.length);
    }

    stopMic() {
        if (this.micStream) {
            this.micStream.getTracks().forEach(track => track.stop());
            this.micStream = null;
            this.micAnalyser = null;
        }
    }

    playTone(freq, type, duration) {
        if (!this.audioCtx) return;
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }

    playNoise(duration) {
        if (!this.audioCtx) return;
        const bufferSize = this.audioCtx.sampleRate * duration;
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
        noise.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playFootstep() {
        if (!this.audioCtx) return;
        const t = this.audioCtx.currentTime;

        // Filtered noise for a "thud"
        const bufferSize = this.audioCtx.sampleRate * 0.1; // 100ms
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.5;
        }

        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;

        // Lowpass filter for "thud"
        const filter = this.audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(150, t);

        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playSpatialNoise(duration, x, y) {
        if (!this.audioCtx || !this.scene || !this.scene.player) return;

        const px = this.scene.player.sprite.x;
        const py = this.scene.player.sprite.y;

        // Calculate pan based on relative X position
        // Map width is usually ~800-1000. Let's normalize -1 to 1 over 400px distance
        let pan = (x - px) / 400;
        pan = Phaser.Math.Clamp(pan, -1, 1);

        // Calculate volume based on distance
        const dist = Phaser.Math.Distance.Between(px, py, x, y);
        let vol = 1 - (dist / 600); // 600px max hearing distance
        vol = Phaser.Math.Clamp(vol, 0, 1);

        if (vol <= 0) return;

        const bufferSize = this.audioCtx.sampleRate * duration;
        const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1);
        }

        const noise = this.audioCtx.createBufferSource();
        noise.buffer = buffer;

        // Stereo Panner
        const panner = this.audioCtx.createStereoPanner();
        panner.pan.setValueAtTime(pan, this.audioCtx.currentTime);

        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(vol * 0.1, this.audioCtx.currentTime); // Base volume 0.1
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);

        noise.connect(panner);
        panner.connect(gain);
        gain.connect(this.audioCtx.destination);
        noise.start();
    }

    playHeartbeat(intensity = 1) {
        if (!this.audioCtx) return;
        const t = this.audioCtx.currentTime;

        // Lub
        const osc1 = this.audioCtx.createOscillator();
        const gain1 = this.audioCtx.createGain();
        osc1.frequency.setValueAtTime(60, t);
        osc1.frequency.exponentialRampToValueAtTime(40, t + 0.1);
        gain1.gain.setValueAtTime(0.5 * intensity, t);
        gain1.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc1.connect(gain1);
        gain1.connect(this.audioCtx.destination);
        osc1.start(t);
        osc1.stop(t + 0.15);

        // Dub
        const osc2 = this.audioCtx.createOscillator();
        const gain2 = this.audioCtx.createGain();
        osc2.frequency.setValueAtTime(60, t + 0.2);
        osc2.frequency.exponentialRampToValueAtTime(40, t + 0.3);
        gain2.gain.setValueAtTime(0.4 * intensity, t + 0.2);
        gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc2.connect(gain2);
        gain2.connect(this.audioCtx.destination);
        osc2.start(t + 0.2);
        osc2.stop(t + 0.35);
    }

    playSpatialTone(freq, type, duration, sourceX, sourceY) {
        if (!this.audioCtx) return;

        // Calculate spatial values
        let pan = 0;
        let volume = 1;

        if (this.scene && this.scene.player && this.scene.player.sprite) {
            const px = this.scene.player.sprite.x;
            const py = this.scene.player.sprite.y;

            const dx = sourceX - px;
            const dy = sourceY - py;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 600; // Hearable distance

            if (dist > maxDist) return; // Too far to hear

            pan = dx / 400; // Full pan at 400px
            if (pan < -1) pan = -1;
            if (pan > 1) pan = 1;

            volume = 1 - (dist / maxDist);
            if (volume < 0) volume = 0;
        }

        const osc = this.audioCtx.createOscillator();
        const panner = this.audioCtx.createStereoPanner();
        const gain = this.audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);

        panner.pan.setValueAtTime(pan, this.audioCtx.currentTime);

        // Attack/Decay
        gain.gain.setValueAtTime(0.1 * volume, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01 * volume, this.audioCtx.currentTime + duration);

        osc.connect(panner);
        panner.connect(gain);
        gain.connect(this.audioCtx.destination);

        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }
}

class Player {
    constructor(scene, x, y) {
        this.scene = scene;
        this.sprite = scene.physics.add.sprite(x, y, 'player_sheet', 0);
        this.sprite.setCollideWorldBounds(true);
        if (scene.lights && scene.lights.active) {
            this.sprite.setPipeline('Light2D');
        }

        // Make collision body smaller for easier movement through doors
        this.sprite.body.setSize(20, 20);
        this.sprite.body.setOffset(6, 12);

        this.initAnims();
        this.initFlashlight();

        this.speed = 150;
        this.runSpeed = 250;
        this.lastStepTime = 0;
        this.facingX = 0;
        this.facingY = 1;

        // Stamina System
        this.maxStamina = 100;
        this.stamina = 100;
        this.isRunning = false;
        this.exhausted = false; // If true, cannot run until stamina > 20

        // Input
        this.keyShift = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);
    }

    initAnims() {
        const anims = this.scene.anims;
        if (!anims.exists('walk-down')) {
            anims.create({
                key: 'walk-down',
                frames: [
                    { key: 'player_sheet', frame: 0 },
                    { key: 'player_sheet', frame: 1 },
                    { key: 'player_sheet', frame: 2 }
                ],
                frameRate: 10,
                repeat: -1
            });
            anims.create({
                key: 'walk-left',
                frames: [
                    { key: 'player_sheet', frame: 3 },
                    { key: 'player_sheet', frame: 4 },
                    { key: 'player_sheet', frame: 5 }
                ],
                frameRate: 10,
                repeat: -1
            });
            anims.create({
                key: 'walk-right',
                frames: [
                    { key: 'player_sheet', frame: 6 },
                    { key: 'player_sheet', frame: 7 },
                    { key: 'player_sheet', frame: 8 }
                ],
                frameRate: 10,
                repeat: -1
            });
            anims.create({
                key: 'walk-up',
                frames: [
                    { key: 'player_sheet', frame: 9 },
                    { key: 'player_sheet', frame: 10 },
                    { key: 'player_sheet', frame: 11 }
                ],
                frameRate: 10,
                repeat: -1
            });
        }
    }

    initFlashlight() {
        this.flashlight = this.scene.add.image(this.sprite.x, this.sprite.y, 'flashlight_cone');
        this.flashlight.setOrigin(0.5, 0);
        this.flashlight.setAlpha(0.6);
        this.flashlight.setBlendMode(Phaser.BlendModes.ADD);
        this.flashlight.setDepth(99);

        if (this.scene.lights && this.scene.lights.active) {
            this.lightSource = this.scene.lights.addLight(this.sprite.x, this.sprite.y, 140).setIntensity(1.2);
        } else {
            this.lightSource = null;
        }
        this.flickerTimer = 0;
    }

    update(cursors, wasd, joystick, soundManager, delta) {
        this.sprite.setVelocity(0);

        let moveX = 0;
        let moveY = 0;

        // Keyboard Input
        if (cursors.left.isDown || wasd.left.isDown) moveX = -1;
        else if (cursors.right.isDown || wasd.right.isDown) moveX = 1;

        if (cursors.up.isDown || wasd.up.isDown) moveY = -1;
        else if (cursors.down.isDown || wasd.down.isDown) moveY = 1;

        // Joystick Input
        if (joystick.active) {
            if (Math.abs(joystick.x) > 0.1) moveX = joystick.x;
            if (Math.abs(joystick.y) > 0.1) moveY = joystick.y;
        }

        const staminaState = updateStaminaState({
            stamina: this.stamina,
            maxStamina: this.maxStamina,
            exhausted: this.exhausted,
            wantsRun: this.keyShift.isDown,
            isMoving: moveX !== 0 || moveY !== 0,
            deltaMs: delta
        });
        this.stamina = staminaState.stamina;
        this.exhausted = staminaState.exhausted;
        this.isRunning = staminaState.isRunning;

        // Update UI
        if (window.updateStaminaUI) {
            window.updateStaminaUI(this.stamina, this.maxStamina);
        }

        // Flashlight Flicker Logic
        // DISABLED as per user request ("不要突然把环境变黑")
        /*
        this.flickerTimer++;
        // Use a threshold that doesn't change every frame to avoid weird probability distributions
        if (!this.nextFlickerTime) this.nextFlickerTime = 300 + Math.random() * 300;

        if (this.flickerTimer > this.nextFlickerTime) {
            this.flickerTimer = 0;
            this.nextFlickerTime = 300 + Math.random() * 300;

            // Flicker Image
            this.scene.tweens.add({
                targets: this.flashlight,
                alpha: { from: 0.2, to: 0.6 },
                duration: 50,
                yoyo: true,
                repeat: 3
            });
            // Flicker Light
            this.scene.tweens.add({
                targets: this.lightSource,
                intensity: { from: 0.5, to: 1.2 },
                duration: 50,
                yoyo: true,
                repeat: 3
            });
        }
        */

        if (moveX !== 0 || moveY !== 0) {
            // Normalize
            if (!joystick.active && moveX !== 0 && moveY !== 0) {
                const len = Math.sqrt(moveX * moveX + moveY * moveY);
                moveX /= len;
                moveY /= len;
            }

            const facingLength = Math.hypot(moveX, moveY) || 1;
            this.facingX = moveX / facingLength;
            this.facingY = moveY / facingLength;

            const currentSpeed = this.isRunning ? this.runSpeed : this.speed;
            this.sprite.setVelocityX(moveX * currentSpeed);
            this.sprite.setVelocityY(moveY * currentSpeed);

            // Sound
            const now = this.scene.time.now;
            // Faster steps when running
            const stepInterval = this.isRunning ? 250 : 400;

            if (now - this.lastStepTime > stepInterval && soundManager) {
                if (soundManager.playFootstep) {
                    soundManager.playFootstep();
                } else {
                    soundManager.playNoise(0.08); // Fallback
                }
                this.lastStepTime = now;
            }

            // Anims
            const animSpeed = this.isRunning ? 20 : 10; // Faster anims
            // Update anim speed if already playing?
            // Phaser anims speed is set at creation. We might need to adjust timeScale or just accept it.
            // Simple way: check current anim and set timeScale
            if (this.sprite.anims.currentAnim) {
                this.sprite.anims.msPerFrame = this.isRunning ? 50 : 100;
            }

            if (Math.abs(moveX) > Math.abs(moveY)) {
                if (moveX > 0) this.sprite.anims.play('walk-right', true);
                else this.sprite.anims.play('walk-left', true);
            } else {
                if (moveY > 0) this.sprite.anims.play('walk-down', true);
                else this.sprite.anims.play('walk-up', true);
            }

            // Flashlight Rotation with Inertia (Lerp)
            const targetAngle = Math.atan2(moveY, moveX) - Math.PI / 2;
            // Interpolate current rotation to target rotation
            // 0.15 was old direct speed. Let's make it smoother/laggy.
            // Using Phaser.Math.Angle.RotateTo is good, but let's make it slower for inertia effect
            const lerpFactor = 0.08; // Lower = more lag/weight
            this.flashlight.rotation = Phaser.Math.Angle.RotateTo(this.flashlight.rotation, targetAngle, lerpFactor);

            // Walking Sway Effect (Tween)
            if (!this.swayTween) {
                this.swayTween = this.scene.tweens.add({
                    targets: this.sprite,
                    angle: { from: -5, to: 5 },
                    duration: this.isRunning ? 100 : 200, // Faster sway when running
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            } else if (!this.swayTween.isPlaying()) {
                this.swayTween.restart();
            }
            // Update sway duration if running state changed
            if (this.swayTween.isPlaying()) {
                this.swayTween.updateTo('duration', this.isRunning ? 100 : 200);
            }

        } else {
            this.sprite.anims.stop();

            // Stop Sway
            if (this.swayTween && this.swayTween.isPlaying()) {
                this.swayTween.stop();
                this.sprite.setAngle(0);
            } else {
                // Ensure angle is reset even if tween wasn't running (e.g. just stopped)
                this.sprite.setAngle(0);
            }
        }

function syncStaticBody(gameObject) {
    if (!gameObject) return false;
    if (typeof gameObject.refreshBody === 'function') {
        gameObject.refreshBody();
        return true;
    }
    if (gameObject.body && typeof gameObject.body.updateFromGameObject === 'function') {
        gameObject.body.updateFromGameObject();
        return true;
    }
    return false;
}

function syncCustomStaticBody(gameObject, width, height, offsetX, offsetY) {
    if (!gameObject?.body) return false;
    syncStaticBody(gameObject);
    gameObject.body.setSize(width, height);
    gameObject.body.setOffset(offsetX, offsetY);
    return true;
}

class EventManager {
    constructor(scene) {
        this.scene = scene;
    }

    triggerRandomEvent() {
        const eventType = Phaser.Math.Between(0, 3);
        const scene = this.scene;

        switch(eventType) {
            case 0: // Thunder / Flash
                if (scene.currentMapId === 'room_backyard' || scene.currentMapId === 'room_entrance') {
                    scene.cameras.main.flash(100, 255, 255, 255);
                    scene.time.delayedCall(200, () => {
                         if (scene.soundManager) scene.soundManager.playTone(50, 'sawtooth', 0.5); // Low rumble
                    });
                }
                break;
            case 1: // Camera Bump (Poltergeist)
                scene.cameras.main.shake(100, 0.002);
                if (scene.soundManager) scene.soundManager.playTone(100, 'square', 0.1); // Wood creak sound
                break;
            case 2: // Distant whisper/whistle
                if (scene.soundManager && scene.player && scene.player.sprite) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = 150 + Math.random() * 200;
                    const wx = scene.player.sprite.x + Math.cos(angle) * r;
                    const wy = scene.player.sprite.y + Math.sin(angle) * r;
                    scene.soundManager.playSpatialTone(800, 'sine', 0.3, wx, wy);
                }
                break;
            case 3: // Lights flicker
                if (scene.lights.active) {
                    const originalR = scene.lights.ambientColor.r;
                    const originalG = scene.lights.ambientColor.g;
                    const originalB = scene.lights.ambientColor.b;

                    let flickerCount = 0;
                    scene.time.addEvent({
                        delay: 50,
                        repeat: 7,
                        callback: () => {
                            flickerCount++;
                            if (flickerCount % 2 === 0) {
                                scene.lights.setAmbientColor(0x333333); // Not too dark
                            } else {
                                scene.lights.setAmbientColor(0x222222); // Not too dark
                            }

                            if (flickerCount >= 6) {
                                scene.lights.setAmbientColor(0x888888); // Restore to bright ambient
                            }
                        }
                    });
                }
                break;
        }
    }

    triggerPaperDollEvent() {
        const scene = this.scene;
        if (!scene.npc) return;

        if ((scene.gameState.hasRice && !scene.gameState.hasMatches) || (!scene.gameState.hasRice && scene.gameState.hasMatches)) {
            scene.cameras.main.flash(200, 255, 255, 255);
            scene.playSound(50, 'sawtooth', 1.5);
            scene.npc.x = 320;
            scene.npc.y = 400;
            scene.time.delayedCall(1000, () => {
                window.showDialog('主角', '刚才...是不是打雷了？那个纸人好像动了一下...');
            });
        } else if (scene.gameState.hasRice && scene.gameState.hasMatches) {
             scene.cameras.main.flash(200, 255, 255, 255);
             scene.playSound(50, 'sawtooth', 1.5);
             scene.npc.setVisible(false);
             scene.npc.body.enable = false;
             scene.time.delayedCall(1000, () => {
                window.showDialog('主角', '那个纸人不见了！');
             });
        }
    }
}

class MapManager {
    constructor(scene) {
        this.scene = scene;
        this.walls = null;
        this.doors = null;
        this.photos = null;
        this.furniture = null;
        this.floorLayer = [];
    }

    createMap(mapId) {
        const mapDef = Maps[mapId];
        if (!mapDef) {
            console.error('Map not found:', mapId);
            return;
        }

        const mapData = mapDef.data;
        const visual = mapDef.visual || {};

        // Set World Bounds
        const mapWidth = mapDef.width * 32;
        const mapHeight = mapDef.height * 32;
        this.scene.physics.world.setBounds(0, 0, mapWidth, mapHeight);
        this.scene.cameras.main.setBounds(0, 0, mapWidth, mapHeight);

        // Memory Room Special Settings
        // On mobile, use simple lighting for ALL maps to improve performance
        if (mapId === 'room_memory' || this.scene.isMobile) {
            this.scene.lights.enable().setAmbientColor(0xffffff); // Full bright / No dynamic lights
        } else if (visual.ambient !== undefined) {
            this.scene.lights.enable();
            this.scene.lights.setAmbientColor(visual.ambient);
        } else {
            // Standard Horror Settings (PC Only)
            this.scene.lights.enable();
            this.scene.lights.setAmbientColor(0x666666);
        }

        for (const guide of visual.guideLights || []) {
            this.scene.lights.addLight(guide.x, guide.y, guide.radius)
                .setColor(guide.color)
                .setIntensity(1.1);
        }

        // Initialize groups
        // We use scene-level properties because GameScene/InteractionManager expects them
        if (!this.scene.walls) this.scene.walls = this.scene.physics.add.staticGroup();
        if (!this.scene.doors) this.scene.doors = this.scene.add.group();
        if (!this.scene.photos) this.scene.photos = this.scene.physics.add.staticGroup();

        // Internal reference for convenience
        this.walls = this.scene.walls;
        this.doors = this.scene.doors;
        this.photos = this.scene.photos;

        // New group for furniture to simplify collision
        this.furniture = this.scene.physics.add.staticGroup();
        this.scene.furniture = this.furniture;
        this.scene.interactables = this.scene.physics.add.staticGroup(); // Unified interactables group

        this.floorLayer = [];
        this.scene.floorLayer = this.floorLayer;

        for (let y = 0; y < mapData.length; y++) {
            for (let x = 0; x < mapData[y].length; x++) {
                // Determine textures based on map type
                let floorTex = 'tile_floor';
                let wallTex = 'tile_wall';

                if (mapId === 'room_entrance' || mapId === 'room_backyard' || mapId === 'room_prologue') {
                    floorTex = 'tile_mud';
                    wallTex = 'tile_hedge';
                }

                const tile = this.scene.add.image(x * 32 + 16, y * 32 + 16, floorTex);
                if (visual.floorTint !== undefined) tile.setTint(visual.floorTint);

                // Only apply Light2D pipeline on PC and non-memory maps
                if (mapId !== 'room_memory' && !this.scene.isMobile) {
                    tile.setPipeline('Light2D');
                }

                this.floorLayer.push(tile);

                if (mapData[y][x] === 1) {
                    const wall = this.walls.create(x * 32 + 16, y * 32 + 16, wallTex);
                    if (visual.wallTint !== undefined) wall.setTint(visual.wallTint);
                    if (mapId !== 'room_memory' && !this.scene.isMobile) {
                        wall.setPipeline('Light2D');
                    }
                }
            }
        }

        this.createObjects(mapDef.objects, mapId);
        this.scene.navigationBlockedRects = this.getNavigationBlockedRects();
    }

    getNavigationBlockedRects() {
        const groups = [this.furniture, this.scene.trees].filter(Boolean);
        return groups.flatMap(group => group.getChildren()).filter(obj => obj.active && obj.body?.enable).map(obj => ({
            x: obj.body.x,
            y: obj.body.y,
            width: obj.body.width,
            height: obj.body.height
        }));
    }

    createObjects(objs, mapId) {
        const scene = this.scene;
        const isHorror = mapId !== 'room_memory';

        // Helper to add to interactables
        const addToInteractables = (obj, data) => {
            if (data && (data.dialog || data.id)) {
                this.scene.interactables.add(obj);
                if (data.dialog) obj.dialog = data.dialog;
                if (data.id) obj.objId = data.id;
                for (const key of ['clueId', 'clueType', 'documentTitle', 'documentText', 'puzzleId', 'itemGrant', 'memoryTrigger', 'memoryReturn', 'memoryComplete', 'endingChoice']) {
                    if (data[key] !== undefined) obj[key] = data[key];
                }
                obj.interaction = normalizeInteractionMeta(data, { textureKey: obj.texture?.key });
                if (obj.interaction.marker && !obj.interactionMarker) {
                    obj.interactionMarker = scene.add.circle(obj.x, obj.y - Math.max(18, obj.displayHeight * 0.55), 4, 0xffd27a, 0.85)
                        .setStrokeStyle(1, 0xffffff, 0.9)
                        .setDepth(350);
                    scene.tweens.add({
                        targets: obj.interactionMarker,
                        alpha: { from: 0.35, to: 0.9 },
                        scale: { from: 0.8, to: 1.15 },
                        duration: 900,
                        yoyo: true,
                        repeat: -1

                    obj.once?.('destroy', () => obj.interactionMarker?.destroy());

                if (isHorror) scratch.setPipeline('Light2D');
                if (scratchData.dialog) {
                    addToInteractables(scratch, { ...scratchData, id: scratchData.id || `scratch_${scratchData.x}_${scratchData.y}` });
                }
            });
        }

        if (objs.notes) {
            // Notes are static group but should not collide?
            // Actually let's use images for notes on floor
            objs.notes.forEach(noteData => {
                const note = this.scene.add.image(noteData.x, noteData.y, 'trash_paper');
                note.setTint(0xffcc00);
                if (isHorror) note.setPipeline('Light2D');
                if (noteData.dialog) {
                    addToInteractables(note, { ...noteData, id: noteData.id || `note_${noteData.x}_${noteData.y}` });
                }
            });
        }

        if (objs.locked_window) {
            scene.locked_window = scene.add.rectangle(objs.locked_window.x, objs.locked_window.y, 40, 40, 0x0000ff, 0);
            scene.physics.add.existing(scene.locked_window, true);
            scene.locked_window.objId = 'locked_window';
            this.scene.interactables.add(scene.locked_window);
            addToInteractables(scene.locked_window, objs.locked_window);
        }

        if (objs.exit_door) {
            scene.exit_door = scene.add.rectangle(objs.exit_door.x, objs.exit_door.y, 64, 32, 0xff0000, 0);
            scene.physics.add.existing(scene.exit_door, true);
            addToInteractables(scene.exit_door, objs.exit_door);
        }

        if (objs.interactables) {
            objs.interactables.forEach(data => {
                const texture = data.texture || 'trash_paper';
                const item = scene.add.image(data.x, data.y, texture);
                if (data.tint !== undefined) item.setTint(data.tint);
                if (data.alpha !== undefined) item.setAlpha(data.alpha);
                if (data.scale !== undefined) item.setScale(data.scale);
                if (isHorror && !scene.isMobile) item.setPipeline('Light2D');

                scene.physics.add.existing(item, true);
                syncStaticBody(item);

                item.objId = data.id;
                item.dialog = data.dialog;
                item.documentTitle = data.documentTitle;
                item.documentText = data.documentText;
                item.clueId = data.clueId;
                item.clueType = data.clueType;
                item.memoryTrigger = data.memoryTrigger;
                item.memoryReturn = data.memoryReturn;
                item.memoryComplete = data.memoryComplete;
                item.puzzleId = data.puzzleId;
                item.itemGrant = data.itemGrant;
                item.endingChoice = data.endingChoice;
                item.endingWeight = data.endingWeight;
                item.interactLabel = data.interactLabel;
                addToInteractables(item, data);
            });
        }

        if (objs.doors) {
            objs.doors.forEach(doorData => {
                const w = (doorData.w || 1) * 32;
                const h = (doorData.h || 1) * 32;
                const cx = (doorData.x * 32) + (w / 2);
                const cy = (doorData.y * 32) + (h / 2);

                const door = scene.add.rectangle(cx, cy, w + 16, h + 16, 0x00ff00, 0);
                scene.physics.add.existing(door, true);

                // Visual Indicator for Attic Door (since it's just a wall otherwise)
                if (doorData.targetMap === 'room_attic') {
                    const visual = scene.add.rectangle(cx, cy, w, h, 0x000000, 0.8);
                    visual.setDepth(10); // Above wall
                    // Maybe a ladder hint?
                    const ladder = scene.add.graphics();
                    ladder.lineStyle(2, 0x8b4513);
                    ladder.moveTo(cx - 10, cy - 20); ladder.lineTo(cx - 10, cy + 20);
                    ladder.moveTo(cx + 10, cy - 20); ladder.lineTo(cx + 10, cy + 20);
                    for(let i=0; i<5; i++) {
                        ladder.moveTo(cx - 10, cy - 15 + i*8); ladder.lineTo(cx + 10, cy - 15 + i*8);
                    }
                    ladder.strokePath();
                    ladder.setDepth(11);
                }

                door.targetMap = doorData.targetMap;
                door.targetX = doorData.targetX;
                door.targetY = doorData.targetY;
                door.locked = doorData.locked;
                if (door.targetMap === 'room_entrance' && scene.gameState.doorSlammed && !scene.gameState.candlesLit) {
                    door.locked = true;
                }
                door.key = doorData.key;
                door.isLoop = doorData.isLoop;

                // Handle hidden doors
                if (doorData.hidden) {
                    // Check if it should be revealed based on game state
                    if (door.targetMap === 'room_secret' && scene.gameState.cabinetMoved) {
                        door.visible = true;
                        door.body.enable = true;

                        // Add visual "hole"
                        const hole = scene.add.rectangle(cx, cy, w, h, 0x000000);
                        hole.setDepth(door.depth - 1); // Behind door debug
                    } else {
                        door.visible = false;
                        door.body.enable = false; // Disable physics collision
                        door.isHiddenDoor = true; // Flag for identification
                    }
                }

                this.doors.add(door);
            });
        }

        // Memory Room Objects
        if (objs.table) {
            scene.table = this.furniture.create(objs.table.x, objs.table.y, 'desk');
            addToInteractables(scene.table, { dialog: '一张桌子' });
        }
        if (objs.parents_npc) {
            // Dad (Left)
            scene.dad = this.furniture.create(objs.parents_npc.x - 40, objs.parents_npc.y, 'npc_paper');
            scene.dad.setTint(0xaaaaaa);
            syncStaticBody(scene.dad);
            // Add interaction
            scene.dad.objId = 'dad_ghost';
            addToInteractables(scene.dad, { id: 'dad_ghost', interaction: { label: '父亲的影子', verb: '对话', priority: 30, radius: 120, marker: true, blocksMovement: true } });

            // Mom (Right)
            scene.mom = this.furniture.create(objs.parents_npc.x + 40, objs.parents_npc.y, 'npc_paper');
            scene.mom.setTint(0xaaaaaa);
            syncStaticBody(scene.mom);
            // Add interaction
            scene.mom.objId = 'mom_ghost';
            addToInteractables(scene.mom, { id: 'mom_ghost', interaction: { label: '母亲的影子', verb: '对话', priority: 30, radius: 120, marker: true, blocksMovement: true } });
        }

        if (objs.black_cloth) {
             scene.black_cloth = scene.add.rectangle(objs.black_cloth.x, objs.black_cloth.y, 40, 40, 0x000000, 0);
             scene.physics.add.existing(scene.black_cloth, true);
             addToInteractables(scene.black_cloth, objs.black_cloth);
        }
    }
}

const TILE_SIZE = 32;

function cloneAuthoredValue(value) {
    if (Array.isArray(value)) return value.map(cloneAuthoredValue);
    if (value !== null && typeof value === 'object') {
        return Object.fromEntries(
            Object.entries(value).map(([key, nestedValue]) => [key, cloneAuthoredValue(nestedValue)])
        );
    }
    return value;
}

function getSliceState(scene) {
    return scene.sliceState || scene.gameState?.slice || {};
}

class SliceMapManager {
    constructor(scene) {
        this.scene = scene;
        this.mapDef = null;
        this.currentMapId = null;
        this.walls = null;
        this.doors = null;
        this.furniture = null;
        this.interactables = null;
        this.floorLayer = [];
        this.navigationBlockedRects = [];
        this.safeZones = {};
        this.baseSafeZones = {};
        this.roomEffects = [];
        this.revisionEffects = [];
        this._revisionKey = null;
    }

    createMap(mapId) {
        const authoredMap = SliceMaps[mapId];
        if (!authoredMap) {
            console.error('Slice map not found:', mapId);
            return false;
        }

        this.destroyRoomEffects();
        this.clearRevisionEffects();
        this.currentMapId = mapId;
        this.mapDef = cloneAuthoredValue(authoredMap);
        this._revisionKey = null;
        this.scene.sliceMapDef = this.mapDef;

        const mapWidth = this.mapDef.width * TILE_SIZE;
        const mapHeight = this.mapDef.height * TILE_SIZE;
        this.scene.physics.world.setBounds(0, 0, mapWidth, mapHeight);
        this.scene.cameras.main.setBounds(0, 0, mapWidth, mapHeight);

        this.scene.lights.enable();
        this.scene.lights.setAmbientColor(this.mapDef.visual?.ambient ?? 0x555555);

        this.walls = this.scene.physics.add.staticGroup();
        this.doors = this.scene.add.group();
        this.furniture = this.scene.physics.add.staticGroup();
        this.interactables = this.scene.physics.add.staticGroup();
        this.floorLayer = [];
        this.navigationBlockedRects = [];
        this.safeZones = {};
        this.baseSafeZones = {};

        this.scene.walls = this.walls;
        this.scene.doors = this.doors;
        this.scene.furniture = this.furniture;
        this.scene.interactables = this.interactables;
        this.scene.floorLayer = this.floorLayer;
        this.scene.navigationBlockedRects = this.navigationBlockedRects;
        this.scene.sliceSafeZones = this.safeZones;

        this.renderTiles();
        this.createTable(this.mapDef.objects.table);
        this.createProps(this.mapDef.objects.props || []);
        this.createDoors(this.mapDef.objects.doors || []);
        this.applyRoomRevision(getSliceState(this.scene));
        return true;
    }

    renderTiles() {
        const visual = this.mapDef.visual || {};
        for (let y = 0; y < this.mapDef.data.length; y += 1) {
            for (let x = 0; x < this.mapDef.data[y].length; x += 1) {
                const worldX = x * TILE_SIZE + TILE_SIZE / 2;
                const worldY = y * TILE_SIZE + TILE_SIZE / 2;
                const floor = this.scene.add.image(worldX, worldY, 'tile_floor');
                if (visual.floorTint !== undefined) floor.setTint(visual.floorTint);
                if (!this.scene.isMobile) floor.setPipeline('Light2D');
                this.floorLayer.push(floor);

                if (this.mapDef.data[y][x] !== 1) continue;
                const wall = this.walls.create(worldX, worldY, 'tile_wall');
                if (visual.wallTint !== undefined) wall.setTint(visual.wallTint);
                if (!this.scene.isMobile) wall.setPipeline('Light2D');
            }
        }
    }

    createTable(tableData) {
        if (!tableData) return;

        const tableVisual = this.scene.add.image(tableData.x, tableData.y, 'desk');
        tableVisual.setDisplaySize?.(tableData.collisionBounds.width, tableData.collisionBounds.height);
        if (!this.scene.isMobile) tableVisual.setPipeline('Light2D');
        tableVisual.setDepth?.(20);
        this.scene.table = tableVisual;

        const bounds = cloneAuthoredValue(tableData.collisionBounds);
        const blocker = this.scene.add.rectangle(
            bounds.x + bounds.width / 2,
            bounds.y + bounds.height / 2,
            bounds.width,
            bounds.height,
            0x000000,
            0
        );
        blocker.objId = 'kitchen_table_collision';
        blocker.sliceAction = null;
        this.scene.physics.add.existing(blocker, true);
        blocker.body?.setSize?.(bounds.width, bounds.height);
        blocker.refreshBody?.();
        this.furniture.add(blocker);
        this.scene.tableCollision = blocker;

        this.navigationBlockedRects.push(bounds);
        this.baseSafeZones = cloneAuthoredValue(tableData.safeZones || {});
        this.safeZones = cloneAuthoredValue(this.baseSafeZones);
        this.scene.navigationBlockedRects = this.navigationBlockedRects;
        this.scene.sliceSafeZones = this.safeZones;
    }

    createProps(props) {
        for (const data of props) {
            if (data.kind === 'ambient_anchor') {
                this.createAmbientAnchor(data);
                continue;
            }

            const object = this.scene.add.image(data.x, data.y, data.texture);
            if (!this.scene.isMobile) object.setPipeline('Light2D');
            this.scene.physics.add.existing(object, true);
            this.attachInteraction(object, data);
        }
    }

    attachInteraction(obj, data) {
        obj.objId = data.id;
        obj.sliceAction = data.kind;
        obj.sliceData = cloneAuthoredValue(data);
        obj.interaction = normalizeInteractionMeta({
            id: data.id,
            dialog: data.text,
            interaction: {
                label: data.label || data.id,
                verb: data.verb || (data.kind === 'observe' ? '观察' : '操作'),
                priority: data.priority || 30,
                radius: data.radius || 72,
                marker: false,
                blocksMovement: data.blocksMovement ?? false
            }
        }, { textureKey: obj.texture?.key });
        this.scene.interactables.add(obj);
    }

    createAmbientAnchor(data) {
        if (data.effect === 'four_place_settings') {
            const timer = this.scene.time.addEvent({
                delay: 5200,
                loop: true,
                callback: () => this.scene.soundManager?.playSpatialNoise(0.025, data.x, data.y)
            });
            this.roomEffects.push(timer);
            return;
        }

        if (data.effect === 'warm_door_seam') {
            const seam = this.scene.add.rectangle(data.x, data.y, 6, 54, 0xc58b55, 0.24);
            seam.setDepth?.(18);
            if (!this.scene.isMobile) seam.setPipeline?.('Light2D');
            this.roomEffects.push(seam);
            return;
        }

        if (data.effect === 'faint_rice_steam') {
            const steam = this.scene.add.particles(data.x, data.y, 'rain', {
                speedY: { min: -12, max: -5 },
                speedX: { min: -3, max: 3 },
                scale: { start: 0.28, end: 0 },
                alpha: { start: 0.16, end: 0 },
                lifespan: 1800,
                quantity: 1,
                frequency: 650,
                tint: 0xd8d0bd
            });
            steam.setDepth?.(16);
            this.roomEffects.push(steam);
        }
    }

    createDoors(doors) {
        for (const data of doors) {
            const width = (data.w || 1) * TILE_SIZE;
            const height = (data.h || 1) * TILE_SIZE;
            const x = data.x * TILE_SIZE + width / 2;
            const y = data.y * TILE_SIZE + height / 2;
            const door = this.scene.add.image(x, y, 'tile_wall');
            door.setDisplaySize?.(width + 16, height + 16);
            door.setDepth?.(12);
            this.scene.physics.add.existing(door, true);
            door.body?.setSize?.(width + 16, height + 16);
            door.refreshBody?.();
            door.objId = data.id;
            door.doorId = data.id;
            door.targetMap = data.targetMap;
            door.targetX = data.targetX;
            door.targetY = data.targetY;
            door.sliceData = cloneAuthoredValue(data);
            this.doors.add(door);
        }
        this.refreshDoorAccess(getSliceState(this.scene));
    }

    refreshDoorAccess(sliceState = getSliceState(this.scene)) {
        for (const door of this.doors?.getChildren?.() || []) {
            door.locked = !getSliceDoorAccess(door.doorId, sliceState);
            if (
                this.currentMapId === 'room_kitchen' &&
                door.doorId === 'kitchen_side_door' &&
                sliceState?.planeChoice === 'leave'
            ) {
                door.locked = true;
            }
            door.setTint?.(door.locked ? 0x4a2727 : 0x796754);
            door.setAlpha?.(door.locked ? 0.82 : 0.32);
        }
    }

    applyRoomRevision(sliceState = getSliceState(this.scene)) {
        const revision = {
            mapId: this.currentMapId,
            slicePhase: sliceState?.slicePhase || 'arrival',
            tableSolved: sliceState?.tableSolved === true,
            bowlPlacements: cloneAuthoredValue(sliceState?.bowlPlacements || {}),
            mealReplaySeen: Array.isArray(sliceState?.mealReplaySeen) ? [...sliceState.mealReplaySeen] : [],
            planeChoice: sliceState?.planeChoice === 'take' || sliceState?.planeChoice === 'leave'
                ? sliceState.planeChoice
                : null,
            paperDollIndex: Number.isInteger(sliceState?.paperDollIndex) ? sliceState.paperDollIndex : 0
        };
        const revisionKey = JSON.stringify(revision);
        if (revisionKey === this._revisionKey) return false;
        this._revisionKey = revisionKey;

        this.clearRevisionEffects();
        if (this.currentMapId === 'room_kitchen') {
            const keepsTableProtection = revision.planeChoice !== 'take';
            this.safeZones = keepsTableProtection ? cloneAuthoredValue(this.baseSafeZones) : {};
            this.scene.sliceSafeZones = this.safeZones;
            if (revision.tableSolved && keepsTableProtection) this.createKitchenProtectionEffects();
        }

        this.refreshDoorAccess(sliceState);
        this.scene.sliceRoomRevision = cloneAuthoredValue(revision);

        if (this.currentMapId === 'room_main') {
            const coldBowl = this.findProp('main_cold_bowl');
            coldBowl?.setAlpha(revision.tableSolved ? (revision.slicePhase === 'return' ? 0.28 : 0.55) : 1);
            if (coldBowl) coldBowl.sliceRevision = revision.tableSolved ? 'table_restored' : 'cold_fourth_place';
        }

        if (this.currentMapId === 'room_kitchen') {
            this.scene.sliceBowlPlacements = cloneAuthoredValue(revision.bowlPlacements);
            this.scene.sliceMealReplaySeen = [...revision.mealReplaySeen];
            this.scene.slicePaperDollIndex = revision.paperDollIndex;
            if (this.scene.table) this.scene.table.sliceRevision = revision.tableSolved ? 'solved' : 'unresolved';
        }

        if (this.currentMapId === 'room_bedroom_me') {
            const plane = this.findProp('bedroom_plane');
            if (plane) {
                plane.sliceRevision = revision.planeChoice || 'unresolved';
                plane.setVisible(revision.planeChoice !== 'take');
                plane.setAlpha(revision.planeChoice === 'leave' ? 0.45 : 1);
            }
            const mirror = this.findProp('child_mirror');
            if (mirror) mirror.sliceRevision = revision.planeChoice ? 'after_choice' : 'waiting';
            for (const choiceId of ['plane_bag', 'plane_drawer']) {
                const choice = this.findProp(choiceId);
                if (choice) choice.choiceSelected = choice.sliceData?.choice === revision.planeChoice;
            }
        }

        return true;
    }

    createKitchenProtectionEffects() {
        const table = this.mapDef?.objects?.table;
        if (!table) return;

        const warmth = this.scene.add.rectangle(table.x, table.y, 104, 84, 0xb37845, 0.09);
        warmth.objId = 'kitchen_table_warmth';
        warmth.sliceEffectId = 'kitchen_table_warmth';
        warmth.setDepth?.(19);
        if (!this.scene.isMobile) warmth.setPipeline?.('Light2D');

        const steam = this.scene.add.particles(table.offering.x, table.offering.y - 5, 'rain', {
            speedY: { min: -16, max: -7 },
            speedX: { min: -3, max: 3 },
            scale: { start: 0.3, end: 0 },
            alpha: { start: 0.2, end: 0 },
            lifespan: 1600,
            quantity: 1,
            frequency: 520,
            tint: 0xe1d5bb
        });
        steam.objId = 'kitchen_offering_steam';
        steam.sliceEffectId = 'kitchen_offering_steam';
        steam.setDepth?.(22);
        this.revisionEffects.push(warmth, steam);
    }

    findProp(objId) {
        return (this.interactables?.getChildren?.() || []).find(object => object.objId === objId) || null;
    }

    destroyRoomEffects() {
        for (const effect of this.roomEffects) {
            if (typeof effect?.remove === 'function') effect.remove();
            else effect?.destroy?.();
        }
        this.roomEffects = [];
    }

    clearRevisionEffects() {
        for (const effect of this.revisionEffects) {
            if (typeof effect?.remove === 'function') effect.remove();
            else effect?.destroy?.();
        }
        this.revisionEffects = [];
    }

    destroy() {
        this.destroyRoomEffects();
        this.clearRevisionEffects();
        this._revisionKey = null;
    }
}

const DEFAULT_INTERACTION_RADIUS = 72;
const SLICE_MIN_FACING_DOT = 0;
const SLICE_DIRECTION_EPSILON = 0.000001;

function getSlicePrompt(meta) {
    return `${meta.verb}：${meta.label}  [空格/E]`;
}

function routeSliceAction(action) {
    if (action === 'bowl' || action === 'seat') return 'table';
    if (action === 'plane' || action === 'plane_choice' || action === 'mirror') return 'plane';
    if (action === 'observe') return 'observe';
    return 'ignore';
}

function clamp(value, minimum, maximum) {
    return Math.max(minimum, Math.min(maximum, value));
}

function isAvailableInteraction(object) {
    if (!object || object.active === false || object.visible === false) return false;
    if (object.interactionEnabled === false) return false;
    if (object.sliceAction === 'ambient_anchor' || object.sliceData?.kind === 'ambient_anchor') return false;
    return routeSliceAction(object.sliceAction) !== 'ignore';
}

function getInteractionMeta(object) {
    const authored = object.sliceData || {};
    return {
        label: object.interaction?.label || authored.label || authored.id || object.objId || '可疑物件',
        verb: object.interaction?.verb || authored.verb || (object.sliceAction === 'observe' ? '观察' : '操作'),
        priority: object.interaction?.priority ?? authored.priority ?? 30,
        radius: object.interaction?.radius ?? authored.radius ?? DEFAULT_INTERACTION_RADIUS
    };
}

class SliceInteractionManager {
    constructor(scene, focusBand = INTERACTION_FOCUS_BAND) {
        this.scene = scene;
        this.focusBand = focusBand;
    }

    update() {
        this.checkInteraction();
    }

    getDistanceToObject(playerX, playerY, object) {
        if (!object || object.active === false) return Infinity;

        let bodyDistance = Infinity;
        const body = object.body;
        if (
            body &&
            Number.isFinite(body.x) &&
            Number.isFinite(body.y) &&
            Number.isFinite(body.width) &&
            Number.isFinite(body.height)
        ) {
            const nearestX = clamp(playerX, body.x, body.x + body.width);
            const nearestY = clamp(playerY, body.y, body.y + body.height);
            bodyDistance = Math.hypot(nearestX - playerX, nearestY - playerY);
        }

        const centerDistance = Number.isFinite(object.x) && Number.isFinite(object.y)
            ? Math.hypot(object.x - playerX, object.y - playerY)
            : Infinity;
        return Math.min(bodyDistance, centerDistance);
    }

    findInteractionTarget() {
        const player = this.scene.player;
        const sprite = player?.sprite;
        if (!sprite) return null;

        const rawFacingX = Number.isFinite(player.facingX) ? player.facingX : 0;
        const rawFacingY = Number.isFinite(player.facingY) ? player.facingY : 0;
        const facingLength = Math.hypot(rawFacingX, rawFacingY);
        const hasFacing = facingLength > SLICE_DIRECTION_EPSILON;
        const facingX = hasFacing ? rawFacingX / facingLength : 0;
        const facingY = hasFacing ? rawFacingY / facingLength : 0;
        const candidates = [];
        for (const object of this.scene.interactables?.getChildren?.() || []) {
            if (!isAvailableInteraction(object)) continue;
            const meta = getInteractionMeta(object);
            const distance = this.getDistanceToObject(sprite.x, sprite.y, object);
            const radius = Number.isFinite(meta.radius) && meta.radius > 0
                ? meta.radius
                : DEFAULT_INTERACTION_RADIUS;
            if (distance > radius) continue;

            const dx = object.x - sprite.x;
            const dy = object.y - sprite.y;
            const centerDistance = Math.hypot(dx, dy);
            const centersOverlap = centerDistance <= SLICE_DIRECTION_EPSILON;
            const facingDot = centersOverlap || !hasFacing
                ? 0
                : (dx / centerDistance) * facingX + (dy / centerDistance) * facingY;
            if (hasFacing && !centersOverlap && facingDot <= SLICE_MIN_FACING_DOT) continue;
            candidates.push({
                obj: object,
                distance,
                priority: meta.priority,
                facingDot,
                meta,
                route: routeSliceAction(object.sliceAction)
            });
        }
        return selectInteractionCandidate(candidates, this.focusBand);
    }

    checkInteraction() {
        const keyboard = globalThis.Phaser?.Input?.Keyboard;
        const readPressed = key => (
            key && typeof keyboard?.JustDown === 'function'
                ? keyboard.JustDown(key) === true
                : false
        );
        // Read both edges every frame. A short-circuit here leaves the second edge pending.
        const pressedE = readPressed(this.scene.keyE);
        const pressedSpace = readPressed(this.scene.keySpace);
        const lastDialogCloseTime = Number(globalThis.window?.lastDialogCloseTime) || 0;
        if (lastDialogCloseTime > 0 && Date.now() - lastDialogCloseTime < 500) {
            this.scene.interactText?.setVisible?.(false);
            this.scene.currentTarget = null;
            return null;
        }

        const selected = this.findInteractionTarget();
        const prompt = this.scene.interactText;
        const sprite = this.scene.player?.sprite;

        if (!selected || !prompt || !sprite) {
            prompt?.setVisible?.(false);
            this.scene.currentTarget = null;
            return null;
        }

        this.scene.currentTarget = {
            type: selected.route,
            route: selected.route,
            obj: selected.obj
        };
        prompt
            .setText(getSlicePrompt(selected.meta))
            .setPosition(sprite.x, sprite.y - 40)
            .setVisible(true);

        if (pressedE || pressedSpace) {
            return this.handleInteraction();
        }
        return this.scene.currentTarget;
    }

    handleInteraction() {
        const target = this.scene.currentTarget;
        const object = target?.obj;
        if (!target || !isAvailableInteraction(object)) return { status: 'ignored' };

        const route = target.route || target.type || routeSliceAction(object.sliceAction);
        if (route === 'table') {
            return this.scene.kitchenTableController?.handleAction(object) || { status: 'table_unavailable' };
        }

        if (route === 'observe') {
            const fact = object.sliceData?.text;
            if (typeof fact !== 'string' || fact.length === 0) return { status: 'missing_fact' };
            globalThis.window?.showDialog?.('主角', fact);
            return { status: 'observed', targetId: object.objId || object.sliceData?.id || null };
        }

        if (route === 'plane') {
            return {
                status: 'deferred',
                route: 'plane',
                targetId: object.objId || object.sliceData?.id || null
            };
        }
        return { status: 'ignored' };
    }

    destroy() {
        this.scene.interactText?.setVisible?.(false);
        this.scene.currentTarget = null;
    }
}

const HELD_BOWL_OFFSET = Object.freeze({ x: 18, y: -28 });

const BOWL_PRESENTATION = Object.freeze({
    wine: Object.freeze({ texture: 'bowl_wine', label: '酒味缺口碗' }),
    medicine: Object.freeze({ texture: 'bowl_medicine', label: '药渍白瓷碗' }),
    child: Object.freeze({ texture: 'bowl_child', label: '蓝边纸飞机碗' })
});

const SEAT_LABELS = Object.freeze({
    nail: '钉死椅前的座位',
    stove: '靠灶台的座位',
    side: '靠侧门的座位'
});

function cloneKitchenTableValue(value) {
    if (Array.isArray(value)) return value.map(cloneKitchenTableValue);
    if (value !== null && typeof value === 'object') {
        return Object.fromEntries(
            Object.entries(value).map(([key, nested]) => [key, cloneKitchenTableValue(nested)])
        );
    }
    return value;
}

function setPosition(object, x, y) {
    if (typeof object?.setPosition === 'function') object.setPosition(x, y);
    else if (object) {
        object.x = x;
        object.y = y;
    }
}

function setBodyEnabled(object, enabled) {
    if (!object?.body) return;
    object.body.enable = enabled;
}

function syncBody(object) {
    object?.body?.updateFromGameObject?.();
}

function withReplayObservation(result, replayId, short) {
    return { ...result, replayId, short };
}

class KitchenTableController {
    constructor(scene, tableData = scene.sliceMapDef?.objects?.table, state = scene.sliceState || scene.gameState?.slice) {
        this.scene = scene;
        this.tableData = cloneKitchenTableValue(tableData);
        this.state = state;
        this.bowlSprites = new Map();
        this.seatHotspots = new Map();
        this.offeringBowl = null;
        this.ownedObjects = [];
        this.destroyed = false;

        if (!this.tableData || !this.state || typeof this.state !== 'object') {
            throw new Error('Kitchen table controller requires authored table data and slice state');
        }

        this.advancePhase('investigation', 'arrival');
        this.normalizePersistedState();
        this.createEntities();
        this.syncSprites();
        const existingDirector = this.scene.memoryReplayDirector;
        this.memoryReplayDirector = existingDirector && existingDirector.destroyed !== true
            ? existingDirector
            : new MemoryReplayDirector(this.scene, this.state);
        this.scene.memoryReplayDirector = this.memoryReplayDirector;
    }

    advancePhase(nextPhase, requiredCurrentPhase) {
        if (this.state.slicePhase !== requiredCurrentPhase) return false;
        Object.assign(this.state, transitionSlicePhase(this.state, nextPhase));
        return true;
    }

    replayIsActive() {
        return this.memoryReplayDirector?.active === true;
    }

    normalizePersistedState() {
        const sourcePlacements = this.state.bowlPlacements;
        const safeSource = sourcePlacements !== null && typeof sourcePlacements === 'object' && !Array.isArray(sourcePlacements)
            ? sourcePlacements
            : Object.fromEntries(KITCHEN_SEATS.map(seatId => [seatId, null]));
        this.state.bowlPlacements = normalizeBowlPlacements(safeSource);

        let heldBowl = KITCHEN_BOWLS.includes(this.state.heldBowl) ? this.state.heldBowl : null;
        if (this.state.tableSolved === true) heldBowl = null;
        if (heldBowl) {
            for (const seatId of KITCHEN_SEATS) {
                if (this.state.bowlPlacements[seatId] === heldBowl) {
                    this.state.bowlPlacements[seatId] = null;
                }
            }
        }
        this.state.heldBowl = heldBowl;
    }

    createEntities() {
        for (const bowlId of KITCHEN_BOWLS) {
            const origin = this.tableData.bowlOrigins[bowlId];
            const presentation = BOWL_PRESENTATION[bowlId];
            const bowl = this.scene.add.image(origin.x, origin.y, presentation.texture);
            bowl.objId = `kitchen_bowl_${bowlId}`;
            bowl.sliceAction = 'bowl';
            bowl.sliceData = {
                id: bowl.objId,
                kind: 'bowl',
                bowlId,
                label: presentation.label,
                verb: '端起'
            };
            bowl.interaction = {
                label: presentation.label,
                verb: '端起',
                priority: 40,
                radius: 64,
                marker: false
            };
            bowl.interactionEnabled = true;
            bowl.setDepth?.(26);
            this.scene.physics.add.existing(bowl, true);
            this.scene.interactables.add(bowl);
            this.bowlSprites.set(bowlId, bowl);
            this.ownedObjects.push(bowl);
        }

        for (const seatId of KITCHEN_SEATS) {
            const seat = this.tableData.seats[seatId];
            const hotspot = this.scene.add.rectangle(seat.x, seat.y, 24, 24, 0xcab889, 0.02);
            hotspot.objId = `kitchen_seat_${seatId}`;
            hotspot.sliceAction = 'seat';
            hotspot.sliceData = {
                id: hotspot.objId,
                kind: 'seat',
                seatId,
                label: SEAT_LABELS[seatId],
                verb: '放下'
            };
            hotspot.interaction = {
                label: SEAT_LABELS[seatId],
                verb: '放下',
                priority: 35,
                radius: 64,
                marker: false
            };
            hotspot.interactionEnabled = false;
            hotspot.setDepth?.(24);
            hotspot.setStrokeStyle?.(1, 0xd6c7a5, 0.35);
            this.scene.physics.add.existing(hotspot, true);
            this.scene.interactables.add(hotspot);
            this.seatHotspots.set(seatId, hotspot);
            this.ownedObjects.push(hotspot);
        }

        const offering = this.tableData.offering;
        this.offeringBowl = this.scene.add.image(offering.x, offering.y, 'bowl_offering');
        this.offeringBowl.objId = 'kitchen_offering_bowl';
        this.offeringBowl.sliceAction = 'offering';
        this.offeringBowl.sliceData = {
            id: 'kitchen_offering_bowl',
            kind: 'offering',
            label: '积灰冷饭碗',
            verb: '不能端起',
            fixed: true
        };
        this.offeringBowl.interaction = {
            label: '积灰冷饭碗',
            verb: '不能端起',
            priority: 0,
            radius: 0,
            marker: false
        };
        this.offeringBowl.interactionEnabled = false;
        this.offeringBowl.setDepth?.(26);
        this.scene.physics.add.existing(this.offeringBowl, true);
        this.ownedObjects.push(this.offeringBowl);
    }

    update() {
        if (this.destroyed || !this.state.heldBowl) return;
        this.syncHeldBowl();
    }

    syncHeldBowl() {
        const heldSprite = this.bowlSprites.get(this.state.heldBowl);
        const playerSprite = this.scene.player?.sprite;
        if (!heldSprite || !playerSprite) return;
        setPosition(
            heldSprite,
            playerSprite.x + HELD_BOWL_OFFSET.x,
            playerSprite.y + HELD_BOWL_OFFSET.y
        );
        setBodyEnabled(heldSprite, false);
        heldSprite.interactionEnabled = false;
    }

    syncSprites() {
        this.normalizePersistedState();
        const occupiedSeatByBowl = new Map();
        for (const seatId of KITCHEN_SEATS) {
            const bowlId = this.state.bowlPlacements[seatId];
            if (bowlId) occupiedSeatByBowl.set(bowlId, seatId);
        }

        for (const bowlId of KITCHEN_BOWLS) {
            const sprite = this.bowlSprites.get(bowlId);
            if (!sprite) continue;
            if (this.state.heldBowl === bowlId) {
                this.syncHeldBowl();
                continue;
            }

            const seatId = occupiedSeatByBowl.get(bowlId);
            const position = seatId
                ? this.tableData.seats[seatId]
                : this.tableData.bowlOrigins[bowlId];
            setPosition(sprite, position.x, position.y);
            setBodyEnabled(sprite, true);
            // While carrying a bowl, seat hotspots own the focus even when another bowl occupies that seat.
            // This makes replacement possible without the occupied bowl stealing the interaction target.
            sprite.interactionEnabled = this.state.tableSolved !== true && this.state.heldBowl === null;
            syncBody(sprite);
        }

        const canPlace = this.state.tableSolved !== true && this.state.heldBowl !== null;
        for (const hotspot of this.seatHotspots.values()) {
            hotspot.interactionEnabled = canPlace;
            hotspot.setAlpha?.(canPlace ? 0.16 : 0.02);
            setBodyEnabled(hotspot, canPlace);
            if (canPlace) syncBody(hotspot);
        }
        setBodyEnabled(this.offeringBowl, true);
        syncBody(this.offeringBowl);
    }

    pickBowl(bowlId) {
        if (this.replayIsActive()) return { status: 'replay_active' };
        if (this.state.tableSolved === true) return { status: 'locked' };
        if (!KITCHEN_BOWLS.includes(bowlId)) return { status: 'unknown_bowl' };
        if (this.state.heldBowl) {
            if (this.state.heldBowl === bowlId) return { status: 'holding', bowlId };
            return { status: 'hands_full', heldBowl: this.state.heldBowl };
        }

        this.advancePhase('table', 'investigation');
        for (const seatId of KITCHEN_SEATS) {
            if (this.state.bowlPlacements[seatId] === bowlId) this.state.bowlPlacements[seatId] = null;
        }
        this.state.heldBowl = bowlId;
        this.syncSprites();
        return { status: 'holding', bowlId };
    }

    placeHeldBowl(seatId) {
        if (this.replayIsActive()) return { status: 'replay_active' };
        if (this.state.tableSolved === true) return { status: 'locked' };
        if (!this.state.heldBowl) return { status: 'empty_hands' };
        if (!KITCHEN_SEATS.includes(seatId)) return { status: 'unknown_seat' };

        const bowlId = this.state.heldBowl;
        this.state.bowlPlacements = placeBowl(this.state.bowlPlacements, seatId, bowlId);
        this.state.heldBowl = null;
        this.syncSprites();
        const evaluation = evaluateSeating(this.state.bowlPlacements);
        if (evaluation.status === 'incomplete') return evaluation;

        if (evaluation.status === 'incorrect') {
            const seen = normalizeMealReplaySeen(this.state.mealReplaySeen);
            this.state.mealReplaySeen = seen;
            const replayId = selectContradiction(this.state.bowlPlacements, seen);
            const short = shouldUseShortReplay(seen, replayId);
            const replay = this.memoryReplayDirector.play(replayId, {
                short,
                onComplete: () => {
                    if (this.destroyed) return;
                    this.state.mealReplaySeen = markReplaySeen(this.state.mealReplaySeen, replayId);
                    this.scene.sliceMapManager?.applyRoomRevision?.(this.state);
                }
            });
            return replay.status === 'playing'
                ? withReplayObservation(evaluation, replayId, short)
                : evaluation;
        }

        const replay = this.memoryReplayDirector.play('correct_meal', { short: false });
        return replay.status === 'playing'
            ? withReplayObservation(evaluation, 'correct_meal', false)
            : evaluation;
    }

    handleAction(object) {
        if (this.replayIsActive()) return { status: 'replay_active' };
        if (!object) return { status: 'ignored' };
        if (object === this.offeringBowl || object.sliceAction === 'offering') {
            return { status: 'fixed_offering' };
        }
        if (object.sliceAction === 'bowl') return this.pickBowl(object.sliceData?.bowlId);
        if (object.sliceAction === 'seat') return this.placeHeldBowl(object.sliceData?.seatId);
        return { status: 'ignored' };
    }

    destroy() {
        if (this.destroyed) return;
        this.destroyed = true;
        this.memoryReplayDirector?.destroy?.();
        if (this.scene.memoryReplayDirector === this.memoryReplayDirector) {
            this.scene.memoryReplayDirector = null;
        }
        for (const object of this.ownedObjects) {
            this.scene.interactables?.remove?.(object);
            object.destroy?.();
        }
        this.ownedObjects = [];
    }
}
