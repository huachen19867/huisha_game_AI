    <!-- Error Handler -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.color = '#ff0000';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<h3>Game Error</h3><p>' + msg + '</p><p>' + url + ':' + line + ':' + col + '</p>';
            if (error && error.stack) {
                div.innerHTML += '<pre>' + error.stack + '</pre>';
            }
            document.body.appendChild(div);
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '50%';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.color = '#ffaa00';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<h3>Unhandled Promise Rejection</h3><p>' + event.reason + '</p>';
            document.body.appendChild(div);
        });
        // Resource loading error handler
        window.addEventListener('error', function(event) {
            if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK' || event.target.tagName === 'IMG') {
                const div = document.createElement('div');
                div.style.position = 'fixed';
                div.style.bottom = '0';
                div.style.left = '0';
                div.style.width = '100%';
                div.style.background = 'rgba(0,0,0,0.8)';
                div.style.color = '#ffff00';
                div.style.padding = '10px';
                div.style.zIndex = '99999';
                div.style.fontFamily = 'monospace';
                div.innerHTML = '<h3>Resource Load Error</h3><p>Failed to load: ' + (event.target.src || event.target.href) + '</p>';
                document.body.appendChild(div);
            }
        }, true);
    </script>

    <style>

        #dialog-box {

            flex-direction: column;
            pointer-events: auto;
            border-radius: 2px;
        }

        #dialog-box::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(92, 64, 51, 0.3);
            pointer-events: none;
        }

        #dialog-box.hidden {
            display: none;
        }

        #speaker-name {
            margin: 0 0 10px 0;
            font-weight: bold;
            color: #8b0000; /* Blood red for name */
            font-size: 22px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
            font-family: "SimSun", "Songti SC", serif;

        #dialog-text {
            margin: 0;
            line-height: 1.6;
            flex-grow: 1;
            font-family: "SimSun", "Songti SC", serif;
            font-weight: 500;
        }

        #next-arrow {
            align-self: flex-end;
            color: #8b0000;
            font-size: 20px;
            animation: blink 1s infinite;
        }

        /* 虚拟摇杆和按钮样式 */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            touch-action: none; /* 防止触摸时页面滚动 */
            display: none; /* 默认隐藏，JS检测到触摸设备再显示 */
            transition: opacity 0.5s ease;
            opacity: 1;
            pointer-events: auto; /* 关键：允许点击 */
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(139, 0, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #action-btn {
            position: absolute;
            bottom: 40px;
            right: 60px;
            width: 80px;
            height: 80px;
            background: rgba(139, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-family: "SimSun", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
            display: none;
            transition: opacity 0.5s ease;
            opacity: 1;
            pointer-events: auto; /* 关键：允许点击 */
        }

        .ui-faded {
            opacity: 0 !important; /* 改为完全透明，避免遮挡画面 */
        }

        /* 竖屏提示遮罩 - 移除强制显示 */
        #orientation-overlay {
            display: none !important;
        }

        /* 竖屏时的UI调整 */
        @media screen and (orientation: portrait) {
            #joystick-zone {
                bottom: 80px; /* 抬高摇杆位置，避免被底部手势条遮挡 */
                left: 30px;
            }
            #action-btn {
                bottom: 90px; /* 抬高按钮位置 */
                right: 30px;
            }
            #dialog-box {
                bottom: 10px;
                width: 95%; /* 增加宽度 */
                height: 180px; /* 增加高度以容纳更多文字 */
                font-size: 16px; /* 稍微减小字号 */
            }
        }

        /* 恐怖结局特效 */
        #ending-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .blood-text {
            font-family: "SimSun", serif;
            font-size: 60px;
            font-weight: bold;
            color: #ff0000;
            text-shadow:
                2px 2px 0 #330000,
                0 0 20px rgba(255, 0, 0, 0.8),
                0 0 40px rgba(139, 0, 0, 0.6);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.5s, transform 0.1s;
            position: relative;
            text-align: center;
            line-height: 1.5;
            z-index: 2;
        }

        .blood-text.visible {
            opacity: 1;
            transform: scale(1);
            animation: heartbeat 0.2s infinite alternate;
        }

        .blood-drip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 4px;
            height: 0;
            background: rgba(200, 0, 0, 0.9);
            border-radius: 0 0 4px 4px;
            animation: drip 3s infinite ease-in;
            box-shadow:
                -20px 0 0 rgba(200, 0, 0, 0.9),
                20px 0 0 rgba(200, 0, 0, 0.9),
                -40px -10px 0 rgba(180, 0, 0, 0.9),
                35px -5px 0 rgba(180, 0, 0, 0.9);
        }

        @keyframes heartbeat {
            from { transform: scale(1); text-shadow: 0 0 10px red; }
            to { transform: scale(1.1); text-shadow: 0 0 30px red, 0 0 10px white; }
        }

        @keyframes drip {
            0% { height: 0; opacity: 1; }
            80% { height: 100vh; opacity: 0.8; }
            100% { height: 100vh; opacity: 0; }
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        .shake-screen {
            animation: screen-shake 0.1s infinite;
        }

        .bg-flash {
            animation: bg-flash 0.1s infinite;
        }

        .horror-btn {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 24px;
            font-family: "SimSun", serif;
            color: #ff0000;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #8b0000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s, transform 0.2s;
            pointer-events: auto;
            z-index: 10001;
            display: none;
        }
        .horror-btn:hover {
            background: #330000;
            transform: scale(1.1);
            text-shadow: 0 0 10px red;
        }

        @keyframes bg-flash {
            0% { background-color: #000; }
            50% { background-color: #300; }
            100% { background-color: #000; }
        }


        #action-btn:active {
            background: rgba(255, 0, 0, 0.7);
        }

        #inventory {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            background: rgba(43, 29, 14, 0.8);
            padding: 10px;
            border: 2px solid #5c4033;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #inv-slots {
            display: flex;
            gap: 10px;
        }

        .inv-item {
            width: 50px;
            height: 50px;
            background: #e3dac9;
            border: 1px solid #8b4513;
            color: #2b1d0e;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .inv-item:hover {
            transform: scale(1.1);
            border-color: #8b0000;
            box-shadow: 0 0 5px #8b0000;
        }

        /* Document Reader */
        #doc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9); /* Darker overlay */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            pointer-events: auto;
        }

        #doc-paper {
            width: 80%;
            max-width: 600px;
            height: 80%;
            background: #f4e4bc; /* Old paper color */

            padding: 40px;

            font-size: 24px;
            cursor: pointer;
            color: #8b0000;
            font-weight: bold;
        }

            font-size: 24px;
            font-weight: bold;

            color: #550000;
            border-bottom: 2px solid #550000;
            padding-bottom: 10px;
        }

        #doc-content {
            font-size: 18px;
            white-space: pre-wrap;
        }

        #puzzle-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2600;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.86);
            pointer-events: auto;
        }
        #puzzle-panel {
            width: min(620px, 92vw);
            max-height: 86vh;
            overflow: auto;
            padding: 24px;
            color: #eadfc9;
            background: #19140f;
            border: 2px solid #775c42;
            box-sizing: border-box;
        }
        #puzzle-clues { display: grid; gap: 7px; margin: 12px 0; color: #cdbb9c; }
        #puzzle-board { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
        #puzzle-slots, #puzzle-tokens { display: grid; gap: 9px; align-content: start; }
        #puzzle-slots::before, #puzzle-tokens::before { color: #a88d6c; font-size: 13px; letter-spacing: 0.15em; }
        #puzzle-slots::before { content: '结论槽'; }
        #puzzle-tokens::before { content: '证据'; }
        #puzzle-slots button, #puzzle-tokens button, #puzzle-controls button {
            padding: 12px;
            color: #eadfc9;
            background: #35291f;
            border: 1px solid #775c42;
            cursor: pointer;
            text-align: left;
        }
        #puzzle-slots button.selected, #puzzle-tokens button.selected { border-color: #d9a06d; background: #533827; }
        #puzzle-slots button:focus-visible, #puzzle-tokens button:focus-visible, #puzzle-controls button:focus-visible { outline: 2px solid #f0c88e; outline-offset: 2px; }
        #puzzle-controls { display: flex; gap: 10px; justify-content: flex-end; }
        #puzzle-status { min-height: 24px; color: #d9a06d; }
        @media (max-width: 520px) {
            #puzzle-panel { padding: 16px; max-height: 92vh; }
            #puzzle-board { grid-template-columns: 1fr; }
            #puzzle-controls { position: sticky; bottom: 0; padding-top: 10px; background: #19140f; }
        }

        /* Tooltip for inventory */
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 5px 10px;
            border: 1px solid #8b0000;
            pointer-events: none;
            display: none;
            z-index: 3000;
            font-size: 14px;
        }

        /* 移动端适配：屏幕宽度小于 1024px 时显示虚拟按键 */
        @media (max-width: 1024px) {
            #joystick-zone, #action-btn {
                display: flex;
            }
            #objective-panel {
                top: 52px;
                font-size: 14px;
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Stamina Bar */
        #stamina-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            border-radius: 5px;
            overflow: hidden;
            display: none; /* Hidden by default, shown in game */
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.1s linear;
        }

        /* Sanity Bar */
        #sanity-container {
            position: absolute;
            top: 40px; /* Below stamina bar */
            left: 20px;
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }
        #sanity-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #00bfff);
            transition: width 0.1s linear;
        }
    </style>
</head>

function boxedRoom(width, height, openings) {
    const data = Array.from({ length: height }, (_, y) => (
        Array.from({ length: width }, (_, x) => (
            x === 0 || y === 0 || x === width - 1 || y === height - 1 ? 1 : 0
        ))
    ));

    for (const [x, y] of openings) {
        const inBounds = x >= 0 && x < width && y >= 0 && y < height;
        if (!inBounds) throw new Error(`Room opening is out of bounds: ${x},${y}`);
        const onBoundary = x === 0 || y === 0 || x === width - 1 || y === height - 1;
        if (!onBoundary) throw new Error(`Room opening is not on the boundary: ${x},${y}`);
        data[y][x] = 0;
    }

    return data;
}

function deepFreeze(value) {
    if (value === null || typeof value !== 'object' || Object.isFrozen(value)) return value;
    Object.freeze(value);
    for (const nestedValue of Object.values(value)) deepFreeze(nestedValue);
    return value;
}

const SLICE_DOOR_IDS = Object.freeze(
    Object.values(SliceMaps).flatMap(map => map.objects.doors.map(door => door.id))
);

const SLICE_DOOR_REGISTRY = Object.freeze(
    Object.fromEntries(SLICE_DOOR_IDS.map(doorId => [doorId, true]))
);

function isSliceDoorId(id) {
    return typeof id === 'string' && Object.hasOwn(SLICE_DOOR_REGISTRY, id);
}

function getSliceDoorAccess(doorId, state) {
    if (!isSliceDoorId(doorId)) {
        throw new Error(`Unknown slice door: ${doorId}`);
    }

    switch (doorId) {
        case 'main_kitchen_door':
        case 'kitchen_main_door':
            return true;
        case 'kitchen_side_door':
            return state?.tableSolved === true;
        case 'bedroom_side_door':
            return state?.planeChoice === 'take';
        case 'bedroom_main_door':
            return state?.planeChoice === 'take' || state?.planeChoice === 'leave';
    }

    throw new Error(`Unhandled slice door: ${doorId}`);
}

function canStartPuzzle(puzzle, collectedClues) {
    return (puzzle?.prerequisites || []).every(id => collectedClues.includes(id));
}

function isPuzzleAnswerCorrect(puzzle, answer) {
    if (Array.isArray(puzzle?.answer)) {
        return Array.isArray(answer) && answer.length === puzzle.answer.length && answer.every((id, index) => id === puzzle.answer[index]);
    }
    return (puzzle?.slots || []).every(slot => answer?.[slot.id] === puzzle.answer?.[slot.id]);
}

function createPuzzleProgress() {
    return { assignments: {}, attempts: 0 };
}

function assignPuzzleToken(progress, slotId, tokenId) {
    const assignments = { ...(progress?.assignments || {}) };
    Object.keys(assignments).forEach(key => {
        if (assignments[key] === tokenId) delete assignments[key];
    });
    if (tokenId) assignments[slotId] = tokenId;
    else delete assignments[slotId];
    return { assignments, attempts: progress?.attempts || 0 };
}

function evaluatePuzzle(puzzle, assignments = {}, collectedClues = []) {
    const missing = (puzzle?.prerequisites || []).filter(id => !collectedClues.includes(id));
    if (missing.length) return { status: 'blocked', missing };

    const emptySlots = (puzzle?.slots || [])
        .map(slot => slot.id)
        .filter(slotId => !assignments[slotId]);
    if (emptySlots.length) return { status: 'incomplete', emptySlots };

    const wrongSlot = (puzzle?.slots || []).find(slot => assignments[slot.id] !== puzzle.answer?.[slot.id]);
    if (wrongSlot) {
        return {
            status: 'incorrect',
            conflictKey: puzzle.conflicts?.[wrongSlot.id] || 'evidence_conflict',
            conflictSlots: [wrongSlot.id]
        };
    }
    return { status: 'correct' };
}

    static createPlayerSheet() {
        const frameWidth = 32;
        const frameHeight = 48;
        const playerTexture = this.scene.make.graphics({ x: 0, y: 0, add: false });

        const drawPlayer = (x, y, dir, step) => {
            const hairColor = 0x1a1a1a;
            const skinColor = 0xe0c0a0;
            const clothesColor = 0x2c3e50;
            const pantsColor = 0x111111;

            // Body
            playerTexture.fillStyle(clothesColor);
            playerTexture.fillRect(x + 8, y + 16, 16, 18);

            // Legs
            playerTexture.fillStyle(pantsColor);
            let leftLegY = 0, rightLegY = 0;
            if (step === 1) { leftLegY = -2; rightLegY = 2; }
            if (step === 2) { leftLegY = 2; rightLegY = -2; }

            if (dir === 0 || dir === 3) {
                 playerTexture.fillRect(x + 10, y + 34 + leftLegY, 5, 12);
                 playerTexture.fillRect(x + 17, y + 34 + rightLegY, 5, 12);
            } else if (dir === 1) {
                if (step === 0) {
                    playerTexture.fillRect(x + 12, y + 34, 8, 12);
                } else if (step === 1) {
                    playerTexture.fillRect(x + 8, y + 32, 6, 12);
                    playerTexture.fillRect(x + 16, y + 34, 6, 10);
                } else {
                    playerTexture.fillRect(x + 16, y + 32, 6, 12);
                    playerTexture.fillRect(x + 8, y + 34, 6, 10);
                }
            } else if (dir === 2) {
                if (step === 0) {
                    playerTexture.fillRect(x + 12, y + 34, 8, 12);
                } else if (step === 1) {
                    playerTexture.fillRect(x + 16, y + 32, 6, 12);
                    playerTexture.fillRect(x + 8, y + 34, 6, 10);
                } else {
                    playerTexture.fillRect(x + 8, y + 32, 6, 12);
                    playerTexture.fillRect(x + 16, y + 34, 6, 10);
                }
            }

            // Head
            playerTexture.fillStyle(skinColor);
            playerTexture.fillRect(x + 9, y + 4, 14, 12);

            // Hair
            playerTexture.fillStyle(hairColor);
            if (dir === 3) {
                playerTexture.fillRect(x + 8, y + 2, 16, 14);
            } else {
                playerTexture.fillRect(x + 8, y + 2, 16, 6);
                if (dir === 1) playerTexture.fillRect(x + 20, y + 4, 4, 10);
                if (dir === 2) playerTexture.fillRect(x + 8, y + 4, 4, 10);
                if (dir === 0) {
                    playerTexture.fillRect(x + 8, y + 2, 4, 8);
                    playerTexture.fillRect(x + 20, y + 2, 4, 8);
                }
            }

            // Face
            if (dir !== 3) {
                 playerTexture.fillStyle(0x000000);
                 if (dir === 0) {
                     playerTexture.fillRect(x + 11, y + 10, 2, 2);
                     playerTexture.fillRect(x + 19, y + 10, 2, 2);
                 } else if (dir === 1) {
                     playerTexture.fillRect(x + 10, y + 10, 2, 2);
                 } else if (dir === 2) {
                     playerTexture.fillRect(x + 20, y + 10, 2, 2);
                 }
            }
        };

        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 3; col++) {
                drawPlayer(col * frameWidth, row * frameHeight, row, col);
            }
        }
        playerTexture.generateTexture('player_sheet', frameWidth * 3, frameHeight * 4);
    }

    static createFlashlight() {
        const lightTexture = this.scene.textures.createCanvas('flashlight_cone', 200, 300);
        const ctx = lightTexture.getContext();

        const grd = ctx.createRadialGradient(100, 0, 0, 100, 0, 300);
        grd.addColorStop(0, 'rgba(255, 255, 220, 0.6)');
        grd.addColorStop(0.3, 'rgba(255, 255, 255, 0.2)');
        grd.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grd;

        ctx.beginPath();
        ctx.moveTo(100, 0);
        ctx.lineTo(0, 300);
        ctx.quadraticCurveTo(100, 320, 200, 300);
        ctx.lineTo(100, 0);
        ctx.fill();

        const coreGrd = ctx.createRadialGradient(100, 0, 0, 100, 0, 200);
        coreGrd.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
        coreGrd.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = coreGrd;
        ctx.beginPath();
        ctx.moveTo(100, 0);
        ctx.lineTo(60, 200);
        ctx.quadraticCurveTo(100, 210, 140, 200);
        ctx.lineTo(100, 0);
        ctx.fill();

        lightTexture.refresh();
    }

function createDefaultStoryFlags() {
    return {
        clues: { control: 0, illness: 0, death: 0 },
        collectedClues: [],
        memories: { school: false, hospital: false, crash: false },
        puzzles: { school: false, hospital: false },
        photoSetCollected: false,
        familyPhotoCornerFound: false,
        familyPhotoAssembled: false,
        chasePhase: 'idle',
        crashEvidence: { car: false, guardrail: false },
        coffinOpened: false,
        endingChoice: null,
        narrativeBeatsSeen: [],
        puzzleProgress: {},
        caseConclusions: [],
        ritualSolved: false,
        hauntingSeen: [],
        postMemoryDialogShown: {
            school: false,
            hospital: false
        }
    };
}

function createDefaultGameState() {
    return {
        storyStep: 0,
        hasMatches: false,
        hasRice: false,
        hasIncense: false,
        hasSpiritMoney: false,
        hasRedKey: false,
        candlesLit: 0,
        inventory: [],
        viewedPhotos: [],
        clues: [],
        corridorSolved: false,
        viewedIntro: false,
        viewedEntrance: false,
        doorSlammed: false,
        isHidden: false,
        isChasing: false,
        cabinetMoved: false,
        sanity: 100,
        slice: null,
        storyFlags: createDefaultStoryFlags()
    };
}

function ensureStoryFlags(gameState) {
    if (!gameState.storyFlags) {
        gameState.storyFlags = createDefaultStoryFlags();
    }

    const flags = gameState.storyFlags;
    if (!flags.clues) flags.clues = { control: 0, illness: 0, death: 0 };
    flags.clues.control = flags.clues.control || 0;
    flags.clues.illness = flags.clues.illness || 0;
    flags.clues.death = flags.clues.death || 0;

    if (!flags.collectedClues) flags.collectedClues = [];
    if (!flags.memories) flags.memories = { school: false, hospital: false, crash: false };
    flags.memories.school = !!flags.memories.school;
    flags.memories.hospital = !!flags.memories.hospital;
    flags.memories.crash = !!flags.memories.crash;

    if (!flags.puzzles) flags.puzzles = { school: false, hospital: false };
    flags.puzzles.school = !!flags.puzzles.school;
    flags.puzzles.hospital = !!flags.puzzles.hospital;
    flags.photoSetCollected = !!flags.photoSetCollected;
    flags.familyPhotoCornerFound = !!flags.familyPhotoCornerFound;
    flags.familyPhotoAssembled = !!flags.familyPhotoAssembled;
    flags.coffinOpened = !!flags.coffinOpened;
    if (!['idle', 'active', 'escaped'].includes(flags.chasePhase)) flags.chasePhase = 'idle';
    if (!flags.crashEvidence) flags.crashEvidence = { car: false, guardrail: false };
    flags.crashEvidence.car = !!flags.crashEvidence.car;
    flags.crashEvidence.guardrail = !!flags.crashEvidence.guardrail;

    if (flags.endingChoice === undefined) flags.endingChoice = null;
    if (!Array.isArray(flags.narrativeBeatsSeen)) flags.narrativeBeatsSeen = [];
    if (!flags.puzzleProgress || typeof flags.puzzleProgress !== 'object' || Array.isArray(flags.puzzleProgress)) flags.puzzleProgress = {};
    if (!Array.isArray(flags.caseConclusions)) flags.caseConclusions = [];
    flags.ritualSolved = !!flags.ritualSolved;
    if (!Array.isArray(flags.hauntingSeen)) flags.hauntingSeen = [];
    if (!flags.postMemoryDialogShown) {
        flags.postMemoryDialogShown = { school: false, hospital: false };
    }
    flags.postMemoryDialogShown.school = !!flags.postMemoryDialogShown.school;
    flags.postMemoryDialogShown.hospital = !!flags.postMemoryDialogShown.hospital;

    if (typeof gameState.sanity !== 'number' || Number.isNaN(gameState.sanity)) {
        gameState.sanity = 100;
    }

    return flags;
}

function normalizeGameState(gameState) {
    if (!gameState.inventory) gameState.inventory = [];
    if (!gameState.viewedPhotos) gameState.viewedPhotos = [];
    if (!gameState.clues) gameState.clues = [];
    if (gameState.candlesLit === undefined) gameState.candlesLit = 0;
    ensureStoryFlags(gameState);
    if (gameState.slice?.enabled === true) ensureSliceState(gameState);
    return gameState;
}

function collectClue(gameState, clueId, clueType) {
    const flags = ensureStoryFlags(gameState);
    if (!clueId || !clueType || flags.collectedClues.includes(clueId)) return false;
    flags.collectedClues.push(clueId);

const KITCHEN_SEATS = Object.freeze(['nail', 'stove', 'side']);
const KITCHEN_BOWLS = Object.freeze(['wine', 'medicine', 'child']);
const CORRECT_SEATING = Object.freeze({
    nail: 'wine',
    stove: 'medicine',
    side: 'child'
});

const CONTRADICTIONS = [
    ['nail', 'wine', 'father_lock'],
    ['stove', 'medicine', 'mother_break'],
    ['side', 'child', 'child_shard']
];

function normalizeBowlPlacements(placements) {
    if (placements === null || typeof placements !== 'object' || Array.isArray(placements)) {
        throw new Error('Placements must be an object');
    }

    const seenBowls = new Set();
    return Object.fromEntries(KITCHEN_SEATS.map(seat => {
        const bowl = placements[seat];
        if (!KITCHEN_BOWLS.includes(bowl) || seenBowls.has(bowl)) {
            return [seat, null];
        }
        seenBowls.add(bowl);
        return [seat, bowl];
    }));
}

function placeBowl(placements, seat, bowl) {
    const nextPlacements = normalizeBowlPlacements(placements);
    if (!KITCHEN_SEATS.includes(seat)) {
        throw new Error(`Unknown seat: ${seat}`);
    }
    if (!KITCHEN_BOWLS.includes(bowl)) {
        throw new Error(`Unknown bowl: ${bowl}`);
    }

    for (const currentSeat of KITCHEN_SEATS) {
        if (nextPlacements[currentSeat] === bowl) nextPlacements[currentSeat] = null;
    }
    nextPlacements[seat] = bowl;
    return nextPlacements;
}

function evaluateSeating(placements) {
    const normalizedPlacements = normalizeBowlPlacements(placements);
    if (KITCHEN_SEATS.some(seat => normalizedPlacements[seat] === null)) {
        return { status: 'incomplete', contradictions: [] };
    }

    const contradictions = CONTRADICTIONS
        .filter(([seat, expectedBowl]) => normalizedPlacements[seat] !== expectedBowl)
        .map(([, , contradictionId]) => contradictionId);

    if (contradictions.length === 0) {
        return { status: 'correct', contradictions: [] };
    }
    return { status: 'incorrect', contradictions };
}

function selectContradiction(placements, seen = []) {
    if (!Array.isArray(seen)) {
        throw new Error('Seen contradictions must be an array');
    }
    const { contradictions } = evaluateSeating(placements);
    if (contradictions.length === 0) return null;
    return contradictions.find(contradictionId => !seen.includes(contradictionId))
        ?? contradictions[0];
}

    const flags = ensureStoryFlags(gameState);
    if (flags.coffinOpened) return 'acceptance';
    if (flags.caseConclusions.includes('empty_seat') || flags.caseConclusions.includes('rewritten_night')) return 'recognition';
    if (flags.caseConclusions.includes('treatment_blocked') || flags.caseConclusions.includes('sealed_house')) return 'anger';
    if (flags.narrativeBeatsSeen.includes('escape_echo') || flags.narrativeBeatsSeen.includes('memorial_echo') || flags.photoSetCollected) return 'recognition';
    if (flags.narrativeBeatsSeen.includes('mother_echo') || flags.clues.illness >= 2) return 'anger';

}

function resolveSpawnCoordinate(value, fallback) {
    return value === undefined || value === null ? fallback : value;
}

function updateBoundedResource(current, ratePerSecond, deltaMs, min = 0, max = 100) {
    const next = current + ratePerSecond * (deltaMs / 1000);
    return Math.max(min, Math.min(max, next));
}

function updateStaminaState({ stamina, maxStamina, exhausted, wantsRun, isMoving, deltaMs }) {
    const drainPerSecond = 10;
    const rechargePerSecond = 5;
    let nextStamina = stamina;
    let nextExhausted = exhausted;
    let isRunning = wantsRun && isMoving && !nextExhausted;

    if (isRunning) {
        nextStamina = updateBoundedResource(nextStamina, -drainPerSecond, deltaMs, 0, maxStamina);
        if (nextStamina <= 0) {
            nextExhausted = true;
            isRunning = false;
        }
    } else {
        nextStamina = updateBoundedResource(nextStamina, rechargePerSecond, deltaMs, 0, maxStamina);
        if (nextExhausted && nextStamina > 30) nextExhausted = false;
    }

    return { stamina: nextStamina, exhausted: nextExhausted, isRunning };
}

function inferVerb(data, textureKey) {
    if (data.interaction?.verb) return data.interaction.verb;
    if (data.itemGrant || data.id === 'incense' || data.id === 'spirit_money') return '拾取';
    if (data.documentText || data.documentTitle || data.clueId) return '阅读';
    if (textureKey === 'photo_frame') return '查看';
    if (data.endingChoice) return '选择';
    if (data.memoryTrigger || data.puzzleId) return '触碰';
    if (textureKey === 'cabinet' || data.id?.includes('cabinet')) return '躲藏';
    if (textureKey === 'bed') return '躲藏';
    return '调查';
}

function normalizeInteractionMeta(data = {}, fallback = {}) {
    const textureKey = fallback.textureKey || data.texture || '';
    const label = data.interaction?.label
        || data.interactLabel
        || data.documentTitle
        || data.label
        || ID_LABELS[data.id]
        || TEXTURE_LABELS[textureKey]
        || (data.id ? data.id.replaceAll('_', ' ') : '可疑物件');
    const isStory = Boolean(data.clueId || data.itemGrant || data.puzzleId || data.memoryTrigger || data.endingChoice || data.documentText);
    const isFurniture = ['altar', 'bed', 'cabinet', 'car', 'coffin', 'desk', 'safe', 'stove', 'well'].includes(textureKey)
        || ['parents_cabinet', 'kitchen_cabinet', 'my_cabinet'].includes(data.id);
    return {
        label,
        verb: inferVerb(data, textureKey),
        priority: data.interaction?.priority ?? (isStory ? 30 : data.dialog ? 20 : 10),
        radius: data.interaction?.radius ?? (textureKey === 'car' ? 120 : 80),
        marker: data.interaction?.marker ?? isStory,
        blocksMovement: data.interaction?.blocksMovement ?? isFurniture
    };
}

function scoreInteractionCandidate({ distance, priority, facingDot }) {
    return priority * 1000 + facingDot * 200 - distance;
}

const INTERACTION_FOCUS_BAND = 28;

function selectInteractionCandidate(candidates, focusBand = INTERACTION_FOCUS_BAND) {
    if (!candidates.length) return null;
    const nearest = Math.min(...candidates.map(candidate => candidate.distance));
    return candidates
        .filter(candidate => candidate.distance <= nearest + focusBand)
        .sort((a, b) => {
            const scoreA = a.priority * 10 + a.facingDot * 40 - a.distance;
            const scoreB = b.priority * 10 + b.facingDot * 40 - b.distance;
            return scoreB - scoreA;
        })[0] || null;
}

function formatInteractionPrompt(meta) {
    return `${meta.verb}：${meta.label}  [空格/E]`;
}

class DomListenerRegistry {
    constructor() {
        this.entries = [];
    }

    add(target, type, handler, options) {
        target.addEventListener(type, handler, options);
        this.entries.push({ target, type, handler, options });

    clear() {

            target.removeEventListener(type, handler, options);

    }

}

const GRID_SIZE = 32;

function worldToGrid(x, y) {
    return { x: Math.floor(x / GRID_SIZE), y: Math.floor(y / GRID_SIZE) };
}

function gridToWorld(cell) {
    return { x: cell.x * GRID_SIZE + GRID_SIZE / 2, y: cell.y * GRID_SIZE + GRID_SIZE / 2 };
}

function createNavigationGrid(mapData, blockedRects = [], forceOpen = []) {
    const grid = mapData.map(row => row.map(tile => tile === 0));
    for (const rect of blockedRects) {
        const left = Math.floor(rect.x / GRID_SIZE);
        const right = Math.floor((rect.x + Math.max(1, rect.width) - 1) / GRID_SIZE);
        const top = Math.floor(rect.y / GRID_SIZE);
        const bottom = Math.floor((rect.y + Math.max(1, rect.height) - 1) / GRID_SIZE);
        for (let y = top; y <= bottom; y++) {
            for (let x = left; x <= right; x++) {
                if (grid[y]?.[x] !== undefined) grid[y][x] = false;
            }
        }
    }
    for (const cell of forceOpen) {
        if (grid[cell.y]?.[cell.x] !== undefined) grid[cell.y][cell.x] = true;
    }
    return grid;
}

function findGridPath(grid, start, goal) {
    if (!grid[start.y]?.[start.x] || !grid[goal.y]?.[goal.x]) return [];
    const queue = [start];
    let head = 0;
    const startKey = `${start.x},${start.y}`;
    const cameFrom = new Map([[startKey, null]]);
    const directions = [[1, 0], [0, 1], [-1, 0], [0, -1]];
    while (head < queue.length) {
        const current = queue[head++];
        if (current.x === goal.x && current.y === goal.y) {
            const path = [];
            let key = `${goal.x},${goal.y}`;
            while (key) {
                const [x, y] = key.split(',').map(Number);
                path.push({ x, y });
                key = cameFrom.get(key);
            }
            return path.reverse();
        }
        for (const [dx, dy] of directions) {
            const next = { x: current.x + dx, y: current.y + dy };
            const key = `${next.x},${next.y}`;
            if (grid[next.y]?.[next.x] && !cameFrom.has(key)) {
                cameFrom.set(key, `${current.x},${current.y}`);
                queue.push(next);
            }
        }
    }
    return [];
}

function findSafeDoorSpawn(grid, door, playerCell, minDistance = 5) {
    const start = {
        x: door.x + Math.floor((door.w || 1) / 2),
        y: door.y + Math.floor((door.h || 1) / 2)
    };
    const queue = [start];
    let head = 0;
    const seen = new Set([`${start.x},${start.y}`]);
    while (head < queue.length) {
        const current = queue[head++];
        const distance = Math.abs(current.x - playerCell.x) + Math.abs(current.y - playerCell.y);
        if (grid[current.y]?.[current.x] && distance >= minDistance) return current;
        for (const [dx, dy] of [[1,0], [0,1], [-1,0], [0,-1]]) {
            const next = { x: current.x + dx, y: current.y + dy };
            const key = `${next.x},${next.y}`;
            if (!seen.has(key) && grid[next.y]?.[next.x]) {
                seen.add(key);
                queue.push(next);
            }
        }
    }
    return null;
}

const HIDE_ESCAPE_MS = 6000;
const DOOR_BANG_MS = 2000;
const WARNING_MS = 3000;
const ARRIVAL_DELAY_MS = 4000;
const MATERIALIZE_MS = 600;
const REPATH_MS = 350;
const SPAWN_RETRY_MS = 500;
const SLICE_CHASE_DURATION_MS = 10000;

function getArrivalStage(elapsedMs) {
    if (elapsedMs >= ARRIVAL_DELAY_MS) return 'arriving';
    if (elapsedMs >= WARNING_MS) return 'warning';
    if (elapsedMs >= DOOR_BANG_MS) return 'door_bang';
    return 'approaching';
}

function getSliceArrivalStage(elapsedMs) {
    return getArrivalStage(elapsedMs);
}

function hasNavigationData(mapDef) {
    return Array.isArray(mapDef?.data) &&
        mapDef.data.length > 0 &&
        mapDef.data.every(row => Array.isArray(row) && row.length > 0) &&
        new Set(mapDef.data.map(row => row.length)).size === 1;
}

class ChaseManager {
    constructor(scene) {
        this.scene = scene;
        this.chaser = null;
        this.hideTimer = null;
        this.arrivalTimers = [];
        this.spawnRetryTimer = null;
        this.arrivalWarning = null;
        this.doorGlow = null;
        this.caught = false;
        this.materializing = false;
        this.path = [];
        this.nextRepathAt = 0;
        this.lastTargetKey = '';
        this.sliceConfig = null;
        this.pendingSliceDoor = null;
        this.sliceArrivalTimers = [];
        this.sliceSpawnRetryTimer = null;
        this.sliceSetupTimer = null;
        this.sliceEndTimer = null;
        this.sliceDoorGlow = null;
        this.sliceFootsteps = null;
    }

    getArrivalDoor() {
        const doors = Maps[this.scene.currentMapId]?.objects?.doors || [];
        return doors.find(door => door.targetMap === this.scene.previousMapId) || doors[0] || null;
    }

    getDoorWorldPosition(door) {
        return {
            x: door.x * 32 + (door.w || 1) * 16,
            y: door.y * 32 + (door.h || 1) * 16
        };
    }

    start() {
        const flags = ensureStoryFlags(this.scene.gameState);
        flags.chasePhase = 'active';
        this.scene.gameState.isChasing = true;
        if (this.chaser?.active || this.arrivalTimers.length || this.spawnRetryTimer) return;

        const door = this.getArrivalDoor();
        if (!door) return;
        this.pendingDoor = door;
        this.arrivalTimers.push(
            this.scene.time.delayedCall(DOOR_BANG_MS, () => this.telegraphDoor(false)),
            this.scene.time.delayedCall(WARNING_MS, () => this.telegraphDoor(true)),
            this.scene.time.delayedCall(ARRIVAL_DELAY_MS, () => this.attemptSpawn())
        );
        this.scene.refreshObjective();
    }

    startSlice({ mapDef, arrivalDoorId, durationMs = SLICE_CHASE_DURATION_MS, onCaught } = {}) {
        const door = mapDef?.objects?.doors?.find(candidate => candidate.id === arrivalDoorId);
        if (!hasNavigationData(mapDef) || !door || this.sliceConfig || this.chaser?.active) return false;

        this.sliceConfig = {
            mapDef,
            arrivalDoorId,
            durationMs: Number.isFinite(durationMs) && durationMs > 0 ? durationMs : SLICE_CHASE_DURATION_MS,
            onCaught: typeof onCaught === 'function' ? onCaught : null
        };
        this.pendingSliceDoor = door;
        this.scene.gameState.sliceChasing = true;
        this.sliceArrivalTimers.push(
            this.scene.time.delayedCall(DOOR_BANG_MS, () => this.telegraphSliceDoor('bang')),
            this.scene.time.delayedCall(WARNING_MS, () => this.telegraphSliceDoor('footsteps')),
            this.scene.time.delayedCall(ARRIVAL_DELAY_MS, () => this.attemptSliceSpawn())
        );
        this.sliceSetupTimer = this.scene.time.delayedCall(
            ARRIVAL_DELAY_MS + this.sliceConfig.durationMs,
            () => this.endSliceChase('setup_timeout')
        );
        return true;
    }

    createSliceGrid(mapDef, forceOpen = []) {
        if (!hasNavigationData(mapDef)) return [];
        return createNavigationGrid(mapDef.data, this.scene.navigationBlockedRects || [], forceOpen);
    }

    isSliceChasing() {
        return this.sliceConfig !== null;
    }

    telegraphSliceDoor(stage) {
        if (!this.pendingSliceDoor || !this.sliceConfig) return;
        const point = this.getDoorWorldPosition(this.pendingSliceDoor);
        this.scene.soundManager?.playSpatialNoise(stage === 'bang' ? 0.24 : 0.16, point.x, point.y);
        if (!this.sliceDoorGlow) {
            this.sliceDoorGlow = this.scene.add.circle(point.x, point.y, 24, 0x8b0000, 0.22).setDepth(340);
            this.scene.tweens.add({ targets: this.sliceDoorGlow, alpha: 0.56, duration: 360, yoyo: true, repeat: -1 });
        }
        if (stage === 'footsteps' && !this.sliceFootsteps) {
            this.sliceFootsteps = this.scene.add.rectangle(point.x, point.y + 30, 18, 4, 0x6b4b3b, 0.34).setDepth(341);
            this.scene.tweens.add({ targets: this.sliceFootsteps, alpha: 0.08, scaleX: 2.2, duration: 420, yoyo: true, repeat: -1 });
        }
    }

    attemptSliceSpawn() {
        this.sliceArrivalTimers = [];
        if (!this.pendingSliceDoor || !this.sliceConfig || this.chaser?.active) return;
        const playerSprite = this.scene.player?.sprite;
        if (!playerSprite) return;
        const playerCell = worldToGrid(playerSprite.x, playerSprite.y);
        const grid = this.createSliceGrid(this.sliceConfig.mapDef, [playerCell]);
        const spawnCell = findSafeDoorSpawn(grid, this.pendingSliceDoor, playerCell, 5);
        if (!spawnCell) {
            this.sliceSpawnRetryTimer = this.scene.time.delayedCall(SPAWN_RETRY_MS, () => {
                this.sliceSpawnRetryTimer = null;
                this.attemptSliceSpawn();
            });
            return;
        }
        this.spawnSliceAt(gridToWorld(spawnCell));
    }

    spawnSliceAt(spawn) {
        if (!this.sliceConfig) return false;
        this.cancelSliceSetupDeadline();
        this.clearSliceArrivalVisuals();
        this.chaser = this.scene.physics.add.sprite(spawn.x, spawn.y, 'npc_paper').setTint(0xff0000).setAlpha(0);
        if (!this.scene.isMobile) this.chaser.setPipeline('Light2D');
        this.scene.chaser = this.chaser;
        this.materializing = true;
        this.chaser.body.enable = false;
        this.scene.physics.add.collider(this.chaser, this.scene.walls);
        this.scene.physics.add.collider(this.chaser, this.scene.furniture);
        if (this.scene.trees) this.scene.physics.add.collider(this.chaser, this.scene.trees);
        this.scene.physics.add.overlap(this.scene.player.sprite, this.chaser, () => this.handleCaught());
        this.scene.tweens.add({
            targets: this.chaser,
            alpha: 0.78,
            duration: MATERIALIZE_MS,
            onComplete: () => {
                if (!this.chaser?.active || !this.sliceConfig) return;
                this.chaser.body.enable = true;
                this.materializing = false;
                this.nextRepathAt = 0;
            }
        });
        if (!this.sliceEndTimer) {
            this.sliceEndTimer = this.scene.time.delayedCall(this.sliceConfig.durationMs, () => this.endSliceChase('timeout'));
        }
        return true;
    }

    telegraphDoor(showWarning) {
        if (!this.pendingDoor) return;
        const point = this.getDoorWorldPosition(this.pendingDoor);
        this.scene.soundManager?.playSpatialNoise(0.35, point.x, point.y);
        this.scene.cameras.main.shake(showWarning ? 140 : 100, showWarning ? 0.006 : 0.004);
        if (!this.doorGlow) {
            this.doorGlow = this.scene.add.circle(point.x, point.y, 26, 0x8b0000, 0.25).setDepth(340);
            this.scene.tweens.add({ targets: this.doorGlow, alpha: 0.65, duration: 450, yoyo: true, repeat: -1 });
        }
        if (showWarning && !this.arrivalWarning) {
            this.arrivalWarning = this.scene.add.text(this.scene.scale.width / 2, 78, '明儿，别跑，外面下雨', {
                fontSize: '18px', color: '#ffb0a0', backgroundColor: '#300000', padding: { x: 10, y: 6 }
            }).setOrigin(0.5).setScrollFactor(0).setDepth(1000);
        }
    }

    createGrid(forceOpen = []) {
        const map = Maps[this.scene.currentMapId];
        return createNavigationGrid(map.data, this.scene.navigationBlockedRects || [], forceOpen);
    }

    attemptSpawn() {
        this.arrivalTimers = [];
        if (!this.pendingDoor || this.chaser?.active) return;
        const playerCell = worldToGrid(this.scene.player.sprite.x, this.scene.player.sprite.y);
        const grid = this.createGrid([playerCell]);
        const spawnCell = findSafeDoorSpawn(grid, this.pendingDoor, playerCell, 5);
        if (!spawnCell) {
            this.spawnRetryTimer = this.scene.time.delayedCall(SPAWN_RETRY_MS, () => {
                this.spawnRetryTimer = null;
                this.attemptSpawn();
            });
            return;
        }
        this.spawnAt(gridToWorld(spawnCell));
    }

    spawnAt(spawn) {
        this.clearArrivalVisuals();
        this.materializing = true;
        this.chaser = this.scene.physics.add.sprite(spawn.x, spawn.y, 'npc_paper').setTint(0xff0000).setAlpha(0);
        if (!this.scene.isMobile) this.chaser.setPipeline('Light2D');
        this.scene.chaser = this.chaser;
        this.chaser.body.enable = false;
        this.scene.physics.add.collider(this.chaser, this.scene.walls);
        this.scene.physics.add.collider(this.chaser, this.scene.furniture);
        if (this.scene.trees) this.scene.physics.add.collider(this.chaser, this.scene.trees);
        this.scene.physics.add.overlap(this.scene.player.sprite, this.chaser, () => this.handleCaught());
        this.scene.cameras.main.shake(180, 0.008);
        this.scene.tweens.add({
            targets: this.chaser,
            alpha: 0.82,
            duration: MATERIALIZE_MS,
            onComplete: () => {
                if (!this.chaser?.active) return;
                this.chaser.body.enable = true;
                this.materializing = false;
                this.nextRepathAt = 0;
                if (this.scene.gameState.isHidden) this.startHideEscape();
            }
        });
    }

    update() {
        if (!this.chaser?.active || this.materializing || this.caught) return;
        if (this.scene.gameState.isHidden) {
            this.chaser.setVelocity(0);
            return;
        }

        const now = this.scene.time.now;
        const chaserCell = worldToGrid(this.chaser.x, this.chaser.y);
        const playerCell = worldToGrid(this.scene.player.sprite.x, this.scene.player.sprite.y);
        const targetKey = `${playerCell.x},${playerCell.y}`;
        if (now >= this.nextRepathAt || targetKey !== this.lastTargetKey || this.path.length < 2) {
            const grid = this.sliceConfig
                ? this.createSliceGrid(this.sliceConfig.mapDef, [chaserCell, playerCell])
                : this.createGrid([chaserCell, playerCell]);
            this.path = findGridPath(grid, chaserCell, playerCell);
            this.nextRepathAt = now + REPATH_MS;
            this.lastTargetKey = targetKey;
        }

        const nextCell = this.path[1];
        if (!nextCell) {
            this.chaser.setVelocity(0);
            return;
        }
        const target = gridToWorld(nextCell);
        if (Phaser.Math.Distance.Between(this.chaser.x, this.chaser.y, target.x, target.y) < 8) {
            this.path.shift();
        }
        this.scene.physics.moveTo(this.chaser, target.x, target.y, 100);

        const distance = Phaser.Math.Distance.Between(this.chaser.x, this.chaser.y, this.scene.player.sprite.x, this.scene.player.sprite.y);
        const intensity = Math.max(0, 1 - distance / 500);
        this.scene.dangerOverlay?.setAlpha(intensity * 0.55);
        if (intensity > 0 && now >= (this.nextHeartbeatAt || 0)) {
            this.scene.soundManager?.playHeartbeat(intensity);
            this.nextHeartbeatAt = now + 350 + distance;
        }
    }

    startHideEscape() {
        if (!this.chaser?.active || this.hideTimer) return;
        this.hideTimer = this.scene.time.delayedCall(HIDE_ESCAPE_MS, () => {
            this.hideTimer = null;
            if (this.scene.gameState.isHidden) this.escape('hide');
        });
    }

    cancelHideEscape() { this.hideTimer?.remove(); this.hideTimer = null; }

    escape(reason) {
        const flags = ensureStoryFlags(this.scene.gameState);
        if (flags.chasePhase !== 'active') return;
        this.cancelHideEscape();
        this.cancelArrival();
        flags.chasePhase = 'escaped';
        this.scene.gameState.isChasing = false;
        this.chaser?.destroy();
        this.chaser = null;
        this.scene.chaser = null;
        this.scene.dangerOverlay?.setAlpha(0);
        const text = reason === 'photo'
            ? '全家福里的三个人同时看向黑影。它停下了，像终于认出了你。'
            : '脚步声在柜门外停了六秒，随后慢慢远去。';
        window.showDialog('主角', text);
        this.scene.refreshObjective();
    }

    handleCaught() {
        if (this.sliceConfig) {
            if (this.caught || this.materializing) return;
            this.caught = true;
            const onCaught = this.sliceConfig.onCaught;
            this.endSliceChase('caught');
            onCaught?.();
            return;
        }
        if (this.caught || this.materializing || this.scene.gameState.isHidden) return;
        this.caught = true;
        this.scene.physics.pause();
        window.showDialog('暴怒的黑影', '抓到你了……但这次记忆没有把你送回最初。', () => {
            this.scene.physics.resume();
            this.scene.gameState.isHidden = false;
            const map = Maps[this.scene.currentMapId];
            this.scene.scene.restart({
                mapId: this.scene.currentMapId,
                x: map.objects.playerStart.x,
                y: map.objects.playerStart.y,
                previousMapId: this.scene.previousMapId
            });
        });
    }

    clearArrivalVisuals() {
        this.doorGlow?.destroy();
        this.arrivalWarning?.destroy();
        this.doorGlow = null;
        this.arrivalWarning = null;
    }

    cancelArrival() {
        this.arrivalTimers.forEach(timer => timer?.remove());
        this.arrivalTimers = [];
        this.spawnRetryTimer?.remove();
        this.spawnRetryTimer = null;
        this.clearArrivalVisuals();
        this.pendingDoor = null;
    }

    clearSliceArrivalVisuals() {
        this.sliceDoorGlow?.destroy();
        this.sliceFootsteps?.destroy();
        this.sliceDoorGlow = null;
        this.sliceFootsteps = null;
    }

    cancelSliceArrival() {
        this.sliceArrivalTimers.forEach(timer => timer?.remove?.());
        this.sliceArrivalTimers = [];
        this.sliceSpawnRetryTimer?.remove?.();
        this.sliceSpawnRetryTimer = null;
        this.clearSliceArrivalVisuals();
        this.pendingSliceDoor = null;
    }

    cancelSliceSetupDeadline() {
        this.sliceSetupTimer?.remove?.();
        this.sliceSetupTimer = null;
    }

    endSliceChase(reason = 'timeout') {
        if (!this.sliceConfig) return false;
        this.sliceEndTimer?.remove?.();
        this.sliceEndTimer = null;
        this.cancelSliceSetupDeadline();
        this.cancelSliceArrival();
        this.chaser?.destroy?.();
        this.chaser = null;
        this.scene.chaser = null;
        this.scene.dangerOverlay?.setAlpha?.(0);
        this.scene.gameState.sliceChasing = false;
        this.sliceConfig = null;
        this.materializing = false;
        this.path = [];
        this.lastTargetKey = '';
        this.caught = false;
        return reason;
    }

    destroy() {
        this.cancelHideEscape();
        this.cancelArrival();
        this.endSliceChase('destroy');
        this.chaser?.destroy();
        this.chaser = null;
        this.scene.chaser = null;
    }
}

const EXIT_BELL_RADIUS = 96;
const HOUSE_RULE_CHASE_DURATION_MS = 10000;
const HOUSE_RULE_CHECKPOINT_MS = 30000;
const FATHER_CHECK_HOLD_MS = 850;

const HOUSE_RULE_SHUTDOWN_EVENT = globalThis.Phaser?.Scenes?.Events?.SHUTDOWN || 'shutdown';
const HOUSE_RULE_CUES = Object.freeze([
    { id: 'bell', at: 0 },
    { id: 'knock', at: 550 },
    { id: 'footsteps', at: 1150 },
    { id: 'door_shadow', at: 2000 },
    { id: 'door_check', at: 3200 }
]);

function distanceBetween(first, second) {
    if (!first || !second) return Infinity;
    return Math.hypot(first.x - second.x, first.y - second.y);
}

function pointInRect(point, rect) {
    return Boolean(
        point && rect &&
        point.x >= rect.x && point.x <= rect.x + rect.width &&
        point.y >= rect.y && point.y <= rect.y + rect.height
    );
}

function setDepth(object, depth) {
    object?.setDepth?.(depth);
    return object;
}

class HouseRuleDirector {
    constructor(scene, state = scene?.sliceState || scene?.gameState?.slice) {
        if (!scene || !state || typeof state !== 'object') {
            throw new Error('House rule director requires a scene and slice state');
        }
        this.scene = scene;
        this.state = state;
        this.activeBell = null;
        this.warningEffects = [];
        this.fatherChecker = null;
        this.fatherCheckTimer = null;
        this.checkpoint = null;
        this.playerElapsedMs = 0;
        this.exitBellResolved = false;
        this.requiresExitReentry = false;
        this.destroyed = false;
        this.shutdownHandler = () => this.destroy();
        this.scene.events?.once?.(HOUSE_RULE_SHUTDOWN_EVENT, this.shutdownHandler);
    }

    update(_time, delta = 0) {
        if (this.destroyed) return;
        if (this.isPaused()) {
            this.syncPausedPlayerPosition();
            return;
        }
        const safeDelta = Number.isFinite(delta) && delta > 0 ? delta : 0;
        this.playerElapsedMs += safeDelta;
        this.expireCheckpoint();

        if (!this.activeBell) {
            this.tryStartNextBell();
            return;
        }

        this.activeBell.elapsedMs += safeDelta;
        this.recordPlayerMotion();
        for (const cue of HOUSE_RULE_CUES) {
            if (!this.activeBell.fired.has(cue.id) && this.activeBell.elapsedMs >= cue.at) {
                this.activeBell.fired.add(cue.id);
                this.runCue(cue.id);
                if (!this.activeBell) return;
            }
        }
    }

    isPaused() {
        return shouldPauseHouseRule({
            dialog: globalThis.window?.dialogActive === true,
            replay: this.scene.memoryReplayDirector?.active === true,
            switching: this.scene.isSwitching === true,
            carryingAnimation: this.scene.kitchenTableController?.isCarryingAnimation === true
        });
    }

    syncPausedPlayerPosition() {
        const bell = this.activeBell;
        const player = this.scene.player?.sprite;
        if (!bell || !player) return;
        bell.lastPlayerPosition = { x: player.x, y: player.y };
        bell.frameMovedDistance = 0;
    }

    tryStartNextBell() {
        if (this.scene.chaseManager?.isSliceChasing?.() || this.scene.gameState?.sliceChasing === true) return false;
        if (this.state.tableSolved !== true) return false;
        if (this.state.houseRuleDemonstrated !== true) {
            return this.startBell('demonstration', this.getExitDoor() || this.getCheckDoor());
        }
        if (this.exitBellResolved || !this.isExitDoorOpen()) return false;
        if (this.requiresExitReentry) {
            if (this.distanceToExitDoor() > EXIT_BELL_RADIUS) this.requiresExitReentry = false;
            return false;
        }
        if (this.distanceToExitDoor() > EXIT_BELL_RADIUS) return false;
        return this.startBell('exit', this.getExitDoor());
    }

    startBell(kind, door) {
        if (!door || this.activeBell || this.destroyed) return false;
        this.clearFatherChecker();
        if (kind === 'exit') this.captureCheckpoint();
        const player = this.scene.player?.sprite;
        this.activeBell = {
            kind,
            door,
            arrivalDoor: this.getCheckDoor() || door,
            elapsedMs: 0,
            movedDistance: 0,
            frameMovedDistance: 0,
            lastPlayerPosition: player ? { x: player.x, y: player.y } : null,
            fired: new Set()
        };
        this.activeBell.fired.add('bell');
        this.runCue('bell');
        return true;
    }

    runCue(id) {
        const bell = this.activeBell;
        if (!bell || this.destroyed) return;
        const point = this.getDoorPoint(bell.arrivalDoor);
        if (id === 'bell') {
            this.scene.soundManager?.playSpatialNoise?.(0.14, point.x, point.y);
            this.createWarningCircle(point.x, point.y, 20, 0x89745d, 0.18, 'bell');
            if (bell.kind === 'demonstration') this.createFrozenFamily();
            return;
        }
        if (id === 'knock') {
            this.scene.soundManager?.playSpatialNoise?.(0.22, point.x, point.y);
            this.createWarningCircle(point.x, point.y, 28, 0x8b0000, 0.25, 'knock');
            return;
        }
        if (id === 'footsteps') {
            this.scene.soundManager?.playSpatialNoise?.(0.11, point.x, point.y + 24);
            const footsteps = setDepth(this.scene.add?.rectangle?.(point.x, point.y + 28, 22, 5, 0x6b4b3b, 0.36), 342);
            if (footsteps) footsteps.sliceHouseRuleEffect = 'footsteps';
            if (footsteps) this.warningEffects.push(footsteps);
            return;
        }
        if (id === 'door_shadow') {
            const shadow = setDepth(this.scene.add?.image?.(point.x, point.y, 'npc_paper'), 343);
            shadow?.setAlpha?.(0.22);
            shadow?.setTint?.(0x381818);
            if (shadow) shadow.sliceHouseRuleEffect = 'door_shadow';
            if (shadow) this.warningEffects.push(shadow);
            return;
        }
        if (id === 'door_check') this.resolveDoorCheck();
    }

    createWarningCircle(x, y, radius, color, alpha, marker) {
        const circle = setDepth(this.scene.add?.circle?.(x, y, radius, color, alpha), 341);
        if (!circle) return null;
        circle.sliceHouseRuleEffect = marker;
        this.warningEffects.push(circle);
        return circle;
    }

    createFrozenFamily() {
        const seats = this.scene.sliceMapDef?.objects?.table?.seats || {
            nail: { x: 320, y: 176 },
            stove: { x: 384, y: 240 },
            side: { x: 320, y: 304 }
        };
        for (const [actor, position] of Object.entries(seats)) {
            const ghost = setDepth(this.scene.add?.image?.(position.x, position.y, 'npc_paper'), 344);
            ghost?.setAlpha?.(0.28);
            ghost?.setTint?.(0xb7c9d0);
            if (ghost) {
                ghost.sliceHouseRuleEffect = `frozen_${actor}`;
                this.warningEffects.push(ghost);
            }
        }
    }

    recordPlayerMotion() {
        const bell = this.activeBell;
        const player = this.scene.player?.sprite;
        if (!bell || !player) return;
        const current = { x: player.x, y: player.y };
        const distance = distanceBetween(current, bell.lastPlayerPosition);
        bell.frameMovedDistance = Number.isFinite(distance) ? distance : 0;
        bell.movedDistance += bell.frameMovedDistance;
        bell.lastPlayerPosition = current;
    }

    resolveDoorCheck() {
        const bell = this.activeBell;
        if (!bell) return;
        if (bell.kind === 'demonstration') {
            this.state.houseRuleDemonstrated = true;
            this.finishBell('demonstration');
            return;
        }

        const result = evaluateDinnerBell({
            demonstrated: this.state.houseRuleDemonstrated === true,
            elapsedMs: bell.elapsedMs,
            movedDistance: bell.movedDistance
        });
        if (result === 'violated') {
            this.state.fatherAttention = advanceAttention(this.state.fatherAttention);
            if (this.state.fatherAttention === 'chasing') {
                this.startSliceChase();
                this.finishBell('chasing');
            } else {
                if (this.state.fatherAttention === 'checking' && !this.isPlayerSafe()) {
                    this.createFatherChecker();
                }
                this.requiresExitReentry = true;
                this.finishBell('violated');
            }
            return;
        }

        const safe = this.isPlayerSafe();
        if (this.state.fatherAttention === 'checking' && !safe) this.createFatherChecker();
        this.state.fatherAttention = recoverAttention(this.state.fatherAttention);
        this.exitBellResolved = true;
        this.finishBell(safe ? 'safe' : 'obeyed');
    }

    startSliceChase() {
        const checkDoor = this.getCheckDoor();
        const mapDef = this.scene.sliceMapDef;
        if (!checkDoor || !mapDef) return false;
        return this.scene.chaseManager?.startSlice?.({
            mapDef,
            arrivalDoorId: checkDoor.doorId,
            durationMs: HOUSE_RULE_CHASE_DURATION_MS,
            onCaught: () => this.restoreCheckpoint()
        }) === true;
    }

    finishBell(_reason) {
        this.clearWarningEffects();
        this.activeBell = null;
    }

    getDoorPoint(door) {
        return { x: door?.x ?? 0, y: door?.y ?? 0 };
    }

    getExitDoor() {
        return (this.scene.doors?.getChildren?.() || []).find(door => door.doorId === 'kitchen_side_door') || null;
    }

    getCheckDoor() {
        const doors = this.scene.doors?.getChildren?.() || [];
        const exact = doors.find(door => door.doorId === this.state.lastTraversedDoor);
        if (exact) return exact;
        const previousMap = this.scene.previousMapId;
        return doors.find(door => door.targetMap === previousMap) || null;
    }

    isExitDoorOpen() {
        const door = this.getExitDoor();
        return this.state.tableSolved === true && door?.locked !== true;
    }

    distanceToExitDoor() {
        return distanceBetween(this.scene.player?.sprite, this.getExitDoor());
    }

    isPlayerSafe() {
        const player = this.scene.player?.sprite;
        const zone = pointInRect(player, this.scene.sliceSafeZones?.under_table) ? 'under_table' : null;
        return isFatherSafeZone({ zone, moving: (this.activeBell?.frameMovedDistance || 0) > 0.5 });
    }

    captureCheckpoint() {
        const player = this.scene.player?.sprite;
        if (!player) return;
        this.checkpoint = {
            mapId: this.scene.currentMapId,
            x: player.x,
            y: player.y,
            createdAtMs: this.playerElapsedMs
        };
    }

    expireCheckpoint() {
        if (this.checkpoint && this.playerElapsedMs - this.checkpoint.createdAtMs > HOUSE_RULE_CHECKPOINT_MS) {
            this.checkpoint = null;
        }
    }

    restoreCheckpoint() {
        this.expireCheckpoint();
        const checkpoint = this.checkpoint;
        if (!checkpoint || this.destroyed) return false;
        this.scene.scene?.restart?.({
            mapId: checkpoint.mapId,
            x: checkpoint.x,
            y: checkpoint.y,
            previousMapId: this.scene.previousMapId,
            sliceMode: true
        });
        return true;
    }

    blocksDoorTransition(door) {
        return door?.doorId === 'kitchen_side_door' && this.activeBell?.kind === 'exit';
    }

    clearWarningEffects() {
        for (const effect of this.warningEffects) effect?.destroy?.();
        this.warningEffects = [];
    }

    createFatherChecker() {
        const door = this.getCheckDoor();
        if (!door) return null;
        this.clearFatherChecker();
        const father = setDepth(this.scene.add?.image?.(door.x, door.y, 'npc_paper'), 345);
        father?.setAlpha?.(0.62);
        father?.setTint?.(0x6a3030);
        if (father) {
            father.sliceHouseRuleEffect = 'father_check';
            this.fatherChecker = father;
            let timer = null;
            timer = this.scene.time?.delayedCall?.(FATHER_CHECK_HOLD_MS, () => {
                if (this.fatherCheckTimer !== timer) return;
                this.fatherCheckTimer = null;
                this.fatherChecker?.destroy?.();
                this.fatherChecker = null;
            }) || null;
            this.fatherCheckTimer = timer;
        }
        return father;
    }

    clearFatherChecker() {
        this.fatherCheckTimer?.remove?.();
        this.fatherCheckTimer = null;
        this.fatherChecker?.destroy?.();
        this.fatherChecker = null;
    }

    destroy() {
        if (this.destroyed) return;
        this.destroyed = true;
        this.scene.events?.off?.(HOUSE_RULE_SHUTDOWN_EVENT, this.shutdownHandler);
        this.activeBell = null;
        this.clearWarningEffects();
        this.clearFatherChecker();
        this.checkpoint = null;
    }
}

function canAdvanceWatcher({ dialogActive, puzzleActive, facingDot, movedDistance }) {
    return !dialogActive && !puzzleActive && facingDot < 0.25 && movedDistance >= 32;
}

function evaluateListeningWindow({ elapsedMs, movedDistance }) {
    if (movedDistance >= 16) return 'noticed';
    if (elapsedMs >= 2500) return 'survived';
    return 'listening';
}

class HauntingDirector {
    constructor(scene) {
        this.scene = scene;
        this.listening = null;
        this.effects = [];
        this.watcherIndex = 0;
        this.watcherOrigin = scene.player?.sprite ? { x: scene.player.sprite.x, y: scene.player.sprite.y } : null;
        this.nextWatcherAt = 0;
        this.readyAt = (scene.time?.now || 0) + 1200;
    }

    isPuzzleActive() {
        const overlay = document.getElementById('puzzle-overlay');
        return overlay ? getComputedStyle(overlay).display !== 'none' : false;
    }

    getEncounterId() {
        const flags = ensureStoryFlags(this.scene.gameState);
        if (this.scene.currentMapId === 'room_corridor') {
            if (flags.puzzles.school && !flags.hauntingSeen.includes('school_listening')) return 'school_listening';
            if (flags.puzzles.hospital && !flags.hauntingSeen.includes('hospital_listening')) return 'hospital_listening';
        }
        if (this.scene.currentMapId === 'room_main' && flags.ritualSolved && !flags.hauntingSeen.includes('altar_listening')) return 'altar_listening';
        return null;
    }

    startListening(id, time) {
        const player = this.scene.player.sprite;
        this.listening = { id, startedAt: time, origin: { x: player.x, y: player.y } };
        this.listeningText = this.scene.add.text(this.scene.scale.width / 2, 112, '门外有人在数你的脚步……别动', {
            fontSize: '17px', color: '#f2d0bd', backgroundColor: '#24100d', padding: { x: 10, y: 6 }
        }).setOrigin(0.5).setScrollFactor(0).setDepth(1100);
        this.scene.soundManager?.playNoise(0.25);
    }

    resolveListening(result) {
        const flags = ensureStoryFlags(this.scene.gameState);
        const id = this.listening.id;
        if (!flags.hauntingSeen.includes(id)) flags.hauntingSeen.push(id);
        this.listeningText?.destroy();
        this.listeningText = null;
        if (result === 'noticed') {
            this.scene.gameState.sanity = Math.max(0, this.scene.gameState.sanity - 10);
            this.scene.cameras.main.shake(140, 0.006);
            const player = this.scene.player.sprite;
            const shadow = this.scene.add.sprite(player.x + 72, player.y, 'npc_paper').setTint(0x090909).setAlpha(0.85).setDepth(500);
            this.effects.push(shadow);
            const timer = this.scene.time.delayedCall(850, () => {
                shadow.destroy();
                this.effects = this.effects.filter(effect => effect !== shadow);
            });
            this.effects.push(timer);
            this.scene.showRoomTitle?.('它听见你了。门口的影子少了一步。');
        } else {
            this.scene.showRoomTitle?.(id === 'altar_listening' ? '脚步停住了。门外有人轻声说：饭已经凉了。' : '脚步从门外慢慢退远。');
        }
        this.listening = null;
        this.readyAt = (this.scene.time?.now || 0) + 1600;
    }

    updateWatcher(time) {
        if (this.scene.currentMapId !== 'room_kitchen' || !this.scene.npc?.active || !this.watcherOrigin) return;
        const player = this.scene.player.sprite;
        const dx = this.scene.npc.x - player.x;
        const dy = this.scene.npc.y - player.y;
        const length = Math.hypot(dx, dy) || 1;
        const facingDot = (dx / length) * (this.scene.player.facingX || 0) + (dy / length) * (this.scene.player.facingY || 1);
        const movedDistance = Math.hypot(player.x - this.watcherOrigin.x, player.y - this.watcherOrigin.y);
        if (time < this.nextWatcherAt || !canAdvanceWatcher({
            dialogActive: !!window.dialogActive,
            puzzleActive: this.isPuzzleActive(),
            facingDot,
            movedDistance
        })) return;

        const anchors = [{ x: 360, y: 160 }, { x: 348, y: 225 }, { x: 395, y: 248 }];
        this.watcherIndex = Math.min(this.watcherIndex + 1, anchors.length - 1);
        const anchor = anchors[this.watcherIndex];
        this.scene.npc.setPosition(anchor.x, anchor.y);
        this.scene.npc.body?.updateFromGameObject?.();
        this.scene.cameras.main.flash(80, 40, 0, 0);
        this.watcherOrigin = { x: player.x, y: player.y };
        this.nextWatcherAt = time + 900;
    }

    update(time) {
        if (!this.scene.player?.sprite || this.scene.isSwitching || this.scene.gameState.isChasing) return;
        if (window.dialogActive || this.isPuzzleActive()) return;
        this.updateWatcher(time);
        if (this.listening) {
            const player = this.scene.player.sprite;
            const movedDistance = Math.hypot(player.x - this.listening.origin.x, player.y - this.listening.origin.y);
            const result = evaluateListeningWindow({ elapsedMs: time - this.listening.startedAt, movedDistance });
            if (result !== 'listening') this.resolveListening(result);
            return;
        }
        if (time >= this.readyAt) {
            const id = this.getEncounterId();
            if (id) this.startListening(id, time);
        }
    }

    onPuzzleMistake(puzzleId, attempts) {
        if (puzzleId === 'kitchen_table' && attempts >= 3 && this.scene.npc?.active) {
            this.watcherIndex = 2;
            this.scene.npc.setPosition(395, 248);
            this.scene.npc.body?.updateFromGameObject?.();
            this.scene.cameras.main.flash(120, 20, 0, 0);
            return;
        }
        this.scene.cameras.main.shake(90, 0.003);
        this.scene.soundManager?.playNoise(0.18);
    }

    destroy() {
        this.listeningText?.destroy();
        this.listeningText = null;
        this.effects.forEach(effect => effect?.remove ? effect.remove() : effect?.destroy?.());
        this.effects = [];
        this.listening = null;
    }
}

const SLICE_MAP_IDS = new Set([
    'room_main',
    'room_kitchen',
    'room_bedroom_me'
]);

function createRouteData(mapId, sliceMode, params) {
    const data = { mapId, sliceMode };

    for (const coordinate of ['x', 'y']) {
        if (!params.has(coordinate)) continue;
        const rawValue = params.get(coordinate);
        if (rawValue.trim() === '') continue;
        const value = Number(rawValue);
        if (Number.isFinite(value)) data[coordinate] = value;
    }

    return data;
}

function resolveStartRoute(search = '') {
    const params = new URLSearchParams(search);
    const mapId = params.get('map');
    const legacyValues = params.getAll('legacy');
    const legacy = legacyValues.length === 1 && legacyValues[0] === '1';

    if (legacy) {
        if (!mapId || !Object.hasOwn(Maps, mapId)) {
            return { scene: 'IntroScene', data: undefined };
        }

        return {
            scene: 'GameScene',
            data: createRouteData(mapId, false, params)
        };
    }

    const sliceMapId = SLICE_MAP_IDS.has(mapId) ? mapId : 'room_main';

    return {
        scene: 'GameScene',
        data: createRouteData(sliceMapId, true, params)
    };
}
