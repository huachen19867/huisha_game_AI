class IntroScene extends Phaser.Scene {
    constructor() {
        super('IntroScene');
    }

    create() {
        this.cameras.main.setBackgroundColor('#000000');
        this.crashed = false;

        // --- Visual Setup ---

        // 1. Road (Perspective)
        this.roadGraphics = this.add.graphics();

        // 2. Rain Particles
        // Create rain texture if missing
        if (!this.textures.exists('rain_drop')) {
            const g = this.make.graphics({x:0, y:0, add:false});
            g.fillStyle(0xaaaaaa);
            g.fillRect(0,0, 2, 10);
            g.generateTexture('rain_drop', 2, 10);
        }

        this.rainEmitter = this.add.particles(0, 0, 'rain_drop', {
            x: { min: 0, max: 800 },
            y: -50,
            speedY: { min: 800, max: 1200 },
            speedX: { min: -200, max: 200 }, // Wind effect
            lifespan: 1000,
            quantity: 5,
            frequency: 20,
            alpha: { start: 0.8, end: 0 },
            scale: { start: 1, end: 0.5 },
            blendMode: 'ADD'
        });

        // 3. Car Dashboard (Interior Mask)
        this.dashboard = this.add.graphics();
        this.dashboard.fillStyle(0x111111);
        // Dashboard base
        this.dashboard.fillRect(0, 450, 800, 150);
        // Pillars
        this.dashboard.fillRect(0, 0, 50, 600);
        this.dashboard.fillRect(750, 0, 50, 600);
        // Top shade
        this.dashboard.fillTriangle(0, 0, 800, 0, 400, 80);

        // Steering wheel
        this.dashboard.fillStyle(0x000000);
        this.dashboard.fillCircle(200, 550, 80);
        this.dashboard.lineStyle(10, 0x333333);
        this.dashboard.strokeCircle(200, 550, 80);

        // 4. Wipers
        // Left Wiper
        this.leftWiper = this.add.rectangle(200, 550, 350, 8, 0x222222).setOrigin(0, 0.5);
        // Right Wiper
        this.rightWiper = this.add.rectangle(500, 550, 350, 8, 0x222222).setOrigin(0, 0.5);

        // Wiper Animation
        this.tweens.add({
            targets: [this.leftWiper, this.rightWiper],
            angle: { from: 0, to: -100 },
            duration: 600,

        this.engineTimer = this.time.addEvent({
            delay: 150,
            callback: () => {
                if (this.game.soundManager && !this.crashed) {
                    // Low rumbling
                    this.game.soundManager.playTone(60 + Math.random()*5, 'sawtooth', 0.2);
                }
            },
            loop: true
        });

        // --- Sequence Logic ---

        this.time.delayedCall(1500, () => {

        });

        this.time.delayedCall(9000, () => {
            window.showDialog('主角', '那是...什么东西？！');
        });

        // The Crash Event
        this.time.delayedCall(10000, () => {
            this.triggerCrash();
        });
    }

    update(time, delta) {
        if (this.crashed) return;

        this.roadGraphics.clear();
        this.lightsGraphics.clear();

        // 1. Draw Ground (Dark)
        this.roadGraphics.fillStyle(0x050505);
        this.roadGraphics.fillRect(0, 300, 800, 300); // Horizon at 300

        // 2. Draw Road (Trapezoid)
        // Vanishing point: (400, 300)
        // Bottom width: 600px (100 to 700)
        this.roadGraphics.fillStyle(0x222222);
        this.roadGraphics.beginPath();
        this.roadGraphics.moveTo(380, 300); // Top Left
        this.roadGraphics.lineTo(420, 300); // Top Right
        this.roadGraphics.lineTo(750, 600); // Bottom Right
        this.roadGraphics.lineTo(50, 600);  // Bottom Left
        this.roadGraphics.closePath();
        this.roadGraphics.fillPath();

        // 3. Moving Dashed Lines
        const speed = 0.002;
        const offset = (time * speed) % 1; // 0 to 1 loop

        this.roadGraphics.fillStyle(0xffffff);

        // Draw multiple segments to simulate infinity
        // We use an exponential scale for Y to simulate perspective distance
        for(let i=0; i<6; i++) {
            // Calculate progress (0 is far, 1 is near)
            // Offset shifts them "towards" camera (increasing Y)
            let progress = (offset + i/6) % 1;

            // Apply perspective power (cubic feels right for road)
            let perspective = Math.pow(progress, 3);

            let y = 300 + perspective * 300; // Map 0-1 to 300-600
            let w = 2 + perspective * 20;    // Width grows
            let h = 2 + perspective * 40;    // Height grows (dash length)

            if (y > 300 && y < 600) {
                this.roadGraphics.fillRect(400 - w/2, y, w, h);
            }
        }

        // 4. Headlights Flicker
        const flicker = 0.1 + Math.random() * 0.05;
        this.lightsGraphics.fillStyle(0xffffcc, flicker);
        // Left Beam
        this.lightsGraphics.beginPath();
        this.lightsGraphics.moveTo(150, 600);
        this.lightsGraphics.lineTo(350, 300);
        this.lightsGraphics.lineTo(450, 300);
        this.lightsGraphics.lineTo(650, 600);
        this.lightsGraphics.fillPath();
    }

    triggerCrash() {
        this.crashed = true;

        if (this.engineTimer) this.engineTimer.remove();

        // 1. Ghost Flash (Jumpscare)
        // Use 'npc_paper' or create a scary shape
        let ghost;
        if (this.textures.exists('npc_paper')) {
            ghost = this.add.image(400, 350, 'npc_paper');
            ghost.setTint(0xff0000);
        } else {
            // Fallback shape
            ghost = this.add.rectangle(400, 350, 50, 100, 0xff0000);
        }

        ghost.setOrigin(0.5);
        ghost.setScale(0.1);
        ghost.setDepth(100); // Above dashboard? No, behind windshield (dashboard is graphics, depth 0 default)
        // Dashboard needs depth
        this.dashboard.setDepth(200);
        this.leftWiper.setDepth(201);
        this.rightWiper.setDepth(201);
        ghost.setDepth(100);

        // Zoom ghost towards screen
        this.tweens.add({
            targets: ghost,
            scale: 8,
            alpha: { from: 0.5, to: 1 },
            duration: 300,
            ease: 'Expo.in',
            onComplete: () => {
                // 2. Impact
                this.cameras.main.shake(1000, 0.05);
                this.cameras.main.flash(500, 255, 255, 255);

                // Sounds
                if (this.game.soundManager) {
                    this.game.soundManager.playTone(50, 'sawtooth', 1.0); // Boom
                    this.game.soundManager.playTone(100, 'square', 0.5);  // Crunch
                    this.game.soundManager.playTone(800, 'sawtooth', 0.3); // Screech
                }

                // Stop rain visuals
                this.rainEmitter.stop();

                // 3. Fade Out
                this.time.delayedCall(1000, () => {
                    this.cameras.main.fadeOut(2000, 0, 0, 0);

                    // Blackout Text
                    this.time.delayedCall(2500, () => {
                        const txt = this.add.text(400, 300, '头...好痛...\n\n我这是...在哪？', {
                            fontFamily: '"SimSun", serif',
                            fontSize: '24px',
                            color: '#ffffff',
                            align: 'center'
                        }).setOrigin(0.5).setDepth(1000);
                        txt.setAlpha(0);

                        this.tweens.add({
                            targets: txt,
                            alpha: 1,
                            duration: 1500,
                            yoyo: true,
                            hold: 2000,
                            onComplete: () => {
                                // 4. Start Game
                                // Pass mapId to start in prologue
                                this.scene.start('GameScene', { mapId: 'room_prologue' });
                            }
                        });
                    });
                });
            }
        });
    }

        // Update Chaser AI per frame for smoother movement
        this.updateChaser();

        // Hiding Logic
        if (this.gameState.isHidden) {
            // Prevent exiting hide mode immediately after closing a dialog
            if (window.dialogActive) return;

            // Mic Check Logic
            if (this.soundManager && this.soundManager.micStream) {
                const vol = this.soundManager.getMicVolume();
                // Threshold logic:
                // Quiet room is usually ~10-20. Speaking is ~50+.
                // Let's set threshold to 40.
                if (vol > 40) {
                    this.micIndicator.setText('⚠️ 声音太大了！');
                    this.micIndicator.setColor('#ff0000');

                    if (!this.micTooLoudTimer) {
                         this.micTooLoudTimer = this.time.delayedCall(1000, () => {
                             // If still loud after 1s (or just cumulative trigger)
                             // Actually let's just trigger immediately if it spikes high
                             this.triggerFoundByMic();
                         });
                    }
                } else {
                    this.micIndicator.setText('🤫 保持安静...');
                    this.micIndicator.setColor('#ffffff');
                    if (this.micTooLoudTimer) {
                        this.micTooLoudTimer.remove();
                        this.micTooLoudTimer = null;
                    }
                }
            }

            if (Phaser.Input.Keyboard.JustDown(this.keySpace) || Phaser.Input.Keyboard.JustDown(this.keyE)) {
                this.toggleHide();
            }

        }

        // Wait for sound manager to be ready
        if (this.soundManager) {
            this.player.update(this.cursors, this.wasd, this.joystick, this.soundManager);

        if (this.interactionManager) this.interactionManager.update();

            }

        // Hint System for Room Corridor (if user is stuck)

    updateSanity() {
        if (!window.updateSanityUI) return;

        let drainRate = 0;

        // 1. Darkness Drain (if flashlight is off or flickering)
        // Check ambient light + flashlight
        // Simplified: If not in memory room and not near light source?
        // Let's just say: If chaser is active OR in specific scary rooms

        if (this.currentMapId === 'room_basement' || this.currentMapId === 'room_attic' || this.currentMapId === 'room_secret') {
            drainRate += 0.05;
        }

        // 2. Chaser Proximity
        if (this.chaser && this.chaser.active && this.gameState.isChasing) {
            const dist = Phaser.Math.Distance.Between(this.player.sprite.x, this.player.sprite.y, this.chaser.x, this.chaser.y);
            if (dist < 300) {
                drainRate += 0.2;
            }
        }

        // 3. Recharge in safe areas
        if (this.currentMapId === 'room_bedroom_me' || this.currentMapId === 'room_memory') {
            drainRate = -0.1;
        }

        this.gameState.sanity -= drainRate;
        this.gameState.sanity = Phaser.Math.Clamp(this.gameState.sanity, 0, 100);

        window.updateSanityUI(this.gameState.sanity, 100);

        // Sanity Effects
        if (this.gameState.sanity < 30) {
            // Audio Hallucinations
            if (Math.random() < 0.01 && this.soundManager) {
                this.soundManager.playSpatialNoise(0.5, this.player.sprite.x + Phaser.Math.Between(-100, 100), this.player.sprite.y + Phaser.Math.Between(-100, 100));
            }
            // Visual Shake
            if (Math.random() < 0.05) {
                this.cameras.main.shake(100, 0.005);
            }
        }

    spawnChaser() {
        if (this.chaser) return; // Already spawned

        let spawnX, spawnY;
        let fromDoor = false;

        // Try to find the door leading back to previous map
        if (this.previousMapId) {
             const mapData = Maps[this.currentMapId];
             if (mapData && mapData.objects.doors) {
                 const door = mapData.objects.doors.find(d => d.targetMap === this.previousMapId);
                 if (door) {
                     // Found the door we came from
                     const w = (door.w || 1) * 32;
                     const h = (door.h || 1) * 32;
                     spawnX = (door.x * 32) + (w / 2);
                     spawnY = (door.y * 32) + (h / 2);
                     fromDoor = true;
                 }
             }
        }

        if (!fromDoor) {
             // Fallback: Random distance
             spawnX = this.player.sprite.x + (Math.random() > 0.5 ? 200 : -200);
             spawnY = this.player.sprite.y + (Math.random() > 0.5 ? 200 : -200);
        }

        this.chaser = this.physics.add.sprite(spawnX, spawnY, 'npc_paper').setPipeline('Light2D');
        this.chaser.setTint(0xff0000); // Red tint for danger

        // Dark Aura Particles (Evil Spirit Effect)
        if (!this.isMobile) {
            this.chaserAura = this.add.particles(0, 0, 'rain', {
                speed: { min: 10, max: 30 },
                scale: { start: 0.8, end: 0 },
                alpha: { start: 0.6, end: 0 },
                tint: 0x000000,
                quantity: 2,
                lifespan: 800,
                follow: this.chaser
            });
            this.chaserAura.setDepth(this.chaser.depth - 1);
        }

        // Add collision with walls and static objects
        this.physics.add.collider(this.chaser, this.walls);
        this.physics.add.collider(this.chaser, this.furniture);
        if (this.trees) this.physics.add.collider(this.chaser, this.trees);
        // Explicitly add collision with coffin if it exists (it's in furniture group, but double check)
        if (this.coffin) this.physics.add.collider(this.chaser, this.coffin);

        if (fromDoor) {
             // If from door, start invisible and disabled, then fade in
             this.chaser.setAlpha(0);
             this.chaser.body.enable = false;

             // Give player 2 seconds to run before ghost enters
             this.time.delayedCall(2000, () => {
                 if (this.soundManager) this.soundManager.playNoise(1.0); // Door bang sound

                 this.tweens.add({
                    targets: this.chaser,
                    alpha: 0.8,
                    duration: 500,
                    onComplete: () => {
                        if (this.chaser) this.chaser.body.enable = true;
                    }
                 });
             });
        } else {
             this.chaser.setAlpha(0.8);
        }

        this.physics.add.overlap(this.player.sprite, this.chaser, () => {
            if (!this.gameState.isHidden) {
                // Game Over Logic
                this.physics.pause();
                this.chaser.body.setVelocity(0);
                window.showDialog('暴怒的黑影', '抓到你了...乖儿子，哪也不许去。我们要永远在一起...永远不分开。', () => {
                     this.scene.restart();
                });
            }
        });
    }

    updateChaser() {
        // No chaser in memory room
        if (this.currentMapId === 'room_memory') return;

        // Reset danger effect if no chaser
        if (!this.chaser || !this.chaser.active || !this.gameState.isChasing) {
            if (this.dangerOverlay) this.dangerOverlay.setAlpha(0);
            return;
        }

        // Calculate distance for effects
        const dist = Phaser.Math.Distance.Between(this.chaser.x, this.chaser.y, this.player.sprite.x, this.player.sprite.y);

        // Dynamic Horror Effects
        if (dist < 500) { // Increased range
            // Visual: Red pulse scaling with distance
            const intensity = 1 - (dist / 500);
            this.dangerOverlay.setAlpha(intensity * 0.8 + Math.sin(this.time.now / 100) * 0.2); // Stronger effect

            // Audio: Heartbeat
            // Frequency increases with proximity (1000ms down to 400ms)
            const beatInterval = 300 + (dist / 500) * 500;
            if (this.time.now > (this.nextHeartbeat || 0)) {
                if (this.soundManager) this.soundManager.playHeartbeat(intensity);
                this.nextHeartbeat = this.time.now + beatInterval;
                // Camera bump
                this.cameras.main.shake(100, 0.01 * intensity);
            }
        } else {
            this.dangerOverlay.setAlpha(0);
        }

        // Use a timer to prevent rapid direction changes
        const now = this.time.now;
        if (!this.chaser.nextDecisionTime) this.chaser.nextDecisionTime = 0;

        // Check if stuck (velocity is low OR hitting a wall)
        // Note: checking body.blocked requires that physics world has updated.
        // If we just spawned, velocity is 0, so give it a kickstart if needed.
        const isStuck = this.chaser.body.velocity.length() < 10 || !this.chaser.body.blocked.none;

        if (this.gameState.isHidden) {
             // Pure wander logic (Blind to player position)

             // If stuck and decision timer allows, pick a new direction
             if (isStuck && now > this.chaser.nextDecisionTime) {
                 // Pick a random direction and move
                 const angle = Math.random() * Math.PI * 2;
                 this.chaser.body.setVelocity(Math.cos(angle) * 80, Math.sin(angle) * 80);
                 // Don't change again for 1 second to give it time to move out of corner
                 this.chaser.nextDecisionTime = now + 1000;
             }

             // Small chance to change direction spontaneously (if not stuck)
             if (!isStuck && Math.random() < 0.01 && now > this.chaser.nextDecisionTime) {
                 const angle = Math.random() * Math.PI * 2;
                 this.chaser.body.setVelocity(Math.cos(angle) * 80, Math.sin(angle) * 80);
                 this.chaser.nextDecisionTime = now + 1000;
             }
        } else {
            // Chase logic
            const speed = 100;
            const dist = Phaser.Math.Distance.Between(this.chaser.x, this.chaser.y, this.player.sprite.x, this.player.sprite.y);

            // Stuck detection during chase
            if (isStuck && dist > 50 && now > this.chaser.nextDecisionTime) {
                // Stuck! Try to move perpendicular or away for a moment
                const angleToPlayer = Phaser.Math.Angle.Between(this.chaser.x, this.chaser.y, this.player.sprite.x, this.player.sprite.y);
                const avoidAngle = angleToPlayer + (Math.random() > 0.5 ? 1.5 : -1.5); // Turn 90 degrees

                this.chaser.body.setVelocity(Math.cos(avoidAngle) * speed, Math.sin(avoidAngle) * speed);
                this.chaser.nextDecisionTime = now + 500;
                return; // SKIP moveToObject this frame to allow velocity to apply
            }

            // 1. Move towards player (Only if not in "avoidance mode" from previous stuck)
            if (now > this.chaser.nextDecisionTime) {
                this.physics.moveToObject(this.chaser, this.player.sprite, speed);
            }
        }
    }

    toggleHide() {
        // Debounce to prevent accidental double-toggle
        const now = this.time.now;
        if (this.lastHideToggleTime && now - this.lastHideToggleTime < 500) return;
        this.lastHideToggleTime = now;

        if (this.gameState.isHidden) {
            // Exit hiding
            this.gameState.isHidden = false;
            this.player.sprite.setVisible(true);
            this.player.sprite.body.enable = true;
            this.interactText.setText('按 [空格] / [A] 调查');
            this.cameras.main.zoomTo(1.2, 500);

            // Re-enable Flashlight
            if (this.player.flashlight) this.player.flashlight.setAlpha(0.6);
            if (this.player.lightSource) this.player.lightSource.setIntensity(1.2);

            // Re-enable UI
            document.getElementById('inventory').style.display = '';
            document.getElementById('joystick-zone').style.display = '';
            document.getElementById('action-btn').style.display = '';

            // Hide Mic Indicator
            this.micIndicator.setVisible(false);

            // Remove global touch listener if exists
            if (this.exitHideListener) {
                document.removeEventListener('touchstart', this.exitHideListener);
                this.exitHideListener = null;
            }

        } else {
            // Enter hiding
            this.gameState.isHidden = true;
            this.player.sprite.setVisible(false);
            this.player.sprite.body.enable = false; // Disable physics immediately
            this.interactText.setVisible(true).setText('按 [空格] / [A] 离开');
            this.interactText.setPosition(this.player.sprite.x, this.player.sprite.y - 60);
            this.cameras.main.zoomTo(1.5, 500);

            // Disable Flashlight
            if (this.player.flashlight) this.player.flashlight.setAlpha(0);
            if (this.player.lightSource) this.player.lightSource.setIntensity(0);

            // Force Chaser to start wandering AWAY immediately
            if (this.chaser && this.chaser.active && this.gameState.isChasing) {
                 const angle = Phaser.Math.Angle.Between(this.player.sprite.x, this.player.sprite.y, this.chaser.x, this.chaser.y);
                 // Add some randomness but generally away
                 const randomAngle = angle + Phaser.Math.FloatBetween(-1.0, 1.0);
                 this.chaser.body.setVelocity(Math.cos(randomAngle) * 80, Math.sin(randomAngle) * 80);
            }

            // Hide UI
            document.getElementById('inventory').style.display = 'none';
            document.getElementById('joystick-zone').style.display = 'none';
            // On mobile, we MUST keep action button visible to allow exiting hide mode
            // Or we could rely on tapping screen? But button is safer.
            if (!this.isMobile) {
                document.getElementById('action-btn').style.display = 'none';
            }

            window.showDialog('主角', '（你屏住了呼吸...）', () => {
                if (this.isMobile) {
                    window.showDialog('系统', '（点击任意位置离开躲藏）', () => {
                        // Dialog closed. Now attach the listener.
                        if (this.gameState.isHidden && !this.exitHideListener) {
                             this.exitHideListener = (e) => {
                                 // Check dialogActive just in case
                                 if (!window.dialogActive) {
                                     this.toggleHide();
                                 }
                             };
                             // Use standard listener (not once: true) so it persists until we toggleHide
                             document.addEventListener('touchstart', this.exitHideListener);
                        }
                    });
                } else if (this.soundManager) {
                    this.soundManager.initMic().then(success => {
                        if (success) {
                            this.micIndicator.setVisible(true);
                        }
                    });
                }
            });
        }
    }

    initJoystick() {
        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');

        let startX, startY;
        const maxDist = 35;
        let uiTimer = null;

        const showUI = () => {
            zone.classList.remove('ui-faded');
            actionBtn.classList.remove('ui-faded');
            if (uiTimer) clearTimeout(uiTimer);
        };

        const scheduleHideUI = () => {
            if (uiTimer) clearTimeout(uiTimer);
            uiTimer = setTimeout(() => {
                zone.classList.add('ui-faded');
                actionBtn.classList.add('ui-faded');
            }, 2000);
        };

        scheduleHideUI();

        zone.addEventListener('touchstart', (e) => {
            showUI();
            e.preventDefault();
            const touch = e.touches[0];
            const rect = zone.getBoundingClientRect();
            startX = rect.left + rect.width / 2;
            startY = rect.top + rect.height / 2;
            this.joystick.active = true;
            this.updateJoystick(touch.clientX, touch.clientY, startX, startY, knob, maxDist);
        }, { passive: false });

        zone.addEventListener('touchmove', (e) => {
            showUI();
            e.preventDefault();
            if (!this.joystick.active) return;
            const touch = e.touches[0];
            this.updateJoystick(touch.clientX, touch.clientY, startX, startY, knob, maxDist);
        }, { passive: false });

        const endHandler = (e) => {
            scheduleHideUI();
            this.joystick.active = false;
            this.joystick.x = 0;
            this.joystick.y = 0;
            knob.style.transform = `translate(-50%, -50%)`;
        };

        zone.addEventListener('touchend', endHandler);
        zone.addEventListener('touchcancel', endHandler);

        actionBtn.addEventListener('touchstart', (e) => {
            showUI();
            scheduleHideUI();
            e.preventDefault();
            if (window.dialogActive) {
                if (window.currentDialogNextHandler) window.currentDialogNextHandler();
                return;
            }
            if (this.gameState.isHidden) {
                this.toggleHide();
                return;
            }
            if (this.interactText.visible && this.interactionManager) this.interactionManager.handleInteraction();
        }, { passive: false });

        actionBtn.addEventListener('mousedown', (e) => {
            showUI();
            scheduleHideUI();
            e.preventDefault();
            if (window.dialogActive) {
                if (window.currentDialogNextHandler) window.currentDialogNextHandler();
                return;
            }
            if (this.gameState.isHidden) {
                this.toggleHide();
                return;
            }
            if (this.interactText.visible && this.interactionManager) this.interactionManager.handleInteraction();
        });
    }

    updateJoystick(clientX, clientY, centerX, centerY, knob, maxDist) {
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
            const ratio = maxDist / dist;
            dx *= ratio;
            dy *= ratio;
        }
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        this.joystick.x = dx / maxDist;
        this.joystick.y = dy / maxDist;
    }

        window.showDialog = function(name, text, callback) {
            // Check if text is too long (basic estimation for mobile screen)
            // Mobile width ~300-400px. Font size 16px. ~20 chars per line.
            // 4 lines = ~80 chars. Let's be safe with 60 chars or check for explicit split.
            const MAX_LEN = 60;

            if (text.length > MAX_LEN) {
                 // Split into chunks, respecting punctuation if possible
                 const chunks = [];
                 let remaining = text;
                 while (remaining.length > MAX_LEN) {
                     let cutIdx = MAX_LEN;
                     // Try to find a punctuation mark to cut at
                     const punc = remaining.substring(0, MAX_LEN).match(/[。！？…，]/g);
                     if (punc) {
                         const lastPunc = remaining.substring(0, MAX_LEN).lastIndexOf(punc[punc.length-1]);
                         if (lastPunc > MAX_LEN / 2) cutIdx = lastPunc + 1;
                     }
                     chunks.push(remaining.substring(0, cutIdx));
                     remaining = remaining.substring(cutIdx);
                 }
                 if (remaining.length > 0) chunks.push(remaining);

                 // Recursive helper
                 const showNextChunk = (index) => {
                     if (index >= chunks.length) {
                         if (callback) callback();
                         return;
                     }
                     // Call the "real" showDialog logic (below) by bypassing this check?
                     // No, we can just copy the logic or make a private function.
                     // Easier: create a private function `_showDialogInternal`
                     _showDialogInternal(name, chunks[index], () => showNextChunk(index + 1));
                 };
                 showNextChunk(0);
                 return;
            }

            _showDialogInternal(name, text, callback);
        };

        function _showDialogInternal(name, text, callback) {
            // Clear any existing typing timer to prevent garbled text
            if (window.currentDialogTimer) {

            window.dialogActive = true;

            dialogText.textContent = '';
            window.currentDialogNextHandler = null; // Reset handler

            window.currentDialogTimer = setInterval(() => {
                if (window.skipDialog) {
                    clearInterval(window.currentDialogTimer);
                    window.currentDialogTimer = null;
                    dialogText.textContent = text;
                    i = text.length;

                    // Trigger completion logic immediately (wait for click)
                    const nextHandler = () => {
                        // Prevent multiple clicks firing multiple times
                        if (!window.dialogActive) return;

                        dialogBox.removeEventListener('click', nextHandler);
                        window.currentDialogNextHandler = null;

                        // Only hide if it's the last chunk?
                        // Actually, hiding and showing again causes flicker.
                        // Ideally we keep it open. But current structure hides it.
                        // Let's accept the flicker for now or check if we are in a sequence.
                        // For simplicity: hide it.
                        dialogBox.classList.add('hidden');
                        window.dialogActive = false;
                        window.lastDialogCloseTime = Date.now();
                        if (callback) callback();
                    };

                    window.currentDialogNextHandler = nextHandler;
                    // Re-bind click listener for closing
                    dialogBox.addEventListener('click', nextHandler, { once: true });
                    return;
                }

                dialogText.textContent += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(window.currentDialogTimer);
                    window.currentDialogTimer = null;

                    // Wait for click or key to continue
                    const nextHandler = () => {
                        if (!window.dialogActive) return;
                        dialogBox.removeEventListener('click', nextHandler);
                        window.currentDialogNextHandler = null;

                        dialogBox.classList.add('hidden');
                        window.dialogActive = false;
                        window.lastDialogCloseTime = Date.now();
                        if (callback) callback();
                    };

                    window.currentDialogNextHandler = nextHandler;
                    // Simple click on dialog box to proceed
                    dialogBox.addEventListener('click', nextHandler, { once: true });
                }
            }, 50);
        }

        // Global Input Handler for Dialog
        document.addEventListener('keydown', (e) => {
            // Document Reader Close on Space/Esc
            const docOverlay = document.getElementById('doc-overlay');
            if (docOverlay.style.display === 'flex') {
                if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                    docOverlay.style.display = 'none';
                    window.dialogActive = false;
                    window.lastDialogCloseTime = Date.now(); // Update time to prevent immediate re-trigger
                    return;
                }
            }

            if (!window.dialogActive) return;

            if (e.code === 'Space' || e.code === 'Enter') {
                // If text is still typing, skip to end
                const dialogText = document.getElementById('dialog-text');
                if (window.currentDialogNextHandler === null && dialogText.textContent.length > 0) {
                    window.skipDialog = true;
                    return;
                }

                // If we have a pending next handler (dialog finished typing)
                if (window.currentDialogNextHandler) {
                    window.currentDialogNextHandler();
                }
            }
        });

        window.updateInventory = function(item) {
            const slot = document.createElement('div');
            slot.className = 'inv-item';

            // Icon mapping
            let icon = item;
            if (item.includes('钥匙')) icon = '🗝️';
            else if (item.includes('饭')) icon = '🍚';
            else if (item.includes('火柴')) icon = '🔥';
            else if (item.includes('照片')) icon = '🖼️';
            else if (item.includes('信')) icon = '✉️';

            slot.textContent = icon;

            // Tooltip events
            slot.addEventListener('mouseenter', (e) => {
                tooltip.textContent = item;
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
            });
            slot.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
            slot.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
            });

            // Click to read if it's a letter/photo
            if (item.includes('信') || item.includes('照片')) {
                slot.addEventListener('click', () => {
                    // This would need a callback or global lookup for content
                    // For now just show item name
                    // window.showDocument(item, "...");
                });
            }

            invSlots.appendChild(slot);
        };

        // Game Config
        const config = {
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 800,
                height: 600
            },
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false // Enable debug to see hitboxes
                }
            },
            scene: [BootScene, TitleScene, IntroScene, GameScene],
            pixelArt: true
        };

        // Start Game
        try {
            const game = new Phaser.Game(config);
            console.log("Game started successfully");
        } catch (e) {
            console.error("Phaser Init Error", e);
            throw e;
        }
    </script>
</body>
</html>
