<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,">
    <title>回煞 - 3D 原型</title>
    <style>
        :root {
            color-scheme: dark;
            --blood: #8b1717;
            --paper: #d8c9a5;
            --ink: #080706;
            --ash: #a9a29a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            background: #030201;
            font-family: "SimSun", "Songti SC", serif;
            color: var(--paper);
        }

        #three-root {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, #1d1710 0%, #050403 58%, #000 100%);
        }

        #three-root canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .topbar {
            position: absolute;
            top: 18px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .brand {
            text-shadow: 0 0 18px rgba(139, 23, 23, 0.7);
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 0;
            color: #b92929;
        }

        .brand p {
            margin: 6px 0 0;
            font-size: 14px;
            color: rgba(216, 201, 165, 0.78);
        }

        .return-link {
            pointer-events: auto;
            min-width: 104px;
            border: 1px solid rgba(216, 201, 165, 0.5);
            background: rgba(5, 4, 3, 0.72);
            color: var(--paper);
            padding: 9px 13px;
            font: inherit;
            cursor: pointer;
        }

        .return-link:hover,
        .return-link:focus-visible {
            border-color: #fff1c7;
            outline: none;
        }

        .controls {
            position: absolute;
            left: 20px;
            bottom: 18px;
            max-width: min(540px, calc(100vw - 40px));
            color: rgba(216, 201, 165, 0.74);
            font-size: 13px;
            line-height: 1.7;
            text-shadow: 0 1px 3px #000;
        }

        .prompt {
            position: absolute;
            left: 50%;
            bottom: 96px;
            transform: translateX(-50%);
            min-width: min(420px, calc(100vw - 40px));
            border-top: 1px solid rgba(216, 201, 165, 0.5);
            border-bottom: 1px solid rgba(216, 201, 165, 0.5);
            background: linear-gradient(90deg, transparent, rgba(5, 4, 3, 0.82), transparent);
            color: #fff3c7;
            padding: 10px 18px;
            text-align: center;
            opacity: 0;
            transition: opacity 160ms ease;
            text-shadow: 0 0 10px rgba(139, 23, 23, 0.75);
        }

        .prompt.is-visible {
            opacity: 1;
        }

        .dialog {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 36px));
            border: 1px solid rgba(216, 201, 165, 0.55);
            background: rgba(4, 3, 2, 0.92);
            box-shadow: 0 0 42px rgba(139, 23, 23, 0.24);
            padding: 18px 20px;
            display: none;
            pointer-events: auto;
        }

        .dialog.is-visible {
            display: block;
        }

        .dialog h2 {
            margin: 0 0 8px;
            color: #c93636;
            font-size: 20px;
            letter-spacing: 0;
        }

        .dialog p {
            margin: 0;
            color: #efe0b6;
            line-height: 1.7;
            font-size: 16px;
        }

        .dialog button {
            margin-top: 14px;
            border: 1px solid rgba(216, 201, 165, 0.5);
            background: transparent;
            color: var(--paper);
            padding: 7px 14px;
            font: inherit;
            cursor: pointer;
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.74), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.74)),
                radial-gradient(circle, transparent 38%, rgba(0, 0, 0, 0.72) 100%);
            mix-blend-mode: multiply;
        }

        @media (max-width: 680px) {
            .topbar {
                top: 12px;
                left: 12px;
                right: 12px;
            }

            .brand p,
            .controls {
                font-size: 12px;
            }

            .return-link {
                min-width: 88px;
            }
        }
    </style>
</head>
<body>
    <main id="three-root" aria-label="回煞 3D 原型"></main>
    <div class="hud">
        <div class="topbar">
            <div class="brand">
                <h1>回煞 3D</h1>
                <p>原型：正厅与走廊</p>
            </div>
            <button class="return-link" id="return-title" type="button">返回标题</button>
        </div>
        <div class="prompt" id="interaction-prompt">靠近物件后按 E 调查</div>
        <div class="controls">WASD 移动，拖动鼠标或触控滑动视角，靠近物件按 E 调查。点击画面可锁定鼠标。</div>
    </div>
    <div class="dialog" id="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <h2 id="dialog-title">主角</h2>
        <p id="dialog-text"></p>
        <button id="dialog-close" type="button">继续</button>
    </div>
    <div class="vignette"></div>

    <script src="vendor/three.min.js"></script>
    <script src="src/3d/ThreeHouseMap.js"></script>
    <script src="src/3d/ThreeControls.js"></script>
    <script src="src/3d/ThreeInteraction.js"></script>
    <script src="src/3d/ThreePrototypeScene.js"></script>
    <script>
        (function bootPrototype() {
            const dialog = document.getElementById('dialog-panel');
            const title = document.getElementById('dialog-title');
            const text = document.getElementById('dialog-text');
            const close = document.getElementById('dialog-close');

            window.show3dDialog = function show3dDialog(speaker, message) {
                title.textContent = speaker || '主角';
                text.textContent = message || '';
                dialog.classList.add('is-visible');
            };

            close.addEventListener('click', () => dialog.classList.remove('is-visible'));
            document.getElementById('return-title').addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            const root = document.getElementById('three-root');
            const prompt = document.getElementById('interaction-prompt');
            const scene = new window.Huisha3D.ThreePrototypeScene({
                root,
                prompt,
                onDialog: window.show3dDialog
            });
            scene.start();
            window.huisha3dScene = scene;
        })();
    </script>
</body>
</html>
